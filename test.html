<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Concierge UI Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --narx-gold: #d4af37;
            --narx-dark: #1a1a1a;
        }

        body {
            background-color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* コンシェルジュ全体のラッパー */
        #concierge-wrapper {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        /* 吹き出しのデザイン */
        #concierge-bubble {
            background: white;
            color: #333;
            padding: 12px 20px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 250px;
            text-align: center;
            pointer-events: none;
            border: 1px solid #eee;
        }

        #concierge-bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 吹き出しのしっぽ */
        #concierge-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid white;
        }

        /* アイコンボタンのスタイル */
        .concierge-trigger {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #222, #444);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--narx-gold);
        }

        .concierge-trigger:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.4);
        }

        .icon-svg {
            width: 40px;
            height: 40px;
            fill: var(--narx-gold);
        }
    </style>
</head>
<body>

    <div class="text-center p-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">NARX AI Concierge</h1>
        <p class="text-gray-500">右下のアイコンをクリックすると<br>メッセージが表示されます。</p>
    </div>

    <!-- AIコンシェルジュ UI構造 -->
    <div id="concierge-wrapper">
        <div id="concierge-bubble">
            <span id="concierge-message">こんにちは！<br>最適な脱毛プランをご提案します。</span>
        </div>
        
        <div class="concierge-trigger" onclick="toggleBubble()">
            <svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.477 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5L2.1 21.45a.5.5 0 0 0 .616.616L7.22 20.713A9.957 9.957 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18c-1.474 0-2.85-.398-4.034-1.09a.5.5 0 0 0-.424-.044l-3.344.928.928-3.344a.5.5 0 0 0-.044-.424A7.957 7.957 0 0 1 4 12c0-4.418 3.582-8 8-8s8 3.582 8 8-3.582 8-8 8zm-3-9a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm6 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm-6 4a3 3 0 0 0 6 0H9z"/>
            </svg>
        </div>
    </div>

    <script>
        function toggleBubble() {
            const bubble = document.getElementById('concierge-bubble');
            bubble.classList.toggle('visible');
        }

        // 自動表示
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('concierge-bubble').classList.add('visible');
            }, 1000);
        };
    </script>
</body>
</html>
