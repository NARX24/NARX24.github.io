<style>
    :root { --gold: #d4af37; --black: #000; --dark-gray: #151515; --light-gray: #333; --white: #fff; --panel-bg: #fdfdfd; }
    body { background-color: var(--black); color: var(--white); font-family: serif; margin: 0; padding-bottom: 240px; overflow-x: hidden; }

    /* ゲートモーダル */
    #gate-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; display: flex; justify-content: center; align-items: center; }
    .modal-content { border: 1px solid var(--gold); padding: 40px 20px; width: 85%; max-width: 400px; background: var(--black); text-align: center; border-radius: 8px; }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 10px 0; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
    .header h1 { color: var(--gold); margin: 0; font-size: 1.4rem; letter-spacing: 3px; }
    #mode-display { font-size: 0.75rem; color: var(--black); background: var(--gold); padding: 4px 15px; border-radius: 20px; margin-top: 8px; display: inline-block; }

    /* プレビューパネル */
    .dual-visual-container { display: flex; gap: 4px; height: 240px; position: sticky; top: 10px; z-index: 50; background: var(--light-gray); border: 2px solid var(--gold); margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
    .view-panel { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-color: var(--panel-bg); }
    .view-panel:first-child { border-right: 1px solid #ddd; }
    .view-panel span { position: absolute; top: 8px; font-size: 9px; color: #999; letter-spacing: 2px; font-weight: bold; z-index: 10; }
    .view-panel img { position: absolute; height: 90%; transition: opacity 0.3s ease; pointer-events: none; }
    .base-img { opacity: 0.3; z-index: 1; }
    .layer-part { opacity: 0; z-index: 2; }
    .layer-part.active { opacity: 1; filter: drop-shadow(0 0 3px var(--gold)); }

    /* タブ */
    .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--light-gray); }
    .tab { flex: 1; padding: 12px 5px; text-align: center; color: #777; cursor: pointer; font-size: 0.85rem; }
    .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

    /* 小見出し */
    .subcat-header { display: flex; align-items: center; justify-content: center; margin: 30px 0 15px; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.4em; font-weight: bold; }
    .subcat-header::before, .subcat-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); margin: 0 20px; opacity: 0.6; }
    .subcat-header::after { background: linear-gradient(to left, transparent, var(--gold)); }

    /* アイテム */
    .item { background: var(--dark-gray); margin-bottom: 8px; padding: 16px; border-radius: 6px; display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
    .item.selected { border-color: var(--gold); background: #080808; }
    .item.disabled { opacity: 0.15; cursor: default; filter: grayscale(1); }
    .item input { transform: scale(1.4); margin-right: 18px; accent-color: var(--gold); }
    .item-info { flex: 1; }
    .item-name { display: block; font-size: 0.95rem; }
    .item-price { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-top: 2px; }
    .item-sub { display: block; font-size: 0.7rem; color: #888; margin-top: 5px; line-height: 1.4; }

    /* 提案ポップアップ */
    #suggestion-box { position: fixed; bottom: 190px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: linear-gradient(135deg, #f7d05e 0%, #d4af37 100%); color: #111; padding: 20px; border-radius: 12px; display: none; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #fff; }
    .sug-title { font-weight: bold; font-size: 0.95rem; margin-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 6px; }
    .sug-price-badge { background: #111; color: var(--gold); padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 1rem; }
    .sug-discount { display: inline-block; background: #c00; color: #fff; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; margin-top: 6px; font-weight: bold; }

    /* ボトムバー */
    .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5, 5, 5, 0.98); border-top: 2px solid var(--gold); padding: 15px 20px; box-sizing: border-box; z-index: 100; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1.1fr; margin-bottom: 12px; }
    .summary-item .label { font-size: 0.7rem; color: #999; display: block; }
    .summary-item .val { font-size: 1.35rem; color: var(--gold); font-weight: bold; }
    
    .btn-group { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 15px; text-align: center; border-radius: 6px; font-weight: bold; font-size: 0.9rem; border: none; cursor: pointer; text-decoration: none; }
    .btn-copy { background: #222; color: #fff; }
    .btn-reserve { background: var(--gold); color: #000; }
</style>

function forceStart(type) {
    var modal = document.getElementById('gate-modal');
    if (modal) modal.style.display = 'none';
    try {
        userType = type;
        var badge = document.getElementById('mode-display');
        if (badge) {
            badge.innerText = type === 'new' ? "【ご新規様】初回限定価格モード" : "【会員様】通常価格モード";
            badge.style.background = type === 'new' ? "var(--gold)" : "#666";
        }
        setTimeout(function() { initApp(); render(); }, 50);
    } catch(e) { console.error(e); }
}

function initApp() {
    function getLeafNodes(id) {
        var leaves =[];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) { setIncludes[nodeId].forEach(function(subId) { traverse(subId); }); } 
            else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id);
        return leaves;
    }
    Object.keys(menuData).forEach(function(id) { itemLeaves[id] = getLeafNodes(id); });

    var bPanel = document.getElementById('body-panel');
    var fPanel = document.getElementById('face-panel');
    if (!bPanel || !fPanel) return;
    Object.keys(menuData).forEach(function(id) {
        var item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    });
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png";
    img.id = layerId;
    img.className = 'layer-part';
    img.onerror = function() { img.style.display = 'none'; };
    parent.appendChild(img);
}

function changeTab(tab) { currentTab = tab; render(); }

// 【修正】直近で選んだアイテムを記憶
function toggleItem(id) {
    var idx = selected.indexOf(id);
    if (idx !== -1) {
        selected.splice(idx, 1);
        lastToggledItem = null; // 削除時はクリア
    } else {
        selected.push(id);
        lastToggledItem = id; // ここで「最後にタップした部位」を記憶
    }
    checkSuggestion();
    render();
}

function render() {
    var area = document.getElementById('menu-area');
    if (!area) return;
    area.innerHTML = '';

    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    var activeTab = document.getElementById("tab-" + currentTab);
    if(activeTab) activeTab.classList.add('active');
    document.querySelectorAll('.layer-part').forEach(function(img) { img.classList.remove('active'); });

    var selectedLeaves =[];
    selected.forEach(function(id) {
        if(itemLeaves[id]) {
            itemLeaves[id].forEach(function(leaf) {
                if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf);
            });
        }
    });

    selected.forEach(function(id) {
        var item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) { var i = document.getElementById("img-" + item.imgs.body); if(i) i.classList.add('active'); }
            if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); }
        }
    });

    var lastSub = "";
    Object.keys(menuData).filter(function(id) { return menuData[id].cat === currentTab; }).forEach(function(id) {
        var item = menuData[id];
        if (currentTab === 'part' && item.subCat !== lastSub) {
            lastSub = item.subCat;
            var h = document.createElement('div'); h.className = 'subcat-header'; h.innerText = lastSub; area.appendChild(h);
        }

        var isSel = selected.indexOf(id) !== -1;
        var isDis = false;
        if (!isSel && itemLeaves[id]) {
            isDis = itemLeaves[id].some(function(leaf) { return selectedLeaves.indexOf(leaf) !== -1; });
        }

        var div = document.createElement('div');
        div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : '');
        div.onclick = function() { if(!isDis) toggleItem(id); };
        
        var inner = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '>';
        inner += '<div class="item-info"><span class="item-name">' + item.label + '</span>';
        if(item.sub) inner += '<span class="item-sub">' + item.sub + '</span>';
        inner += '</div><div class="item-price">¥' + item.price.toLocaleString() + '</div>';
        div.innerHTML = inner;
        area.appendChild(div);
    });
    updateTotal();
}

function updateTotal() {
    var p = 0, t = 0, f = false;
    selected.forEach(function(id) {
        var item = menuData[id]; p += item.price; t += item.time; if(item.hasFace) f = true;
    });
    if (selected.length > 0) {
        if (userType === 'new') t += 90; else if (f) t += 20;
    }
    var rounded = Math.ceil(t / 30) * 30;
    var slot = Math.floor(rounded / 60) + "." + ((rounded % 60) === 30 ? '5' : '0');
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-slot').innerText = slot + " 時間枠";
}

function getOriginalPrice(setId) {
    var leaves = itemLeaves[setId];
    var total = 0;
    if(leaves) {
        leaves.forEach(function(leaf) {
            if (menuData[leaf]) total += menuData[leaf].price;
        });
    }
    return total;
}

// 【コンテキスト認識AI】
function checkSuggestion() {
    suggestionId = null;
    suggestionReplaceItems =[];
    document.getElementById('suggestion-box').style.display = 'none';

    var selectedLeaves =[];
    selected.forEach(function(id) {
        if(itemLeaves[id]) {
            itemLeaves[id].forEach(function(leaf) {
                if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf);
            });
        }
    });

    if (selectedLeaves.length < 2) return;

    var cheaperCandidates = [];
    var samePriceCandidates =[];
    var upsellCandidates = [];

    Object.keys(menuData).filter(function(k) { return menuData[k].cat === 'set'; }).forEach(function(sid) {
        if (selected.indexOf(sid) !== -1) return;
        if (dismissedSuggestions.indexOf(sid) !== -1) return;

        var candidateLeaves = itemLeaves[sid];
        if (!candidateLeaves) return;

        // 直近でタップしたアイテム（lastToggledItem）が、このセットに含まれるかをチェック
        var includesLastToggled = false;
        if (lastToggledItem && itemLeaves[lastToggledItem]) {
            var lastLeaves = itemLeaves[lastToggledItem];
            includesLastToggled = true;
            for (var k = 0; k < lastLeaves.length; k++) {
                if (candidateLeaves.indexOf(lastLeaves[k]) === -1) {
                    includesLastToggled = false;
                    break;
                }
            }
        }

        var intersectingItems =[];
        var intersectingLeaves =[];
        var isCovered = true; 

        selected.forEach(function(selId) {
            var selLeaves = itemLeaves[selId];
            if (!selLeaves) return;

            var hasIntersection = false;
            var fullyContained = true;

            selLeaves.forEach(function(leaf) {
                if (candidateLeaves.indexOf(leaf) !== -1) {
                    hasIntersection = true;
                } else {
                    fullyContained = false;
                }
            });

            if (hasIntersection) {
                intersectingItems.push(selId);
                if (!fullyContained) {
                    isCovered = false;
                } else {
                    selLeaves.forEach(function(leaf) {
                        if (intersectingLeaves.indexOf(leaf) === -1) intersectingLeaves.push(leaf);
                    });
                }
            }
        });

        if (intersectingItems.length > 0 && isCovered) {
            var oldPrice = 0;
            intersectingItems.forEach(function(itemId) { oldPrice += menuData[itemId].price; });
            var newPrice = menuData[sid].price;
            var diffPrice = newPrice - oldPrice;
            var addedLeavesCount = candidateLeaves.length - intersectingLeaves.length;

            var simData = {
                sid: sid,
                diffPrice: diffPrice,
                addedLeavesCount: addedLeavesCount,
                intersectingItems: intersectingItems,
                oldPrice: oldPrice,
                includesLastToggled: includesLastToggled // 文脈の記憶
            };

            if (diffPrice < 0) {
                cheaperCandidates.push(simData);
            } else if (diffPrice === 0 && addedLeavesCount > 0) {
                samePriceCandidates.push(simData);
            } else if (diffPrice > 0 && addedLeavesCount > 0) {
                // 【超重要】アップセルは「今タップした部位を拡張するセット」のみに限定！
                // 上限も 12,000円 に引き上げ（肘上→両腕の差額11,000円を通すため）
                if (includesLastToggled && diffPrice <= Math.max(12000, oldPrice * 1.5)) {
                    upsellCandidates.push(simData);
                }
            }
        }
    });

    var bestSuggestion = null;
    var suggestionMsg = "";

    if (cheaperCandidates.length > 0) {
        // 安くなる提案が複数ある場合は、直近の操作に関連するものを優先
        cheaperCandidates.sort(function(a, b) { 
            if (a.includesLastToggled !== b.includesLastToggled) return b.includesLastToggled ? 1 : -1;
            return a.diffPrice - b.diffPrice; 
        });
        var best = cheaperCandidates[0];
        bestSuggestion = best.sid;
        suggestionReplaceItems = best.intersectingItems;
        suggestionMsg = "「<strong>" + menuData[bestSuggestion].label + "</strong>」へ切り替えると、<span class='sug-price-badge'>¥" + menuData[bestSuggestion].price.toLocaleString() + "</span> になりお得です。";
    } 
    else if (samePriceCandidates.length > 0) {
        samePriceCandidates.sort(function(a, b) { 
            if (a.includesLastToggled !== b.includesLastToggled) return b.includesLastToggled ? 1 : -1;
            return b.addedLeavesCount - a.addedLeavesCount; 
        });
        var best = samePriceCandidates[0];
        bestSuggestion = best.sid;
        suggestionReplaceItems = best.intersectingItems;
        suggestionMsg = "同じ金額で「<strong>" + menuData[bestSuggestion].label + "</strong>」に切り替え可能ですがいかがですか？";
    } 
    else if (upsellCandidates.length > 0) {
        upsellCandidates.sort(function(a, b) { return a.diffPrice - b.diffPrice; });
        var best = upsellCandidates[0];
        bestSuggestion = best.sid;
        suggestionReplaceItems = best.intersectingItems;

        var originalPrice = getOriginalPrice(bestSuggestion);
        var savedAmount = originalPrice - menuData[bestSuggestion].price;

        suggestionMsg = "あと <span class='sug-price-badge'>+¥" + best.diffPrice.toLocaleString() + "</span> で、さらに部位が充実した「<strong>" + menuData[bestSuggestion].label + "</strong>」にアップグレードできます！";
        if (savedAmount >= 2000) {
            suggestionMsg += "<br><span class='sug-discount'>※パーツを別々に追加するより ¥" + savedAmount.toLocaleString() + " もお得です！</span>";
        }
    }

    if (bestSuggestion) {
        suggestionId = bestSuggestion;
        document.getElementById('suggestion-text').innerHTML = suggestionMsg;
        document.getElementById('suggestion-box').style.display = 'block';
    }
}

function applyOptimalSet() {
    if (!suggestionId) return;
    
    if (suggestionReplaceItems && suggestionReplaceItems.length > 0) {
        suggestionReplaceItems.forEach(function(itemId) {
            var idx = selected.indexOf(itemId);
            if (idx !== -1) selected.splice(idx, 1);
        });
    }

    selected.push(suggestionId);
    
    suggestionId = null;
    suggestionReplaceItems =[];
    document.getElementById('suggestion-box').style.display = 'none';
    render();
}

function hideSuggestion() { 
    if (suggestionId) dismissedSuggestions.push(suggestionId);
    document.getElementById('suggestion-box').style.display = 'none'; 
}

function copyResult() {
    if (selected.length === 0) return alert("選択してください");
    var slot = document.getElementById('total-time-slot').innerText;
    var priceStr = document.getElementById('total-price').innerText;
    var txt = "【NARX脱毛予約】\n区分：" + (userType === 'new' ? '新規' : '会員') + "\nメニュー：\n";
    selected.forEach(function(id) { txt += "・" + menuData[id].label + "\n"; });
    txt += "──────────\n";
    txt += "合計金額：" + priceStr + "\n";
    txt += "予約枠目安：" + slot;
    navigator.clipboard.writeText(txt).then(function() { alert("コピーしました。"); });
}
</script>
