    set_upperbody:['set_fullface','set_arms','part_nape','part_armpit','part_chest_nipple','part_abdomen_navel','part_back_upper','part_back_lower'],
    set_lowerbody:['set_vio','set_legs','part_buttocks'],
    set_fullbody_all:['set_upperbody','set_lowerbody']
};

function getItemPrice(id) {
    var item = menuData[id]; if (userType === 'new') {
        var face5 = ['part_nose_under','part_mouth_under','part_cheek','part_face_line','part_neck'];
        if (face5.indexOf(id) !== -1) return 1000;
        if (id === 'set_fullface') return 5000;
        return item.price * 0.5;
    } return item.price;
}
function getOriginalTotal(idList) { var t = 0; for (var i = 0; i < idList.length; i++) { t += getItemPrice(idList[i]); } return t; }

function updateTotal() {
    var p = 0, t = 0, faceCool = false;
    for (var i = 0; i < selected.length; i++) {
        var sid = selected[i]; var item = menuData[sid]; p += getItemPrice(sid); t += item.time;
        if (item.cool === 1) faceCool = true;
    }
    if (selected.length > 0) { t += 10; if (faceCool) t += 12; if (userType === 'new') t += 90; }
    var rounded = Math.ceil(t / 30) * 30; internalNumericSlot = (rounded / 60); 
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-display').innerText = "枠 " + internalNumericSlot.toFixed(1) + " 時間枠";
}

function applyOptimalSet() {
    if(!suggestionReplaceItems || !suggestionId) return;
    for (var i = 0; i < suggestionReplaceItems.length; i++) {
        var idx = selected.indexOf(suggestionReplaceItems[i]); if (idx !== -1) selected.splice(idx, 1);
    }
    selected.push(suggestionId); suggestionId = null; suggestionReplaceItems = [];
    document.getElementById('suggestion-box').style.display = 'none';
    render(); 
}

function proceedReservation() { if (userType === 'new') { proceedToCalendar(); } else { handleRepeatBooking(); } }
function applyAndProceed() { applyOptimalSet(); document.getElementById('final-suggestion-modal').style.display = 'none'; setTimeout(proceedReservation, 100); }
function cancelAndProceed() { document.getElementById('final-suggestion-modal').style.display = 'none'; proceedReservation(); }

function proceedToCalendar() {
    document.getElementById('loading-overlay').style.display = 'flex';
    var xhr = new XMLHttpRequest(); xhr.open("POST", GAS_URL, true);
    xhr.onreadystatechange = function() { if (xhr.readyState === 4) { document.getElementById('loading-overlay').style.display = 'none'; if (xhr.status === 200) { try { busySlots = JSON.parse(xhr.responseText); renderCalendar(); document.getElementById('calendar-modal').style.display = 'block'; } catch(e) { alert("予約情報の解析に失敗しました。"); } } } };
    xhr.send(JSON.stringify({type:'getBusySlots'}));
}

function renderCalendar() {
    var wrapper=document.getElementById('calendar-container'), now=new Date();
    var reqMs = internalNumericSlot * 60 * 60 * 1000;
    var firstDay = new Date(); var day = firstDay.getDay(); var diffToMon = (day === 0 ? -6 : 1) - day; firstDay.setDate(firstDay.getDate() + diffToMon + (weekOffset * 7));
    document.getElementById('cal-title').innerText = (firstDay.getMonth()+1)+"/"+firstDay.getDate() + "の週";
    var html='<table class="cal-table"><thead><tr><th>時間</th>';
    var dayNames = ['日','月','火','水','木','金','土'];
    for(var j=0; j<7; j++){
        var d = new Date(firstDay.getTime() + j*24*60*60*1000); var dateStr = d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
        var cls = d.getDay()===0?'sun':(d.getDay()===6?'sat':''); html+='<th class="'+cls+'">'+(d.getMonth()+1)+'/'+d.getDate()+'<br>('+dayNames[d.getDay()]+')</th>';
    }
    html+='</tr></thead><tbody>';
    var times=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30','22:00'];
    times.forEach(function(timeStr) {
        html+='<tr><td>'+timeStr+'</td>';
        for(var d=0; d<7; d++){
            var slotS = new Date(firstDay.getFullYear(), firstDay.getMonth(), firstDay.getDate()+d, timeStr.split(':')[0], timeStr.split(':')[1]);
            var s = slotS.getTime(); var e = s + reqMs; var wDay = slotS.getDay(); var totalM = slotS.getHours()*60 + slotS.getMinutes();
            var dateStrKey = slotS.getFullYear()+'/'+(slotS.getMonth()+1)+'/'+slotS.getDate();
            var isInsideHours = (wDay===0 || wDay===6) ? (totalM>=540 && totalM < 1260) : (totalM>=720 && totalM < 1320);
            var limitHr = (wDay===0 || wDay===6) ? 21 : 22; var limitT = new Date(slotS.getFullYear(), slotS.getMonth(), slotS.getDate(), limitHr, 0).getTime();
            var canFit = (e <= limitT); var isBusy = false;
            for(var b=0; b<busySlots.length; b++){ if(s < (busySlots[b].end + 30*60*1000) && e > (busySlots[b].start - 30*60*1000)) { isBusy = true; break; } };
            if(s < now.getTime()) isBusy = true;
            if(!isInsideHours) html+='<td class="cal-status-off">-</td>'; else if(!canFit || isBusy) html+='<td class="cal-status-x">×</td>'; else {
                var endObj = new Date(e); var endStr = endObj.getHours() + ":" + (endObj.getMinutes() === 0 ? "00" : (endObj.getMinutes() < 10 ? "0" : "") + endObj.getMinutes());
                html+='<td class="cal-status-o" onclick="openInfoModal(\''+dateStrKey+'\', \''+timeStr+'\', \''+endStr+'\')">◎</td>';
            }
        }
        html+='</tr>';
    });
    wrapper.innerHTML = html+'</tbody></table>';
}
function openInfoModal(d, t, et) { tDate=d; tTime=t; tEndTime=et; var labels = []; for(var i=0; i<selected.length; i++){ labels.push(menuData[selected[i]].label); } document.getElementById('selected-summary').innerHTML="【日時】 "+d+" "+t+" 〜 "+et+"<br>【内容】 "+labels.join(', ')+"<br>【合計】 "+document.getElementById('total-price').innerText; document.getElementById('info-modal').style.display='block'; }
function submitReservation() {
    var n=document.getElementById('cust-name').value, tel=document.getElementById('cust-tel').value, em=document.getElementById('cust-email').value, memo=document.getElementById('cust-memo').value;
    if(!n||!tel||!em) return alert("必須項目を入力してください"); document.getElementById('loading-overlay').style.display = 'flex';
    var labels = []; for(var i=0; i<selected.length; i++){ labels.push(menuData[selected[i]].label); }
    var payload = { type:'reserve', userType:userType, date:tDate, time:tTime, slot:internalNumericSlot.toFixed(1), price:document.getElementById('total-price').innerText, menus:labels.join(', '), name:n, tel:tel, email:em, memo:memo };
    var xhr=new XMLHttpRequest(); xhr.open("POST", GAS_URL, true); xhr.onreadystatechange=function(){ if(xhr.readyState===4){ document.getElementById('loading-overlay').style.display = 'none'; alert("ご予約完了しました！確定メールをご確認ください。"); location.reload(); }}; xhr.send(JSON.stringify(payload));
}
function handleRepeatBooking() { document.getElementById('guide-hours').innerText = internalNumericSlot.toFixed(1) + " 時間枠"; document.getElementById('repeat-guidance-modal').style.display = 'flex'; }
function toggleConcierge() { isConciergeON = !isConciergeON; var icon = document.getElementById('concierge-icon'); if (isConciergeON) { icon.className = 'concierge-icon on'; checkSuggestion(true); } else { icon.className = 'concierge-icon off'; showConciergeBubble("待機しております。"); document.getElementById('suggestion-box').style.display = 'none'; suggestionId = null; render(); } }
function showConciergeBubble(msg) { var b = document.getElementById('concierge-bubble'); document.getElementById('concierge-msg').innerText = msg; b.style.display = 'block'; b.style.opacity = '1'; if (bubbleTimer) clearTimeout(bubbleTimer); bubbleTimer = setTimeout(function() { b.style.opacity = '0'; setTimeout(function(){b.style.display='none';},300); }, 5000); }
function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none'; var best = analyzeSuggestions(isManual); if (!best) { suggestionId = null; return; }
    suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems; var currentTotal = getOriginalTotal(selected), setItem = menuData[best.sid], newTotal = currentTotal - best.oldPrice + getItemPrice(best.sid);
    var html = '<div class="sug-title">🎉 AIコンシェルジュ</div><div class="sug-benefit-msg">もっとお得になるセットがあります！</div><div class="sug-menu-name">' + setItem.label + '</div><div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在</span><span class="sug-col-price">¥' + currentTotal.toLocaleString() + '</span></div><div class="sug-col"><span class="sug-col-label">合計</span><span class="sug-col-price" style="color:#c00;">¥' + newTotal.toLocaleString() + '</span></div></div><div class="sug-btn-group"><button onclick="applyOptimalSet()" class="btn-sug-apply">変更する</button><button onclick="skipSuggestion(\''+suggestionId+'\')" class="btn-sug-skip">今はしない</button></div>';
    document.getElementById('suggestion-box').innerHTML = html; document.getElementById('suggestion-box').style.display = 'block'; render(); 
}
function handleReserveAction() {
    if (selected.length === 0) return alert("メニューを選んでください"); var best = analyzeSuggestions(true);
    if (best && (best.type === 'cheaper' || best.type === 'equal')) {
        suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems;
        var oldNames = []; for(var i=0; i<best.intersectingItems.length; i++) oldNames.push(menuData[best.intersectingItems[i]].label);
        document.getElementById('final-suggestion-modal').style.display = 'flex'; document.getElementById('final-sug-desc').innerHTML = "現在選択中の【" + oldNames.join(', ') + "】を、よりお得な【" + menuData[best.sid].label + "】に変更しませんか？";
        document.getElementById('final-old-price').innerText = "¥" + getOriginalTotal(selected).toLocaleString(); document.getElementById('final-new-price').innerText = "¥" + (getOriginalTotal(selected) + best.diff).toLocaleString(); return;
    } proceedReservation();
}
function skipSuggestion(id) { dismissedSuggestions.push(id); document.getElementById('suggestion-box').style.display='none'; suggestionId=null; render(); }
function forceStart(t) { document.getElementById('gate-modal').style.display='none'; userType=t; document.getElementById('mode-display').innerText = t==='new'?"【ご新規様】初回適用中":"【会員様】通常価格"; document.getElementById('action-btn-container').innerHTML = '<button class="btn-reserve" onclick="handleReserveAction()">予約を確認して次へ</button>'; initApp(); render(); }
function initApp() {
    function getLeafNodes(id) { var leaves = []; function traverse(nodeId) { if (setIncludes[nodeId]) { for (var i = 0; i < setIncludes[nodeId].length; i++) { traverse(setIncludes[nodeId][i]); } } else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); } } traverse(id); return leaves; }
    var keys = Object.keys(menuData); for (var i = 0; i < keys.length; i++) { itemLeaves[keys[i]] = getLeafNodes(keys[i]); }
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    for (var j = 0; j < keys.length; j++) { var item = menuData[keys[j]]; if (item.imgs) { if (item.imgs.body) createImg(bPanel, item.imgs.body); if (item.imgs.face) createImg(fPanel, item.imgs.face); } }
}
function createImg(parent, name) { var layerId = "img-" + name; if (document.getElementById(layerId)) return; var img = document.createElement('img'); img.src = name + ".png"; img.id = layerId; img.className = 'layer-part'; img.onerror = function() { this.style.display = 'none'; }; parent.appendChild(img); }
function changeTab(t){ currentTab=t; render(); }
function resetSelection(){ selected = []; suggestionId = null; suggestionReplaceItems = []; document.getElementById('suggestion-box').style.display='none'; render(); }
function toggleItem(id){ document.getElementById('suggestion-box').style.display='none'; var idx=selected.indexOf(id); if(idx!==-1)selected.splice(idx,1); else selected.push(id); checkSuggestion(false); render(); }
function render() {
    var area = document.getElementById('menu-area'); area.innerHTML=''; var tabs = document.querySelectorAll('.tab'); for (var t = 0; t < tabs.length; t++) { tabs[t].classList.remove('active'); } document.getElementById("tab-" + currentTab).classList.add('active');
    var container = document.getElementById('chips-container'); if (selected.length === 0) { container.innerHTML = '<span style="color:#444; font-size:0.65rem;">部位を選択してください</span>'; } else { container.innerHTML = ''; for (var i = 0; i < selected.length; i++) { var chip = document.createElement('div'); chip.className = 'chip'; chip.innerHTML = '<span>' + menuData[selected[i]].label + '</span><span class="chip-close" onclick="event.stopPropagation(); toggleItem(\'' + selected[i] + '\')">×</span>'; container.appendChild(chip); } }
    var parts = document.querySelectorAll('.layer-part'); for (var p = 0; p < parts.length; p++) { parts[p].classList.remove('active', 'suggest-blink'); }
    var curL = []; for (var s = 0; s < selected.length; s++) { var sid = selected[s], item = menuData[sid]; if (item.imgs) { if (item.imgs.body) { var b = document.getElementById("img-" + item.imgs.body); if(b) b.classList.add('active'); } if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); } } var lNodes = itemLeaves[sid]; for (var ln = 0; ln < lNodes.length; ln++) { if (curL.indexOf(lNodes[ln]) === -1) curL.push(lNodes[ln]); } }
    for (var cl = 0; cl < curL.length; cl++) { var leaf = menuData[curL[cl]]; if (leaf.imgs) { if (leaf.imgs.body) { var lb = document.getElementById("img-" + leaf.imgs.body); if(lb) lb.classList.add('active'); } if (leaf.imgs.face) { var lf = document.getElementById("img-" + leaf.imgs.face); if(lf) lf.classList.add('active'); } } }
    var keys = Object.keys(menuData); for (var m = 0; m < keys.length; m++) { var id = keys[m], item = menuData[id]; if (item.cat !== currentTab) continue; var isSel = selected.indexOf(id) !== -1, isDis = false; if (!isSel) { var itemL = itemLeaves[id]; for (var l = 0; l < itemL.length; l++) { if (curL.indexOf(itemL[l]) !== -1) { isDis = true; break; } } }
    var div = document.createElement('div'); div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : ''); (function(mid, disabled){ div.onclick = function(){ if(!disabled) toggleItem(mid); }; })(id, isDis);
    div.innerHTML = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '><div class="item-info"><span class="item-name">' + item.label + '</span></div><div class="item-price">¥' + getItemPrice(id).toLocaleString() + '</div>'; area.appendChild(div); }
    updateTotal();
}
function analyzeSuggestions(isManual) {
    if (!isConciergeON && !isManual) return null; var keys = Object.keys(menuData), curL = []; for (var s = 0; s < selected.length; s++) { var lNodes = itemLeaves[selected[s]]; for (var ln = 0; ln < lNodes.length; ln++) { if (curL.indexOf(lNodes[ln]) === -1) curL.push(lNodes[ln]); } }
    for (var i = 0; i < keys.length; i++) { var sid = keys[i]; if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue; var candL = itemLeaves[sid], foundL = 0; for (var l = 0; l < candL.length; l++) { if (curL.indexOf(candL[l]) !== -1) foundL++; } if (foundL >= 2) { var intersect = []; for(var j=0; j<selected.length; j++) { var selId = selected[j], selL = itemLeaves[selId], isInc = true; for(var k=0; k<selL.length; k++){ if(candL.indexOf(selL[k]) === -1) isInc=false; } if(isInc) intersect.push(selId); } if (intersect.length < 2) continue; var oldP = getOriginalTotal(intersect), setP = getItemPrice(sid), diff = setP - oldP; if (diff <= 5000) return {sid:sid, type: (diff < 0 ? 'cheaper' : (diff === 0 ? 'equal' : 'upsell')), diff:diff, oldPrice:oldP, intersectingItems:intersect}; } }
    return null;
}
function changeWeek(n) { weekOffset += n; proceedToCalendar(); }
function closeCalendarModal(){ document.getElementById('calendar-modal').style.display='none'; weekOffset=0; }
</script>

<div id="info-modal"><div class="modal-content" style="background:#111; max-width:90%;"><h3 style="color:var(--gold); text-align:center;">内容の確認</h3><div id="selected-summary" style="font-size:0.85rem; background:#222; padding:20px; border-radius:8px; margin-bottom:25px; border-left:4px solid var(--gold); line-height:1.7; text-align:left;"></div><div class="form-group"><label>お名前</label><input type="text" id="cust-name"></div><div class="form-group"><label>電話番号</label><input type="tel" id="cust-tel"></div><div class="form-group"><label>メール</label><input type="email" id="cust-email"></div><div class="form-group"><label>備考</label><textarea id="cust-memo" rows="3"></textarea></div><button class="btn-reserve" onclick="submitReservation()">予約を確定する</button><button onclick="document.getElementById('info-modal').style.display='none'" style="background:none; border:none; color:#888; width:100%; margin-top:20px;">修正する</button></div></div>
