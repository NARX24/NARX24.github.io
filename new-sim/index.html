<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbzEOzq81mhZCSy4zJyeQ6ObRMimRdNYLlnG7Jz-nAT9VrJ7vtcw7aQto0H-pmf92xMT/exec";
var userType = 'new', currentTab = 'set', selected = [], busySlots = [], weekOffset = 0;
var tDate = "", tTime = "", tEndTime = "", isConciergeON = true, itemLeaves = {};
var suggestionId = null, suggestionReplaceItems = [], dismissedSuggestions = [];
var bubbleTimer = null, internalNumericSlot = 0;

function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
function closeCalendarModal(){ document.getElementById('calendar-modal').style.display='none'; weekOffset=0; }
function changeWeek(n) { weekOffset += n; renderCalendar(); }
function applyOptimalSet() {
    if(!suggestionReplaceItems) return;
    for (var i = 0; i < suggestionReplaceItems.length; i++) { var idx = selected.indexOf(suggestionReplaceItems[i]); if (idx !== -1) selected.splice(idx, 1); }
    selected.push(suggestionId); suggestionId = null; suggestionReplaceItems = []; document.getElementById('suggestion-box').style.display = 'none';
    render(); 
}
function proceedReservation() { if (userType === 'new') { proceedToCalendar(); } else { handleRepeatBooking(); } }
function applyAndProceed() { applyOptimalSet(); document.getElementById('final-suggestion-modal').style.display = 'none'; setTimeout(proceedReservation, 150); }
function cancelAndProceed() { document.getElementById('final-suggestion-modal').style.display = 'none'; proceedReservation(); }
function proceedToCalendar() {
    showLoading(true);
    var xhr = new XMLHttpRequest(); xhr.open("POST", GAS_URL, true);
    xhr.onreadystatechange = function() { if (xhr.readyState === 4) { showLoading(false); if (xhr.status === 200) { try { busySlots = JSON.parse(xhr.responseText); renderCalendar(); document.getElementById('calendar-modal').style.display = 'block'; } catch(e) { alert("予約情報の解析に失敗しました。"); } } } };
    xhr.send(JSON.stringify({type:'getBusySlots'}));
}
function renderCalendar() {
    var wrapper=document.getElementById('calendar-container'), now=new Date();
    var reqMs = internalNumericSlot * 60 * 60 * 1000;
    var firstDay = new Date(); var day = firstDay.getDay(); var diffToMon = (day === 0 ? -6 : 1) - day; firstDay.setDate(firstDay.getDate() + diffToMon + (weekOffset * 7));
    document.getElementById('cal-title').innerText = (firstDay.getMonth()+1)+"/"+firstDay.getDate() + "の週";
    var html='<table class="cal-table"><thead><tr><th>時間</th>';
    var dayNames = ['日','月','火','水','木','金','土'];
    for(var j=0; j<7; j++){
        var d = new Date(firstDay.getTime() + j*24*60*60*1000); var dateStr = d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
        var cls = d.getDay()===0?'sun':(d.getDay()===6?'sat':''); html+='<th class="'+cls+'">'+(d.getMonth()+1)+'/'+d.getDate()+'<br>('+dayNames[d.getDay()]+')</th>';
    }
    html+='</tr></thead><tbody>';
    var times=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30','22:00'];
    times.forEach(function(timeStr) {
        html+='<tr><td>'+timeStr+'</td>';
        for(var d=0; d<7; d++){
            var slotS = new Date(firstDay.getFullYear(), firstDay.getMonth(), firstDay.getDate()+d, timeStr.split(':')[0], timeStr.split(':')[1]);
            var s = slotS.getTime(); var e = s + reqMs; var wDay = slotS.getDay(); var totalM = slotS.getHours()*60 + slotS.getMinutes();
            var dateStrKey = slotS.getFullYear()+'/'+(slotS.getMonth()+1)+'/'+slotS.getDate();
            var isInsideHours = (wDay===0 || wDay===6) ? (totalM>=540 && totalM < 1260) : (totalM>=720 && totalM < 1320);
            var limitHr = (wDay===0 || wDay===6) ? 21 : 22; var limitT = new Date(slotS.getFullYear(), slotS.getMonth(), slotS.getDate(), limitHr, 0).getTime();
            var canFit = (e <= limitT); var isBusy = false;
            for(var b=0; b<busySlots.length; b++){ if(s < (busySlots[b].end + 30*60*1000) && e > (busySlots[b].start - 30*60*1000)) { isBusy = true; break; } };
            if(s < now.getTime()) isBusy = true;
            if(!isInsideHours) html+='<td class="cal-status-off">-</td>'; else if(!canFit || isBusy) html+='<td class="cal-status-x">×</td>'; else {
                var endObj = new Date(e); var endStr = endObj.getHours() + ":" + (endObj.getMinutes() === 0 ? "00" : (endObj.getMinutes() < 10 ? "0" : "") + endObj.getMinutes());
                html+='<td class="cal-status-o" onclick="openInfoModal(\''+dateStrKey+'\', \''+timeStr+'\', \''+endStr+'\')">◎</td>';
            }
        }
        html+='</tr>';
    });
    wrapper.innerHTML = html+'</tbody></table>';
}

    var xhr=new XMLHttpRequest(); xhr.open("POST", GAS_URL, true); xhr.onreadystatechange=function(){ if(xhr.readyState===4){ showLoading(false); alert("予約完了"); location.reload(); }}; xhr.send(JSON.stringify(payload));
}
function handleRepeatBooking() { document.getElementById('guide-hours').innerText = internalNumericSlot.toFixed(1) + " 時間枠"; document.getElementById('repeat-guidance-modal').style.display = 'flex'; }
function toggleConcierge() { isConciergeON = !isConciergeON; var icon = document.getElementById('concierge-icon'); if (isConciergeON) { icon.className = 'concierge-icon on'; checkSuggestion(true); } else { icon.className = 'concierge-icon off'; showConciergeBubble("待機しております。"); document.getElementById('suggestion-box').style.display = 'none'; suggestionId = null; render(); } }
function showConciergeBubble(msg) { var b = document.getElementById('concierge-bubble'); document.getElementById('concierge-msg').innerText = msg; b.style.display = 'block'; b.style.opacity = '1'; if (bubbleTimer) clearTimeout(bubbleTimer); bubbleTimer = setTimeout(function() { b.style.opacity = '0'; setTimeout(function(){b.style.display='none';},300); }, 5000); }
function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none'; var best = analyzeSuggestions(isManual); if (!best) { suggestionId = null; return; }
    suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems; var currentTotal = getOriginalTotal(selected), setItem = menuData[best.sid], newTotal = currentTotal - best.oldPrice + getItemPrice(best.sid);
    var html = '<div class="sug-title">🎉 AIコンシェルジュ</div>';
    if (best.type === 'equal') { html += '<div class="sug-benefit-msg">同じ金額で、さらに部位を増やせます！</div>'; showConciergeBubble("同額でもっとお得になる選び方があります！"); } else if (best.type === 'cheaper') { html += '<div class="sug-benefit-msg">セットの方がお安くなります！</div>'; showConciergeBubble("お安くなる組み合わせを見つけましたよ！"); } else { html += '<div class="sug-benefit-msg">最適なプランをご提案します！</div>'; showConciergeBubble("こちらのセットもおすすめですよ！"); }
    html += '<div class="sug-menu-name">' + setItem.label + '</div><div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在</span><span class="sug-col-price">¥' + currentTotal.toLocaleString() + '</span></div><div class="sug-col"><span class="sug-col-label">追加</span><span class="sug-add-price">' + (best.diff > 0 ? '+¥'+best.diff.toLocaleString() : '±¥0') + '</span></div><div class="sug-col"><span class="sug-col-label">合計</span><span class="sug-col-price" style="color:#c00;">¥' + newTotal.toLocaleString() + '</span></div></div>';
    html += '<div class="sug-btn-group"><button onclick="applyOptimalSet()" class="btn-sug-apply">変更する</button><button onclick="skipSuggestion(\''+suggestionId+'\')" class="btn-sug-skip">今はしない</button></div>';
    document.getElementById('suggestion-box').innerHTML = html; document.getElementById('suggestion-box').style.display = 'block'; render(); 
}
function handleReserveAction() {
    if (selected.length === 0) return alert("メニューを選んでください"); var best = analyzeSuggestions(true);
    if (best && (best.type === 'cheaper' || best.type === 'equal')) {
        var oldNames = []; for(var i=0; i<best.intersectingItems.length; i++) oldNames.push(menuData[best.intersectingItems[i]].label);
        var msg = "現在選択中の【" + oldNames.join(', ') + "】を、よりお得な【" + menuData[best.sid].label + "】に変更しませんか？<br><br>料金はそのままで、部位を増やすことができます。";
        if(best.type === 'cheaper') msg = "現在選択中の【" + oldNames.join(', ') + "】を、セットプラン【" + menuData[best.sid].label + "】に変更しませんか？<br><br>今の選び方よりも ¥" + (Math.abs(best.diff)).toLocaleString() + " お安く予約できます。";
        document.getElementById('final-suggestion-modal').style.display = 'flex'; document.getElementById('final-sug-desc').innerHTML = msg; document.getElementById('final-old-price').innerText = "¥" + getOriginalTotal(selected).toLocaleString(); document.getElementById('final-new-price').innerText = "¥" + (getOriginalTotal(selected) + best.diff).toLocaleString(); return;
    }
    proceedReservation();
}
function skipSuggestion(id) { dismissedSuggestions.push(id); document.getElementById('suggestion-box').style.display='none'; suggestionId=null; render(); }
function updateTotal() {
    var p = 0, t = 0, hasFaceCooling = false; for (var i = 0; i < selected.length; i++) { var sid = selected[i]; var item = menuData[sid]; p += getItemPrice(sid); t += item.time; if (item.cool === 1) hasFaceCooling = true; }
    if (selected.length > 0) { t += 10; if (hasFaceCooling) t += 12; if (userType === 'new') t += 90; }
    var rounded = Math.ceil(t / 30) * 30; internalNumericSlot = (rounded / 60); document.getElementById('total-price').innerText = "¥" + p.toLocaleString(); document.getElementById('total-time-display').innerText = "枠 " + internalNumericSlot.toFixed(1) + " 時間枠";
}
function render() {
    var area = document.getElementById('menu-area'); area.innerHTML=''; var tabs = document.querySelectorAll('.tab'); for (var t = 0; t < tabs.length; t++) { tabs[t].classList.remove('active'); } document.getElementById("tab-" + currentTab).classList.add('active');
    var container = document.getElementById('chips-container'); if (selected.length === 0) { container.innerHTML = '<span style="color:#444; font-size:0.65rem;">部位を選択してください</span>'; } else { container.innerHTML = ''; for (var i = 0; i < selected.length; i++) { var chip = document.createElement('div'); chip.className = 'chip'; chip.innerHTML = '<span>' + menuData[selected[i]].label + '</span><span class="chip-close" onclick="event.stopPropagation(); toggleItem(\'' + selected[i] + '\')">×</span>'; container.appendChild(chip); } }
    var parts = document.querySelectorAll('.layer-part'); for (var p = 0; p < parts.length; p++) { parts[p].classList.remove('active', 'suggest-blink'); }
    var currentLeaves = []; for (var s = 0; s < selected.length; s++) { var sid = selected[s], item = menuData[sid]; if (item.imgs) { if (item.imgs.body) { var b = document.getElementById("img-" + item.imgs.body); if(b) b.classList.add('active'); } if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); } } var lNodes = itemLeaves[sid]; for (var ln = 0; ln < lNodes.length; ln++) { if (currentLeaves.indexOf(lNodes[ln]) === -1) currentLeaves.push(lNodes[ln]); } }
    for (var cl = 0; cl < currentLeaves.length; cl++) { var leaf = menuData[currentLeaves[cl]]; if (leaf.imgs) { if (leaf.imgs.body) { var lb = document.getElementById("img-" + leaf.imgs.body); if(lb) lb.classList.add('active'); } if (leaf.imgs.face) { var lf = document.getElementById("img-" + leaf.imgs.face); if(lf) lf.classList.add('active'); } } }
    var keys = Object.keys(menuData); for (var m = 0; m < keys.length; m++) { var id = keys[m], item = menuData[id]; if (item.cat !== currentTab) continue; var isSel = selected.indexOf(id) !== -1, isDis = false; if (!isSel) { var itemL = itemLeaves[id]; for (var l = 0; l < itemL.length; l++) { if (currentLeaves.indexOf(itemL[l]) !== -1) { isDis = true; break; } } } var div = document.createElement('div'); div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : ''); (function(mid, disabled){ div.onclick = function(){ if(!disabled) toggleItem(mid); }; })(id, isDis); div.innerHTML = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '><div class="item-info"><span class="item-name">' + item.label + '</span></div><div class="item-price">¥' + getItemPrice(id).toLocaleString() + '</div>'; area.appendChild(div); }
    updateTotal();
}
function analyzeSuggestions(isManual) {
    if (!isConciergeON && !isManual) return null; var keys = Object.keys(menuData), currentLeaves = []; for (var s = 0; s < selected.length; s++) { var lNodes = itemLeaves[selected[s]]; for (var ln = 0; ln < lNodes.length; ln++) { if (currentLeaves.indexOf(lNodes[ln]) === -1) currentLeaves.push(lNodes[ln]); } }
    for (var i = 0; i < keys.length; i++) { var sid = keys[i]; if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue; var candLeaves = itemLeaves[sid], foundLeafCount = 0; for (var l = 0; l < candLeaves.length; l++) { if (currentLeaves.indexOf(candLeaves[l]) !== -1) foundLeafCount++; } if (foundLeafCount >= 2) { var intersectingItems = []; for(var j=0; j<selected.length; j++) { var selId = selected[j], selLeaves = itemLeaves[selId], isInc = true; for(var k=0; k<selLeaves.length; k++){ if(candLeaves.indexOf(selLeaves[k]) === -1) isInc=false; } if(isInc) intersectingItems.push(selId); } if (intersectingItems.length < 2) continue; var oldP = getOriginalTotal(intersectingItems), setP = getItemPrice(sid), diff = setP - oldP; if (diff <= 5000) return {sid:sid, type: (diff < 0 ? 'cheaper' : (diff === 0 ? 'equal' : 'upsell')), diff:diff, oldPrice:oldP, intersectingItems:intersectingItems}; } }
    return null;
}
initApp();
</script>
