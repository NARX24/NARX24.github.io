:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;overflow-x:hidden;}

/* ヘッダー */
.header-logo-container { text-align: center; padding: 20px 0 15px; border-bottom: 1px solid var(--gold); margin-bottom: 0px; }
.header-logo-img { width: 170px; height: auto; margin-bottom: 8px; }

/* 💡 固定エリア（パネル＋選択部位＋タブ） */
.sticky-header-group {
    position: sticky; top: 0; z-index: 1000; background: var(--black); padding-bottom: 5px;
}

#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:12px;}
.container{max-width:600px;margin:0 auto;padding:0 20px;}
#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold;}

/* ビジュアル */
.dual-visual-container{display:flex;gap:2px;height:220px;background:var(--light-gray);border:2px solid var(--gold);margin-top:10px;border-radius:8px 8px 0 0;overflow:hidden;}
.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel:first-child{border-right:1px solid #ddd;}
.view-panel span{position:absolute;top:8px;font-size:9px;color:#999;letter-spacing:2px;font-weight:bold;z-index:10;}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}

@keyframes blink-gold {
    0% { opacity: 0.1; filter: drop-shadow(0 0 2px var(--gold)); }
    50% { opacity: 0.95; filter: drop-shadow(0 0 10px var(--gold)); }
    100% { opacity: 0.1; filter: drop-shadow(0 0 2px var(--gold)); }
}
.layer-part.suggest-blink { animation: blink-gold 1.0s infinite ease-in-out; z-index: 3; display: block !important; }

/* 選択部位チップスエリア */
#selected-chips-area { 
    background: #0a0a0a; padding: 10px 12px; border: 2px solid var(--gold); border-top: none; 
    border-radius: 0 0 8px 8px; margin-bottom: 10px;
}
.chips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.chips-title { font-size: 0.7rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }
.btn-reset { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; padding: 3px 8px; font-size: 0.65rem; cursor: pointer; }
.chips-container { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; }
.chip-close { background: var(--gold); color: #000; border-radius: 50%; width: 14px; height: 14px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.55rem; font-weight: bold; cursor: pointer; }

/* タブUI */
.tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:1px solid var(--light-gray);background:var(--black);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.8rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}

/* リピーター案内ポップアップ */
#repeat-guidance-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100002; display: none; justify-content: center; align-items: center; }
.guidance-box { width: 85%; max-width: 400px; background: #111; border: 2px solid var(--gold); border-radius: 12px; padding: 25px; text-align: left; }
.guidance-title { color: var(--gold); font-size: 1.1rem; font-weight: bold; text-align: center; margin-bottom: 20px; letter-spacing: 1px; }
.guidance-step { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 12px; font-size: 0.85rem; line-height: 1.6; border-left: 4px solid var(--gold); }
.guidance-step b { color: var(--gold); font-size: 1rem; }

.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item.disabled{opacity:0.15;cursor:default;filter:grayscale(1);pointer-events: none;}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.special-label { font-size: 0.65rem; color: #999; margin-left: 6px; font-style: italic; }
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;margin-top:2px;}

.sug-title{font-weight:bold;font-size:0.65rem;color:#555;margin-bottom:5px;text-align:center;}
.sug-benefit-msg{text-align:center;font-size:0.65rem;color:var(--gold);background:#111;padding:5px;border-radius:4px;font-weight:bold;margin-bottom:8px;line-height:1.3;}

.sug-upsell-panel{background:rgba(255,255,255,0.85);padding:8px 5px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.sug-upsell-col{flex:1;text-align:center;}
.sug-upsell-label{font-size:0.55rem;color:#333;}
.sug-upsell-price{font-size:0.85rem;color:#111;font-weight:bold;}
.sug-upsell-price.red{color:#c00;}
.sug-upsell-price.large-red{color:#c00;font-size:1.1rem;}

.sug-btn-group{display:flex; gap:8px; margin-top:10px;}
.btn-sug-apply{background:#000; color:#fff; border:1px solid #000; padding:10px; border-radius:6px; font-weight:bold; flex:1.5; cursor:pointer;}
.btn-sug-skip{background:transparent; color:#111; border:none; flex:1; font-weight:bold; cursor:pointer; font-size: 0.75rem;}

#concierge-wrapper{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;align-items:center;flex-direction:column;pointer-events:none;}

.bubble-tail{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fff;}
.concierge-icon{width:56px;height:56px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.8);pointer-events:auto;transition:0.3s;border:2px solid var(--gold);}

    set_fullbody_novio:['set_upperbody','set_fullface','set_arms','set_legs','part_nape','part_chest_nipple','part_abdomen_navel','part_back_upper','part_back_lower'],
    set_fullface_vio:['set_fullface','set_vio'],
    set_vio:['part_v_line','part_i_line','part_o_line'],
    set_vio_buttocks:['set_vio','part_buttocks'],
    set_chest_abdomen:['part_chest_nipple','part_abdomen_navel'],
    set_arms_legs:['set_arms','set_legs'],
    set_arms:['part_elbow_upper','part_elbow_lower','part_hand_finger'],
    set_legs:['part_knee_upper','part_knee_lower','part_foot_toe']
};

function getItemPrice(id) {
    var item = menuData[id];
    if (userType === 'new') {
        var face5 = ['part_nose_under','part_mouth_under','part_cheek','part_face_line','part_neck'];
        if (face5.indexOf(id) !== -1) return 1000;
        if (id === 'set_fullface') return 5000;
        return item.price * 0.5;
    }
    return item.price;
}

function getOriginalTotal(idList) {
    var total = 0;
    for (var i = 0; i < idList.length; i++) { total += getItemPrice(idList[i]); }
    return total;
}

// ==========================================
// 3. アプリ制御
// ==========================================
function forceStart(t) {
    document.getElementById('gate-modal').style.display='none'; userType=t;
    document.getElementById('mode-display').innerText = t==='new'?"【ご新規様】初回価格適用中":"【会員様】通常価格モード";
    document.getElementById('action-btn-container').innerHTML = '<button class="btn-reserve" onclick="handleReserveAction()">予約を確認して次へ</button>';
    initApp(); render();
    showConciergeBubble("NARXへようこそ！最適なプラン探しをお手伝いしますね。");
}

function initApp() {
    function getLeafNodes(id) {
        var leaves = [];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) {
                for (var i = 0; i < setIncludes[nodeId].length; i++) { traverse(setIncludes[nodeId][i]); }
            } else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id); return leaves;
    }
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) { itemLeaves[keys[i]] = getLeafNodes(keys[i]); }
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    for (var j = 0; j < keys.length; j++) {
        var item = menuData[keys[j]];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    }
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png"; img.id = layerId; img.className = 'layer-part';
    img.onerror = function() { this.style.display = 'none'; };
    parent.appendChild(img);
}

function changeTab(t){ currentTab=t; render(); }
function resetSelection(){ selected = []; suggestionId = null; suggestionReplaceItems = []; dismissedSuggestions = []; document.getElementById('suggestion-box').style.display='none'; render(); }
function toggleItem(id){ 
    document.getElementById('suggestion-box').style.display='none'; 
    var idx=selected.indexOf(id); if(idx!==-1)selected.splice(idx,1); else selected.push(id); 
    checkSuggestion(false); render(); 
}

function render() {
    var area = document.getElementById('menu-area'); area.innerHTML='';
    var tabs = document.querySelectorAll('.tab');
    for (var t = 0; t < tabs.length; t++) { tabs[t].classList.remove('active'); }
    document.getElementById("tab-" + currentTab).classList.add('active');

    var chipsArea = document.getElementById('selected-chips-area'), container = document.getElementById('chips-container');
    if (selected.length === 0) { 
        container.innerHTML = '<span style="color:#444; font-size:0.65rem;">部位を選択してください</span>'; 
    } else {
        container.innerHTML = '';
        for (var i = 0; i < selected.length; i++) {
            var chip = document.createElement('div'); chip.className = 'chip';
            chip.innerHTML = '<span>' + menuData[selected[i]].label + '</span><span class="chip-close" onclick="event.stopPropagation(); toggleItem(\'' + selected[i] + '\')">×</span>';
            container.appendChild(chip);
        }
    }

    var parts = document.querySelectorAll('.layer-part');
    for (var p = 0; p < parts.length; p++) { parts[p].classList.remove('active', 'suggest-blink'); }
    
    var currentLeaves = [];
    for (var s = 0; s < selected.length; s++) {
        var sid = selected[s], item = menuData[sid];
        if (item.imgs) {
            if (item.imgs.body) { var b = document.getElementById("img-" + item.imgs.body); if(b) b.classList.add('active'); }
            if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); }
        }
        var lNodes = itemLeaves[sid];
        for (var ln = 0; ln < lNodes.length; ln++) { if (currentLeaves.indexOf(lNodes[ln]) === -1) currentLeaves.push(lNodes[ln]); }
    }
    for (var cl = 0; cl < currentLeaves.length; cl++) {
        var leaf = menuData[currentLeaves[cl]];
        if (leaf.imgs) {
            if (leaf.imgs.body) { var lb = document.getElementById("img-" + leaf.imgs.body); if(lb) lb.classList.add('active'); }
            if (leaf.imgs.face) { var lf = document.getElementById("img-" + leaf.imgs.face); if(lf) lf.classList.add('active'); }
        }
    }
    
    if (suggestionId) {
        var sugLeaves = itemLeaves[suggestionId];
        for (var sl = 0; sl < sugLeaves.length; sl++) {
            var leafId = sugLeaves[sl];
            if (currentLeaves.indexOf(leafId) === -1) { 
                var sLeaf = menuData[leafId];
                if (sLeaf.imgs) {
                    if (sLeaf.imgs.body) { var siBody = document.getElementById("img-" + sLeaf.imgs.body); if(siBody) siBody.classList.add('suggest-blink'); }
                    if (sLeaf.imgs.face) { var siFace = document.getElementById("img-" + sLeaf.imgs.face); if(siFace) siFace.classList.add('suggest-blink'); }
                }
            }
        }
    }

    var keys = Object.keys(menuData);
    var subCats = (currentTab === 'part') ? [{id:'face', label:'顔'}, {id:'upper', label:'上半身'}, {id:'lower', label:'下半身'}] : [{id:'none', label:''}];
    for (var sc = 0; sc < subCats.length; sc++) {
        var sub = subCats[sc];
        if (currentTab === 'part') {
            var header = document.createElement('div');
            header.style.color="var(--gold)"; header.style.fontSize="0.9rem"; header.style.textAlign="center"; header.style.padding="25px 0 15px"; header.style.fontWeight="bold";
            header.innerText = sub.label; area.appendChild(header);
        }
        for (var m = 0; m < keys.length; m++) {
            var id = keys[m], item = menuData[id];
            if (item.cat !== currentTab) continue;
            if (currentTab === 'part' && item.subCat !== sub.id) continue;
            
            var isSel = selected.indexOf(id) !== -1, isDis = false;
            if (!isSel) {
                var itemL = itemLeaves[id];
                for (var l = 0; l < itemL.length; l++) { 
                    if (currentLeaves.indexOf(itemL[l]) !== -1) { isDis = true; break; } 
                }
            }
            
            var div = document.createElement('div');
            div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : '');
            (function(mid, disabled){ div.onclick = function(){ if(!disabled) toggleItem(mid); }; })(id, isDis);
            var price = getItemPrice(id);
            var specialTag = item.isSpecial ? '<span class="special-label">（特殊部位）</span>' : '';
            div.innerHTML = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '>' +
                            '<div class="item-info"><span class="item-name">' + item.label + specialTag + '</span></div>' +
                            '<div class="item-price">¥' + price.toLocaleString() + '</div>';
            area.appendChild(div);
        }
    }
    updateTotal();
}

function updateTotal() {
    var p = 0, t = 0, hasFaceCooling = false;
    for (var i = 0; i < selected.length; i++) {
        var sid = selected[i]; var item = menuData[sid];
        p += getItemPrice(sid); t += item.time;
        if (item.cool === 1) hasFaceCooling = true;
    }
    if (selected.length > 0) {
        t += 10; if (hasFaceCooling) t += 12; if (userType === 'new') t += 90;
    }
    var rounded = Math.ceil(t / 30) * 30;
    var hrs = Math.floor(rounded / 60); var mins = rounded % 60;
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-display').innerText = (hrs > 0 ? hrs + "時間" : "") + (mins > 0 ? mins + "分" : (hrs === 0 ? "0分" : ""));
}

// 💡 誠実なAIロジック
function analyzeSuggestions(isManual) {
    if (!isConciergeON && !isManual) return null;
    var keys = Object.keys(menuData);
    var currentLeaves = [];
    for (var s = 0; s < selected.length; s++) {
        var lNodes = itemLeaves[selected[s]];
        for (var ln = 0; ln < lNodes.length; ln++) { if (currentLeaves.indexOf(lNodes[ln]) === -1) currentLeaves.push(lNodes[ln]); }
    }
    for (var i = 0; i < keys.length; i++) {
        var sid = keys[i]; if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue;
        var candLeaves = itemLeaves[sid], foundLeafCount = 0;
        for (var l = 0; l < candLeaves.length; l++) { if (currentLeaves.indexOf(candLeaves[l]) !== -1) foundLeafCount++; }
        if (foundLeafCount >= 2) {
            var intersectingItems = [];
            for(var j=0; j<selected.length; j++) {
                var selId = selected[j], selLeaves = itemLeaves[selId], isInc = true;
                for(var k=0; k<selLeaves.length; k++){ if(candLeaves.indexOf(selLeaves[k]) === -1) isInc=false; }
                if(isInc) intersectingItems.push(selId);
            }
            if (intersectingItems.length < 2) continue;
            var oldP = getOriginalTotal(intersectingItems), setP = getItemPrice(sid), diff = setP - oldP;
            var wasDismissed = (dismissedSuggestions.indexOf(sid) !== -1);
            if (diff <= 10000 && (diff <= 0 || !wasDismissed)) return {sid:sid, type: (diff < 0 ? 'cheaper' : (diff === 0 ? 'same' : 'upsell')), diff:diff, oldPrice:oldP, intersectingItems:intersectingItems};
        }
    }
    return null;
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    var best = analyzeSuggestions(isManual);
    if (!best) { suggestionId = null; render(); return; }
    suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems;
    var currentTotal = getOriginalTotal(selected), setItem = menuData[best.sid], newTotal = currentTotal - best.diff;
    var html = '<div class="sug-title">🎉 AIコンシェルジュ</div>';
    
    // 💡 誠実なメッセージ出し分け
    if (best.type === 'cheaper') {
        html += '<div class="sug-benefit-msg">✨ セットプランの方がお安くなります！</div>';
    } else if (best.type === 'same') {
        html += '<div class="sug-benefit-msg">✨ 同じ金額で他の部位も追加できます！</div>';
    } else {
        html += '<div class="sug-benefit-msg">✨ あと少しの追加で、もっとおトクに！</div>';
    }
    
    html += '<div class="sug-menu-name">' + setItem.label + '</div>';
    html += '<div class="sug-upsell-panel"><div class="sug-upsell-col"><span class="sug-upsell-label">現在</span><span class="sug-upsell-price">¥' + currentTotal.toLocaleString() + '</span></div><div class="sug-upsell-col"><span class="sug-upsell-label">変更後</span><span class="sug-upsell-price large-red">¥' + getItemPrice(best.sid).toLocaleString() + '</span></div></div>';
    html += '<div class="sug-btn-group"><button onclick="applyOptimalSet()" class="btn-sug-apply">変更する</button><button onclick="skipSuggestion(\''+suggestionId+'\')" class="btn-sug-skip">今はしない</button></div>';
    
    document.getElementById('suggestion-box').innerHTML = html; document.getElementById('suggestion-box').style.display = 'block';
    if(isConciergeON) showConciergeBubble("オーナー中島おすすめの、おトクな組み合わせを見つけました！");
    render(); 
}

function skipSuggestion(id) { dismissedSuggestions.push(id); document.getElementById('suggestion-box').style.display='none'; suggestionId=null; render(); }
function applyOptimalSet() {
    for (var i = 0; i < suggestionReplaceItems.length; i++) { var idx = selected.indexOf(suggestionReplaceItems[i]); if (idx !== -1) selected.splice(idx, 1); }
    selected.push(suggestionId); suggestionId = null; suggestionReplaceItems = []; document.getElementById('suggestion-box').style.display = 'none'; render();
}

function toggleConcierge() {
    isConciergeON = !isConciergeON; var icon = document.getElementById('concierge-icon');
    if (isConciergeON) { icon.className = 'concierge-icon on'; checkSuggestion(true); showConciergeBubble("お呼び出しありがとうございます！改めて最適なプランを計算しますね。"); } 
    else { 
        icon.className = 'concierge-icon off'; 
        document.getElementById('suggestion-box').style.display = 'none'; 
        suggestionId = null; 
        showConciergeBubble("承知いたしました。待機しておりますので、おトクなご案内が必要になればお気軽にお呼びください。");
        render(); 
    }
}

function showConciergeBubble(msg) {
    var b = document.getElementById('concierge-bubble'); document.getElementById('concierge-msg').innerText = msg;
    b.style.display = 'block'; setTimeout(function() { b.style.opacity = '1'; }, 10);
    if (bubbleTimer) clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(function() { b.style.opacity = '0'; setTimeout(function(){b.style.display='none';},300); }, 5000);
}

function handleReserveAction() {
    if (selected.length === 0) return alert("メニューを選んでください");
    var best = analyzeSuggestions(true);
    if (best) {
        var msg = best.type === 'same' ? "同じ金額で部位の多い『" + menuData[best.sid].label + "』に変更できますが、このまま進みますか？" : "よりおトクな『" + menuData[best.sid].label + "』に変更して予約しますか？";
        var conf = confirm("【最後にNARX中島からご確認です】\n" + msg);
        if(conf) { applyOptimalSet(); return; }
    }
    if (userType === 'new') { alert("予約カレンダーへ進みます（新規客フロー）"); } else { handleRepeatBooking(); }
}

function handleRepeatBooking() {
    var priceText = document.getElementById('total-price').innerText;
    var timeDisp = document.getElementById('total-time-display').innerText;
    var menuLabels = []; for(var i=0; i<selected.length; i++){ menuLabels.push(menuData[selected[i]].label); }
    var copyText = "【NARX 予約内容】\nメニュー: " + menuLabels.join(', ') + "\n合計金額: " + priceText + "\n予約枠: " + timeDisp;
    var tempArea = document.createElement("textarea"); tempArea.value = copyText; document.body.appendChild(tempArea); tempArea.select(); document.execCommand("copy"); document.body.removeChild(tempArea);
    document.getElementById('guide-hours').innerText = timeDisp;
    document.getElementById('repeat-guidance-modal').style.display = 'flex';
}
</script>
