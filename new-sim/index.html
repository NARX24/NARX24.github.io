<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NARX 料金＆時間シミュレーター Ver.36.7</title>
<script>
// 【超強力エラー検知】HTML描画前でもエラーを拾って表示します
window.onerror = function(msg, url, line) {
    alert("システムエラーが発生しました:\n" + msg + "\n行番号: " + line + "\n※この画面をスクショしてお知らせください");

<style>
:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;overflow-x:hidden;}

/* ロゴデザイン */
.gate-logo-container { text-align: center; margin-bottom: 30px; }
.gate-logo-img { width: 220px; height: auto; }
.header-logo-container { text-align: center; padding: 20px 0 15px; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
.header-logo-img { width: 170px; height: auto; margin-bottom: 8px; }

#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:12px;}
.container{max-width:600px;margin:0 auto;padding:0 20px;}

#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold;}

.dual-visual-container{display:flex;gap:4px;height:240px;position:sticky;top:10px;z-index:50;background:var(--light-gray);border:2px solid var(--gold);margin-bottom:20px;border-radius:8px;overflow:hidden;}
.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel:first-child{border-right:1px solid #ddd;}
.view-panel span{position:absolute;top:8px;font-size:9px;color:#999;letter-spacing:2px;font-weight:bold;z-index:10;}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}

@keyframes blink-gold {
    0% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
    50% { opacity: 0.85; filter: drop-shadow(0 0 10px var(--gold)); }
    100% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
}
.layer-part.suggest-blink { animation: blink-gold 1.2s infinite ease-in-out; z-index: 3; }

.tabs{display:flex;gap:5px;margin-bottom:15px;border-bottom:1px solid var(--light-gray);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.85rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}

#selected-chips-area { margin-bottom: 15px; background: #0a0a0a; padding: 12px; border-radius: 8px; border: 1px solid #222; }
.chips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.chips-title { font-size: 0.75rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }
.btn-reset { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; }
.chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
.chip-close { background: var(--gold); color: #000; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.6rem; font-weight: bold; cursor: pointer; }

.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item.disabled{opacity:0.15;cursor:default;filter:grayscale(1);}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;margin-top:2px;}
.price-tag-new { font-size: 0.65rem; background: #c00; color: #fff; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }

/* AIコンシェルジュ 提案モーダル */
#suggestion-box{position:fixed;bottom:190px;left:50%;transform:translateX(-50%);width:92%;max-width:420px;background:linear-gradient(135deg,#f7d05e 0%,#d4af37 100%);color:#111;padding:20px;border-radius:12px;display:none;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.8);border:1px solid #fff;}
.sug-title{font-weight:bold;font-size:0.85rem;color:#555;margin-bottom:12px;text-align:center;}
.sug-benefit-msg{text-align:center;font-size:0.75rem;color:var(--gold);background:#111;padding:10px;border-radius:4px;font-weight:bold;margin-bottom:15px;letter-spacing:0.5px;}
.sug-menu-name{font-size:1.15rem;font-weight:bold;color:#111;margin-bottom:4px;text-align:center;}
.sug-menu-sub{font-size:0.75rem;color:#333;text-align:center;margin-bottom:15px;}
.sug-upsell-panel{background:rgba(255,255,255,0.85);padding:15px 5px;border-radius:8px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:flex-start;}
.sug-upsell-col{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;}
.sug-upsell-label{font-size:0.65rem;color:#333;margin-bottom:8px;}
.sug-upsell-price{font-size:1.05rem;color:#111;font-weight:bold;}
.sug-upsell-price.red{color:#c00;font-size:1.15rem;}
.sug-upsell-price.large-red{color:#c00;font-size:1.35rem;}
.sug-upsell-arrow{color:#c00;font-size:0.6rem;margin-top:4px;}
.sug-discount-box{background:#111;color:var(--gold);font-size:0.75rem;padding:10px;border-radius:4px;text-align:center;font-weight:bold;margin-bottom:15px;width:95%;margin-left:auto;margin-right:auto;box-sizing:border-box;}
.sug-note{font-size:0.65rem;color:#333;text-align:left;line-height:1.5;margin-top:15px;border-top:1px dashed rgba(0,0,0,0.2);padding-top:12px;}

.sug-compare-panel{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.75);padding:12px 10px;border-radius:8px;margin-bottom:10px;border:1px solid rgba(0,0,0,0.1);}
.sug-col{flex:1;text-align:center;}
.sug-col-label{font-size:0.65rem;color:#555;display:block;margin-bottom:2px;font-weight:bold;}
.sug-col-price{font-size:1rem;color:#111;font-weight:bold;}
.sug-col-price.old{text-decoration:line-through;color:#888;font-size:0.9rem;}
.sug-col-price.new{font-size:1.3rem;color:#c00;}
.sug-arrow{padding:0 5px;color:#c00;font-weight:bold;text-align:center;font-size:1.2rem;}

#concierge-wrapper{display:flex;position:fixed;bottom:85px;left:50%;transform:translateX(-50%);z-index:1000;align-items:center;flex-direction:column;pointer-events:none;}
#concierge-bubble{display:none;background:#fff;color:#111;padding:12px 16px;border-radius:12px;font-size:0.75rem;font-weight:bold;margin-bottom:12px;box-shadow:0 4px 15px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.3s ease;position:relative;text-align:center;pointer-events:auto;}
.bubble-tail{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fff;}
.concierge-icon{width:55px;height:55px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.8);pointer-events:auto;}
.concierge-icon.on{background:var(--gold);border:2px solid var(--gold);}
.concierge-icon.off{background:#111;border:3px solid var(--gold);}

/* 各種モーダル */
#copy-complete-modal, #final-confirm-modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100000;display:none;justify-content:center;align-items:center;}
.final-modal-content{border:1px solid var(--gold);padding:30px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:8px;}

/* カレンダー新デザイン（白背景×ゴールド） */
#calendar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100000; display: none; overflow-y: auto; padding-bottom: 50px; }
.cal-header { position: sticky; top: 0; background: #080808; padding: 15px; border-bottom: 1px solid var(--gold); text-align: center; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
.cal-title { color: var(--gold); font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; }
.btn-close-cal { background: transparent; color: #fff; border: 1px solid #555; padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }

.cal-week-nav { display: flex; justify-content: space-between; padding: 15px; align-items: center; font-size: 0.85rem; color: #ccc; background: #111;}
.cal-week-btn { color: var(--gold); cursor: pointer; padding: 6px 12px; border: 1px solid #444; border-radius: 4px; background: #222; font-weight: bold; }
.cal-note { font-size: 0.75rem; color: #ccc; text-align: center; margin-bottom: 10px; padding: 5px 15px; line-height: 1.6; }

.cal-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0; margin-bottom: 20px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
.cal-table { width: 100%; border-collapse: collapse; text-align: center; background: #fff; }
.cal-table th, .cal-table td { border: 1px solid #e0e0e0; padding: 15px 5px; min-width: 50px; font-size: 0.85rem; }
.cal-table th { background: #f7f7f7; color: #333; font-weight: bold; line-height: 1.4; }
.cal-table th.time-col { color: #111; font-weight: bold; position: sticky; left: 0; background: #fdfdfd; z-index: 2; border-right: 2px solid var(--gold); width: 50px; }

.cal-status-o { color: #c09015; font-size: 1.4rem; cursor: pointer; transition: 0.2s; font-weight: bold; }
.cal-status-o:active { background: #f0f0f0; transform: scale(0.9); }
.cal-status-x { color: #bbb; font-size: 1.2rem; }
.cal-status-hyphen { color: #eee; font-size: 1.2rem; }

.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,5,5,0.98);border-top:2px solid var(--gold);padding:15px 20px;box-sizing:border-box;z-index:100;}
.summary-grid{display:grid;grid-template-columns:1fr 1.1fr;margin-bottom:12px;}
.summary-item .label{font-size:0.7rem;color:#999;display:block;}
.summary-item .val{font-size:1.35rem;color:var(--gold);font-weight:bold;}
.summary-item .counseling-note{font-size:0.6rem;color:#fff;background:#c00;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:2px;}
.btn-group{display:flex;gap:10px; width: 100%;}
.btn{flex:1;padding:15px;text-align:center;border-radius:6px;font-weight:bold;font-size:0.9rem;border:none;cursor:pointer;}
.btn-reserve{background:var(--gold);color:#000;}
</style>
</head>
<body>

<div id="gate-modal">
    <div class="modal-content">
        <div class="gate-logo-container">
            <img src="logo_white.png" class="gate-logo-img" alt="NARX LOGO" onerror="this.style.display='none'">
        </div>
        <h2 style="color: var(--gold); margin-bottom: 10px; letter-spacing: 2px;">WELCOME</h2>
        <p style="font-size: 0.85rem; line-height: 1.8; margin-bottom: 35px; color: #bbb;">現在の状況を選択してください。</p>
        <!-- 新規ならカレンダーへ、会員ならコピーへ -->
        <button class="btn btn-reserve" style="width: 100%; margin-bottom: 15px;" onclick="forceStart('new')">初めて来店する（初回価格）</button>
        <button class="btn btn-reserve" style="width: 100%; background: #222; color: #fff;" onclick="forceStart('repeat')">既に会員である（通常価格）</button>
    </div>
</div>

<div class="container">
    <div class="header-logo-container">
        <img src="logo_white.png" class="header-logo-img" alt="NARX LOGO" onerror="this.style.display='none'">
        <div><div id="mode-display">新規予約モード</div></div>
    </div>

    <div class="dual-visual-container">
        <div class="view-panel" id="body-panel"><span>BODY</span><img src="base_body.png" class="base-img"></div>
        <div class="view-panel" id="face-panel"><span>FACE</span><img src="base_face.png" class="base-img"></div>
    </div>

    <div class="tabs">
        <div id="tab-set" class="tab active" onclick="changeTab('set')">セットメニュー</div>
        <div id="tab-part" class="tab" onclick="changeTab('part')">パーツメニュー</div>
        <div id="tab-other" class="tab" onclick="changeTab('other')">その他</div>

    <div id="selected-chips-area" style="display: none;">

            <span class="chips-title">現在選択中のメニュー</span>

    </div>

    <div id="menu-area"></div>
</div>

<div id="concierge-wrapper">

    <div id="concierge-icon" class="concierge-icon on" onclick="toggleConcierge()">

            <line x1="50" y1="82" x2="50" y2="100" stroke="#d4af37" stroke-width="4" />
            <circle cx="44" cy="88" r="2" fill="#d4af37" /><circle cx="44" cy="96" r="2" fill="#d4af37" />
        </svg>
    </div>
</div>

<div id="suggestion-box"></div>

<!-- 最終確認モーダル（ボタンの文言はJSで動的に変わります） -->
<div id="final-confirm-modal">
    <div class="final-modal-content">
        <h3 style="color:var(--gold);margin-top:0;">💡 最終ご提案</h3>
        <p id="final-confirm-text" style="font-size:0.85rem;line-height:1.6;color:#ddd;margin-bottom:20px;"></p>
        <button id="final-confirm-btn-accept" style="width:100%;background:var(--gold);color:#000;border:none;padding:14px;border-radius:6px;font-weight:bold;margin-bottom:12px;"></button>
        <button id="final-confirm-btn-reject" style="width:100%;background:transparent;color:#888;border:1px solid #444;padding:12px;border-radius:6px;font-weight:bold;"></button>
    </div>
</div>

<!-- コピー完了モーダル（会員用） -->
<div id="copy-complete-modal">
    <div class="final-modal-content" style="padding: 35px 20px;">
        <div style="font-size:2.5rem; margin-bottom:10px;">📋</div>
        <h3 style="color:var(--gold); letter-spacing: 2px;">COPY COMPLETED</h3>
        <p style="font-size: 0.8rem; color: #ccc; line-height: 1.6; margin-top: 15px;">ご希望の部位をコピーいたしました。<br>予約ページへ移動後、以下の手順でご予約ください。</p>
        <button onclick="goToReserve()" style="width:100%;background:var(--gold);color:#000;border:none;padding:16px;border-radius:6px;font-weight:bold;margin-bottom:15px;font-size:0.95rem;">予約ページへ進む</button>
        <button onclick="closeCopyModal()" style="width:100%;background:transparent;color:#888;border:none;padding:10px;font-size:0.8rem;">閉じる</button>
    </div>
</div>

<!-- カレンダーモーダル（新規用） -->
<div id="calendar-modal">
    <div class="cal-header">
        <div class="cal-title">ご予約日時の選択</div>
        <button class="btn-close-cal" onclick="closeCalendarModal()">戻る</button>
    </div>
    <div class="cal-week-nav">
        <span class="cal-week-btn">◀ 前の週</span>
        <span id="cal-month-display" style="font-weight:bold; color:#fff;">2026年3月</span>
        <span class="cal-week-btn">次の週 ▶</span>
    </div>
    <p class="cal-note">ご希望の時間帯（◎）をタップしてください。<br>※現在表示しているのは仮のデモデータです。</p>
    
    <div class="cal-wrapper" id="calendar-container">
        <!-- JSでテーブルを生成 -->
    </div>
</div>

<div class="bottom-bar">
    <div class="summary-grid">
        <div class="summary-item"><span class="label">料金合計 (税込)</span><span class="val" id="total-price">¥0</span></div>

            <div id="counseling-badge-area"></div>
        </div>
    </div>
    <!-- ユーザーの選択によってここが出し分けられます -->
    <div class="btn-group" id="action-btn-container"></div>
</div>

<script>

function getItemPrice(id) {
    var item = menuData[id];
    if (userType === 'new') {
        var face5 =['part_nose_under','part_mouth_under','part_cheek','part_face_line','part_neck'];
        if (face5.indexOf(id) !== -1) return 1000;
        if (id === 'set_fullface') return 5000;
        return item.price * 0.5;
    }
    return item.price;
}

function getOriginalTotal(idList) {
    var total = 0;
    for (var i = 0; i < idList.length; i++) {
        total += getItemPrice(idList[i]);
    }
    return total;
}

function getTheoreticalOriginalPrice(setId) {
    var leaves = itemLeaves[setId];
    var total = 0;
    if(leaves) {
        for (var i = 0; i < leaves.length; i++) {
            if (menuData[leaves[i]]) total += getItemPrice(leaves[i]);
        }
    }
    return total;
}

function initApp() {
    function getLeafNodes(id) {
        var leaves =[];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) { 
                for (var i = 0; i < setIncludes[nodeId].length; i++) {
                    traverse(setIncludes[nodeId][i]);
                }
            } else { 
                if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); 
            }
        }
        traverse(id); return leaves;
    }
    
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) {
        itemLeaves[keys[i]] = getLeafNodes(keys[i]);
    }
    
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    for (var j = 0; j < keys.length; j++) {
        var item = menuData[keys[j]];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    }
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png"; img.id = layerId; img.className = 'layer-part';
    img.onerror = function() { this.style.display = 'none'; };
    parent.appendChild(img);
}

    var idx = selected.indexOf(id);
    if (idx !== -1) { selected.splice(idx, 1); lastToggledItem = null; } 
    else { selected.push(id); lastToggledItem = id; }

function render() {
    var area = document.getElementById('menu-area'); area.innerHTML = '';
    
    var tabsElements = document.querySelectorAll('.tab');
    for (var t = 0; t < tabsElements.length; t++) {
        tabsElements[t].classList.remove('active');
    }
    var activeTab = document.getElementById("tab-" + currentTab); 
    if(activeTab) activeTab.classList.add('active');
    
    renderChips();
    
    var layerParts = document.querySelectorAll('.layer-part');
    for (var p = 0; p < layerParts.length; p++) {
        layerParts[p].classList.remove('active');
        layerParts[p].classList.remove('suggest-blink');
    }
    
    var selectedLeaves =[];
    for (var i = 0; i < selected.length; i++) {
        var id = selected[i];
        if(itemLeaves[id]) { 
            for(var l = 0; l < itemLeaves[id].length; l++) {
                var leaf = itemLeaves[id][l];
                if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf); 
            }
        }
    }
    
    for (var j = 0; j < selected.length; j++) {
        var item = menuData[selected[j]];
        if (item.imgs) {
            if (item.imgs.body) { var bodyImg = document.getElementById("img-" + item.imgs.body); if(bodyImg) bodyImg.classList.add('active'); }
            if (item.imgs.face) { var faceImg = document.getElementById("img-" + item.imgs.face); if(faceImg) faceImg.classList.add('active'); }
        }
    }
    
    for (var k = 0; k < selectedLeaves.length; k++) {
        var leafItem = menuData[selectedLeaves[k]];
        if (leafItem && leafItem.imgs) {
            if (leafItem.imgs.body) { var lBody = document.getElementById("img-" + leafItem.imgs.body); if(lBody) lBody.classList.add('active'); }
            if (leafItem.imgs.face) { var lFace = document.getElementById("img-" + leafItem.imgs.face); if(lFace) lFace.classList.add('active'); }
        }
    }

    var keys = Object.keys(menuData);
    for (var m = 0; m < keys.length; m++) {
        var menuId = keys[m];
        var menuItem = menuData[menuId];
        if (menuItem.cat !== currentTab) continue;
        
        var isSel = selected.indexOf(menuId) !== -1, isDis = false;
        if (!isSel && itemLeaves[menuId]) { 
            for (var n = 0; n < itemLeaves[menuId].length; n++) {
                if (selectedLeaves.indexOf(itemLeaves[menuId][n]) !== -1) { isDis = true; break; }
            }
        }
        
        var div = document.createElement('div'); 
        div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : '');
        div.setAttribute('data-id', menuId);
        (function(id, disabled) {
            div.onclick = function() { if(!disabled) toggleItem(id); };
        })(menuId, isDis);
        
        var price = getItemPrice(menuId);
        var inner = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '>';
        inner += '<div class="item-info"><span class="item-name">' + menuItem.label + '</span>';
        if(menuItem.sub) inner += '<span class="item-sub" style="font-size:0.7rem; color:#888;">' + menuItem.sub + '</span>';
        inner += '</div><div class="item-price">¥' + price.toLocaleString();
        if(userType === 'new') inner += '<span class="price-tag-new">初回</span>';
        inner += '</div>';
        
        div.innerHTML = inner; 
        area.appendChild(div);
    }
    
    updateTotal();
    
    if (suggestionId) {
        var sLeaves = itemLeaves[suggestionId];
        for (var s = 0; s < sLeaves.length; s++) {
            var sItem = menuData[sLeaves[s]];
            if (sItem && sItem.imgs) {
                if (sItem.imgs.body) { var siBody = document.getElementById("img-" + sItem.imgs.body); if(siBody && !siBody.classList.contains('active')) siBody.classList.add('suggest-blink'); }
                if (sItem.imgs.face) { var siFace = document.getElementById("img-" + sItem.imgs.face); if(siFace && !siFace.classList.contains('active')) siFace.classList.add('suggest-blink'); }
            }
        }
    }
}

function updateTotal() {
    var p = 0, t = 0, f = false;
    for (var i = 0; i < selected.length; i++) {
        var id = selected[i];
        p += getItemPrice(id); 
        t += menuData[id].time; 
        if(menuData[id].hasFace) f = true;
    }
    
    if (selected.length > 0) {
        if (userType === 'new') { t += 90; if (f) t += 20; document.getElementById('counseling-badge-area').innerHTML = '<span class="counseling-note">※無料カウンセリング込</span>'; } 
        else { if (f) t += 20; document.getElementById('counseling-badge-area').innerHTML = ''; }
    } else { document.getElementById('counseling-badge-area').innerHTML = ''; }
    
    var rounded = Math.ceil(t / 30) * 30, slot = Math.floor(rounded / 60) + "." + ((rounded % 60) === 30 ? '5' : '0');
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-slot').innerText = slot + " 時間枠";
}

function analyzeSuggestions(isManual) {
    var cheaperCandidates =[], samePriceCandidates = [], upsellCandidates =[];
    var upsellLimit = (userType === 'new') ? 5000 : 10000;
    var keys = Object.keys(menuData);

    for (var i = 0; i < keys.length; i++) {
        var sid = keys[i];
        if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue;
        
        var candLeaves = itemLeaves[sid], intersectingItems =[], intersectingLeaves =[], isCovered = true;
        
        for (var j = 0; j < selected.length; j++) {
            var selId = selected[j];
            var selLeaves = itemLeaves[selId], hasInt = false;
            for (var k = 0; k < selLeaves.length; k++) {
                if (candLeaves.indexOf(selLeaves[k]) !== -1) { hasInt = true; } 
                else { isCovered = false; }
            }
            if (hasInt) { 
                intersectingItems.push(selId); 
                for (var l = 0; l < selLeaves.length; l++) {
                    if(intersectingLeaves.indexOf(selLeaves[l]) === -1) intersectingLeaves.push(selLeaves[l]);
                }
            }
        }

        if (intersectingItems.length >= 1 && isCovered) {
            var oldP = getOriginalTotal(intersectingItems);
            var setP = getItemPrice(sid);
            var diff = setP - oldP;
            var addedLeaves = candLeaves.length - intersectingLeaves.length;

            if (diff < 0 && intersectingItems.length >= 2) {
                cheaperCandidates.push({sid:sid, type:'cheaper', oldPrice:oldP, diff:diff, intersectingItems:intersectingItems});
            } else if (diff === 0 && addedLeaves > 0 && intersectingItems.length >= 2) {
                samePriceCandidates.push({sid:sid, type:'samePrice', oldPrice:oldP, diff:0, intersectingItems:intersectingItems});
            } else if (diff > 0 && addedLeaves > 0 && selected.length >= 2 && diff < upsellLimit) {
                upsellCandidates.push({sid:sid, type:'upsell', oldPrice:oldP, diff:diff, intersectingItems:intersectingItems});
            }
        }
    }

    if (cheaperCandidates.length > 0) return cheaperCandidates[0];
    if (samePriceCandidates.length > 0) return samePriceCandidates[0];
    if (upsellCandidates.length > 0) return upsellCandidates[0];
    return null;
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    if (!isConciergeON && !isManual) { suggestionId = null; return; }
    var best = analyzeSuggestions(isManual);
    if (!best) {
        if (isManual && isConciergeON) showConciergeBubble("最適なプランを選んでいます。ご安心くださいね。");
        suggestionId = null; return;
    }
    suggestionId = best.sid; 
    suggestionReplaceItems = best.intersectingItems;
    var currentT = getOriginalTotal(selected);
    var setItem = menuData[best.sid];
    var newT = currentT - best.oldPrice + getItemPrice(best.sid);

    var html = '<div class="sug-title">🎉 AIコンシェルジュからのご提案</div>';

    if (best.type === 'upsell') {
        html += '<div class="sug-benefit-msg">✨ ご希望の部位を含んだまま、お得にアップグレード可能です！ ✨</div>';
        var diffLabel = "+¥" + best.diff.toLocaleString();
        var theoreticalSaving = getTheoreticalOriginalPrice(best.sid) - getItemPrice(best.sid);
        
        html += '<div class="sug-menu-name">' + setItem.label + ' へのアップグレード</div>';
        if (setItem.sub) { html += '<div class="sug-menu-sub">(' + setItem.sub + ')</div>'; }
        
        html += '<div class="sug-upsell-panel">';
        html += '  <div class="sug-upsell-col"><span class="sug-upsell-label">現在の選択</span><span class="sug-upsell-price">¥' + currentT.toLocaleString() + '</span></div>';
        html += '  <div class="sug-upsell-col"><span class="sug-upsell-label">追加</span><span class="sug-upsell-price red">' + diffLabel + '</span><span class="sug-upsell-arrow">▶</span></div>';
        html += '  <div class="sug-upsell-col"><span class="sug-upsell-label">アップグレード後</span><span class="sug-upsell-price large-red">¥' + newT.toLocaleString() + '</span></div>';
        html += '</div>';

        if (theoreticalSaving > 0) { html += '<div class="sug-discount-box">※パーツを別々に追加するより ¥' + theoreticalSaving.toLocaleString() + ' もお得です！</div>'; }
        html += '<div class="sug-note">※セット内の不要な部位は避けて照射することも可能です。<br>(デザイン脱毛をご希望の際もご相談ください)</div>';
    } else {
        var saving = currentT - newT;
        if (best.type === 'cheaper') html += '<div class="sug-benefit-msg">✨ ご希望の部位を含んだまま、お安くなります！ ✨</div>';
        else html += '<div class="sug-benefit-msg">✨ 同じ金額で範囲が広がります！ ✨</div>';
        
        html += '<div class="sug-menu-name">' + setItem.label + '</div>';
        if (setItem.sub) { html += '<div class="sug-menu-sub">(' + setItem.sub + ')</div>'; }

        html += '<div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在</span><span class="sug-col-price old">¥' + currentT.toLocaleString() + '</span></div>';
        html += '<div class="sug-arrow">▶▶</div><div class="sug-col"><span class="sug-col-label">変更後</span><span class="sug-col-price new">¥' + newT.toLocaleString() + '</span></div></div>';
        
        if(saving > 0) html += '<div class="sug-discount-box">✨ ¥' + saving.toLocaleString() + ' お得になります！</div>';
        html += '<div class="sug-note">※セット内の不要な部位は避けて照射することも可能です。<br>(デザイン脱毛をご希望の際もご相談ください)</div>';
    }

    html += '<div style="display:flex; gap:10px; margin-top:15px;">';
    html += '<button onclick="applyOptimalSet()" style="background:#000; color:#fff; border:1px solid #000; padding:14px; border-radius:6px; font-weight:bold; flex:2;">変更する</button>';
    html += '<button onclick="suggestionId=null; document.getElementById(\'suggestion-box\').style.display=\'none\'; render();" style="background:transparent; color:#111; border:none; flex:1; font-weight:bold;">今はしない</button>';
    html += '</div>';
    
    document.getElementById('suggestion-box').innerHTML = html; 
    document.getElementById('suggestion-box').style.display = 'block';
}

function applyOptimalSet() {
    for (var i = 0; i < suggestionReplaceItems.length; i++) {
        var idx = selected.indexOf(suggestionReplaceItems[i]);
        if (idx !== -1) selected.splice(idx, 1);
    }
    selected.push(suggestionId); suggestionId = null; document.getElementById('suggestion-box').style.display = 'none'; render();
}

function toggleConcierge() {
    isConciergeON = !isConciergeON; var icon = document.getElementById('concierge-icon');
    icon.className = isConciergeON ? 'concierge-icon on' : 'concierge-icon off';
    if (isConciergeON) { checkSuggestion(true); showConciergeBubble("AIコンシェルジュをONにしました！<br>最適なプランをご提案します。"); }

}

}

/* ==============================================================
   カレンダー生成・選択ロジック（モック用）
   ============================================================== */
function renderCalendar() {
    var wrapper = document.getElementById('calendar-container');
    var html = '<table class="cal-table">';
    var days =['日','月','火','水','木','金','土'];
    var today = new Date();
    var dates =[];
    
    html += '<tr><th class="time-col">時間</th>';
    for(var i=0; i<7; i++) {
        var d = new Date(today.getTime() + i*24*60*60*1000);
        var m = d.getMonth() + 1;
        var dateNum = d.getDate();
        var dayStr = days[d.getDay()];
        var dateStr = m + '/' + dateNum;
        dates.push({ full: d.getFullYear() + '年' + m + '月' + dateNum + '日(' + dayStr + ')', short: dateStr + '<br>(' + dayStr + ')' });
        html += '<th>' + dates[i].short + '</th>';
    }
    html += '</tr>';

    var times =[];
    for(var h=9; h<=21; h++) {
        times.push(h + ':00');
        if(h !== 21) { times.push(h + ':30'); } else { times.push('21:30'); }
    }

    for(var t=0; t<times.length; t++) {
        html += '<tr>';
        html += '<th class="time-col">' + times[t] + '</th>';
        for(var d=0; d<7; d++) {
            var rand = Math.random();
            var status = rand > 0.4 ? 'o' : (rand > 0.15 ? 'x' : 'hyphen'); 
            var mark = status === 'o' ? '◎' : (status === 'x' ? '×' : '－');
            var cls = 'cal-status-' + status;
            
            var dateStrArg = dates[d].full;
            var timeStrArg = times[t];
            var onClick = status === 'o' ? "onclick='selectTimeSlot(\"" + dateStrArg + "\", \"" + timeStrArg + "\")'" : "";
            
            html += '<td class="' + cls + '" ' + onClick + '>' + mark + '</td>';
        }
        html += '</tr>';
    }
    html += '</table>';
    wrapper.innerHTML = html;
}

function selectTimeSlot(dateStr, timeStr) {
    var slot = document.getElementById('total-time-slot').innerText;
    var conf = confirm("【ご予約日時の確認】\n\n" + dateStr + " " + timeStr + " 〜\n\n上記の日時で予約を進めますか？\n（必要時間：" + slot + "）");
    if(conf) {
        alert("【テスト】\n予約データをGASへ送信する処理がここに入ります！\n\n（GAS連携機能の実装をお待ちください）");
    }
}
