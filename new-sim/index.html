<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NARX 料金＆時間シミュレーター Ver.29.0</title>
<style>
:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;overflow-x:hidden;}

/* ロゴエリアの改善：黒ロゴでも見えるグロー効果 */
.header-logo-container {
    text-align: center;
    padding: 20px 0 10px;
}
.logo-img {
    height: 50px; /* 必要に応じて調整 */
    filter: drop-shadow(0 0 5px var(--gold)); /* ゴールドの後光 */
}

#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:400px;background:var(--black);text-align:center;border-radius:8px;}
.container{max-width:600px;margin:0 auto;padding:20px;}
.header{text-align:center;padding:10px 0;border-bottom:1px solid var(--gold);margin-bottom:20px;}
.header h1{color:var(--gold);margin:0;font-size:1.4rem;letter-spacing:3px;}
#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;}

.dual-visual-container{display:flex;gap:4px;height:240px;position:sticky;top:10px;z-index:50;background:var(--light-gray);border:2px solid var(--gold);margin-bottom:20px;border-radius:8px;overflow:hidden;}
.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel:first-child{border-right:1px solid #ddd;}
.view-panel span{position:absolute;top:8px;font-size:9px;color:#999;letter-spacing:2px;font-weight:bold;z-index:10;}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}

@keyframes blink-gold {
    0% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
    50% { opacity: 0.85; filter: drop-shadow(0 0 10px var(--gold)); }
    100% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
}
.layer-part.suggest-blink {
    animation: blink-gold 1.2s infinite ease-in-out;
    z-index: 3;
}

.tabs{display:flex;gap:5px;margin-bottom:15px;border-bottom:1px solid var(--light-gray);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.85rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}

#selected-chips-area { margin-bottom: 15px; background: #0a0a0a; padding: 12px; border-radius: 8px; border: 1px solid #222; }
.chips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.chips-title { font-size: 0.75rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }
.btn-reset { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; }
.btn-reset:active { background: #333; }
.chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
.chip-close { background: var(--gold); color: #000; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.6rem; font-weight: bold; cursor: pointer; }

.subcat-header{display:flex;align-items:center;justify-content:center;margin:30px 0 15px;color:var(--gold);font-size:0.85rem;letter-spacing:0.4em;font-weight:bold;}
.subcat-header::before,.subcat-header::after{content:"";flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold));margin:0 20px;opacity:0.6;}
.subcat-header::after{background:linear-gradient(to left,transparent,var(--gold));}

.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item.disabled{opacity:0.15;cursor:default;filter:grayscale(1);}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;margin-top:2px;}
.price-tag-new { font-size: 0.65rem; background: #c00; color: #fff; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }
.item-sub{display:block;font-size:0.7rem;color:#888;margin-top:5px;line-height:1.4;}

#suggestion-box{position:fixed;bottom:190px;left:50%;transform:translateX(-50%);width:92%;max-width:420px;background:linear-gradient(135deg,#f7d05e 0%,#d4af37 100%);color:#111;padding:20px;border-radius:12px;display:none;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.8);border:1px solid #fff;}
.sug-title{font-weight:bold;font-size:0.85rem;color:#555;margin-bottom:12px;text-align:center;}
.sug-benefit-msg {text-align:center;font-size:0.75rem;color:var(--gold);background:#111;padding:6px 10px;border-radius:4px;font-weight:bold;margin-bottom:12px;letter-spacing:0.5px;}
.sug-menu-name{font-size:1.25rem;font-weight:bold;color:#111;margin-bottom:2px;}
.sug-menu-sub{font-size:0.75rem;color:#444;margin-bottom:12px;line-height:1.3;}
.sug-compare-panel{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.65);padding:12px 10px;border-radius:8px;margin-bottom:10px;border:1px solid rgba(0,0,0,0.1);}
.sug-col{flex:1;text-align:center;}
.sug-col-label{font-size:0.65rem;color:#555;display:block;margin-bottom:2px;font-weight:bold;}
.sug-col-price{font-size:1rem;color:#111;font-weight:bold;}
.sug-col-price.old{text-decoration:line-through;color:#888;font-size:0.9rem;}
.sug-col-price.new{font-size:1.3rem;color:#c00;}
.sug-arrow{padding:0 5px;color:#c00;font-weight:bold;text-align:center;font-size:0.8rem;}
.sug-discount-badge{display:inline-block;background:#c00;color:#fff;font-size:0.75rem;padding:4px 10px;border-radius:12px;margin-bottom:12px;font-weight:bold;}
.sug-note{font-size:0.65rem;color:#444;text-align:left;line-height:1.5;margin-top:15px;border-top:1px dashed rgba(0,0,0,0.2);padding-top:8px;}

#concierge-wrapper{display:flex;position:fixed;bottom:85px;left:50%;transform:translateX(-50%);z-index:1000;align-items:center;flex-direction:column;pointer-events:none;}
#concierge-bubble{display:none;background:#fff;color:#111;padding:12px 16px;border-radius:12px;font-size:0.75rem;font-weight:bold;margin-bottom:12px;box-shadow:0 4px 15px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.3s ease;position:relative;line-height:1.5;white-space:nowrap;text-align:center;pointer-events:auto;}
.bubble-tail{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fff;}
.concierge-icon{width:55px;height:55px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.8);transition:transform 0.2s,background 0.3s,border 0.3s;pointer-events:auto;}
.concierge-icon:active{transform:scale(0.9);}
.concierge-icon.on{background:var(--gold);border:2px solid var(--gold);box-shadow:0 0 15px rgba(212,175,55,0.5);}
.concierge-icon.on svg .skin,.concierge-icon.on svg .suit{fill:#111;}
.concierge-icon.on svg .line{stroke:var(--gold);}
.concierge-icon.on svg .btn{fill:var(--gold);}
.concierge-icon.off{background:#111;border:3px solid var(--gold);}
.concierge-icon.off svg .skin,.concierge-icon.off svg .suit{fill:var(--gold);}
.concierge-icon.off svg .line{stroke:#111;}
.concierge-icon.off svg .btn{fill:#111;}

#final-confirm-modal, #copy-complete-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100000;display:none;justify-content:center;align-items:center;}
.final-modal-content{border:1px solid var(--gold);padding:30px 20px;width:85%;max-width:400px;background:var(--black);text-align:center;border-radius:8px;}
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,5,5,0.98);border-top:2px solid var(--gold);padding:15px 20px;box-sizing:border-box;z-index:100;}
.summary-grid{display:grid;grid-template-columns:1fr 1.1fr;margin-bottom:12px;}
.summary-item .label{font-size:0.7rem;color:#999;display:block;}
.summary-item .val{font-size:1.35rem;color:var(--gold);font-weight:bold;}
.summary-item .counseling-note{font-size:0.6rem;color:#fff;background:#c00;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:2px;}
.btn-group{display:flex;gap:10px;}
.btn{flex:1;padding:15px;text-align:center;border-radius:6px;font-weight:bold;font-size:0.9rem;border:none;cursor:pointer;text-decoration:none;}
.btn-copy{background:#222;color:#fff;}
.btn-reserve{background:var(--gold);color:#000;}

.step-box {background: #111; border: 1px solid #333; border-radius: 8px; padding: 18px; margin: 20px 0; text-align: left;}
.step-item {margin-bottom: 15px;}
.step-item:last-child {margin-bottom: 0;}
.step-label {font-size: 0.7rem; color: var(--gold); display: block; margin-bottom: 3px; font-weight: bold;}
.step-val {font-size: 0.95rem; font-weight: bold; color: #fff;}
</style>
</head>
<body>

<div id="gate-modal">
    <div class="modal-content">
        <!-- ロゴエリア（例） -->
        <div class="header-logo-container">
            <img src="logo.png" class="logo-img" alt="NARX LOGO" onerror="this.style.display='none'">
        </div>
        <h2 style="color: var(--gold); margin-bottom: 10px; letter-spacing: 2px;">WELCOME</h2>
        <p style="font-size: 0.85rem; line-height: 1.8; margin-bottom: 35px; color: #bbb;">現在の状況を選択してください。</p>
        <button class="btn btn-reserve" style="width: 100%; margin-bottom: 15px;" onclick="forceStart('new')">初めて来店する（初回価格）</button>
        <button class="btn btn-copy" style="width: 100%;" onclick="forceStart('repeat')">既に会員である（通常価格）</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>NARX</h1>
        <div id="mode-display">新規予約モード</div>
    </div>
    <div class="dual-visual-container">
        <div class="view-panel" id="body-panel"><span>BODY</span><img src="base_body.png" class="base-img"></div>
        <div class="view-panel" id="face-panel"><span>FACE</span><img src="base_face.png" class="base-img"></div>
    </div>
    <div class="tabs">
        <div id="tab-set" class="tab active" onclick="changeTab('set')">セットメニュー</div>
        <div id="tab-part" class="tab" onclick="changeTab('part')">パーツメニュー</div>
        <div id="tab-other" class="tab" onclick="changeTab('other')">その他</div>
    </div>
    
    <div id="selected-chips-area" style="display: none;">
        <div class="chips-header">
            <span class="chips-title">現在選択中のメニュー</span>
            <button class="btn-reset" onclick="resetSelection()">↻ 全てクリア</button>
        </div>
        <div class="chips-container" id="chips-container"></div>
    </div>

    <div id="menu-area"></div>
</div>

<div id="concierge-wrapper">
    <div id="concierge-bubble"><div class="bubble-tail"></div><span id="concierge-msg"></span></div>
    <div id="concierge-icon" class="concierge-icon on" onclick="toggleConcierge()">
        <svg viewBox="0 0 100 100" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
            <path class="suit" d="M30 20 h40 v12 h-40 z"/><path class="suit" d="M22 32 h56 v4 h-56 z"/><path class="skin" d="M34 36 v10 c0 9 7 16 16 16 c9 0 16 -7 16 -16 v-10 z"/><circle class="skin" cx="30" cy="45" r="4"/><circle class="skin" cx="70" cy="45" r="4"/><path class="suit" d="M34 66 l-20 16 v18 h72 v-18 l-20 -16 z"/><path class="line" d="M34 66 L50 82 L66 66" stroke-width="4" fill="none"/><line class="line" x1="50" y1="82" x2="50" y2="100" stroke-width="4"/><line class="line" x1="68" y1="80" x2="78" y2="80" stroke-width="3"/><circle class="btn" cx="44" cy="88" r="2"/><circle class="btn" cx="44" cy="96" r="2"/>
        </svg>
    </div>
</div>

<div id="suggestion-box"></div>

<div id="final-confirm-modal">
    <div class="final-modal-content">
        <h3 style="color:var(--gold);margin-top:0;font-size:1.1rem;letter-spacing:1px;">💡 最終ご提案</h3>
        <p id="final-confirm-text" style="font-size:0.85rem;line-height:1.6;color:#ddd;margin-bottom:20px;"></p>
        <button onclick="acceptFinalConfirm()" style="width:100%;background:var(--gold);color:#000;border:none;padding:14px;border-radius:6px;font-weight:bold;margin-bottom:12px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.3);">お得なプランに変更してコピー</button>
        <button onclick="rejectFinalConfirm()" style="width:100%;background:transparent;color:#888;border:1px solid #444;padding:12px;border-radius:6px;font-weight:bold;cursor:pointer;">変更せずにコピーする</button>
    </div>
</div>

<div id="copy-complete-modal">
    <div class="final-modal-content" style="padding: 35px 20px;">
        <div style="font-size:2.5rem; margin-bottom:10px;">📋</div>
        <h3 style="color:var(--gold); font-size: 1.1rem; letter-spacing: 2px; margin-top:0;">COPY COMPLETED</h3>
        <p style="font-size: 0.8rem; color: #ccc; line-height: 1.6; margin-top: 15px;">ご希望の部位をコピーいたしました。<br>予約ページへ移動後、以下の手順でご予約ください。</p>
        
        <div class="step-box">
            <div class="step-item">
                <span class="step-label">① メメニュー選択</span>
                <span class="step-val">複数メニュー予約【時間枠】</span>
            </div>
            <div class="step-item">
                <span class="step-label">② 時間枠の選択</span>
                <span class="step-val" id="modal-time-slot-text" style="color:var(--gold); font-size: 1.2rem;"></span>
            </div>
            <div class="step-item">
                <span class="step-label">③ お客様情報の入力</span>
                <span class="step-val">「備考欄」にコピーした内容をペースト</span>
            </div>
        </div>

        <button onclick="goToReserve()" style="width:100%;background:var(--gold);color:#000;border:none;padding:16px;border-radius:6px;font-weight:bold;margin-bottom:15px;cursor:pointer;font-size:0.95rem;box-shadow:0 4px 10px rgba(0,0,0,0.4);">予約ページへ進む</button>
        <button onclick="closeCopyModal()" style="width:100%;background:transparent;color:#888;border:none;padding:10px;font-size:0.8rem;cursor:pointer;">閉じる</button>
    </div>
</div>

<div class="bottom-bar">
    <div class="summary-grid">
        <div class="summary-item"><span class="label">料金合計 (税込)</span><span class="val" id="total-price">¥0</span></div>
        <div class="summary-item" style="text-align:right;">
            <span class="label">ご予約時間枠</span>
            <span class="val" id="total-time-slot">0.0 時間枠</span>
            <div id="counseling-badge-area"></div>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn btn-copy" onclick="copyResult()">内容をコピーして予約へ</button>
    </div>
</div>

function forceStart(type) {
    document.getElementById('gate-modal').style.display = 'none';
    try {
        userType = type;

        if (badge) {
            badge.innerText = type === 'new' ? "【ご新規様】初回限定価格モード" : "【会員様】通常価格モード";
            badge.style.background = type === 'new' ? "var(--gold)" : "#666";
        }
        initApp(); 
        render();
    } catch(e) { 
        alert("システムエラーが発生しました。"); 
    }
}

function initApp() {
    function getLeafNodes(id) {
        var leaves =[];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) { setIncludes[nodeId].forEach(function(subId) { traverse(subId); }); } 
            else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id);
        return leaves;
    }
    Object.keys(menuData).forEach(function(id) { itemLeaves[id] = getLeafNodes(id); });

    var bPanel = document.getElementById('body-panel');
    var fPanel = document.getElementById('face-panel');
    if (!bPanel || !fPanel) return;
    Object.keys(menuData).forEach(function(id) {
        var item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    });
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png";
    img.id = layerId;
    img.className = 'layer-part';
    img.onerror = function() { img.style.display = 'none'; };
    parent.appendChild(img);
}

function changeTab(tab) { currentTab = tab; render(); }

function resetSelection() {
    selected =[];
    lastToggledItem = null;
    cancelCount = 0;
    suggestionId = null;
    suggestionReplaceItems =[];
    document.getElementById('suggestion-box').style.display = 'none';
    if (isConciergeON) { showConciergeBubble("すべてクリアしました。<br>最初からメニューをお選びください。"); }
    render();
}

function toggleItem(id) {
    var idx = selected.indexOf(id);
    if (idx !== -1) {
        selected.splice(idx, 1);
        lastToggledItem = null;
    } else {
        selected.push(id);
        lastToggledItem = id; 
    }
    checkSuggestion(false);
    render();
}

function renderChips() {
    var area = document.getElementById('selected-chips-area');
    var container = document.getElementById('chips-container');
    if (!area || !container) return;
    if (selected.length === 0) { area.style.display = 'none'; return; }
    area.style.display = 'block';
    container.innerHTML = '';
    selected.forEach(function(id) {
        var item = menuData[id];
        var chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = '<span>' + item.label + '</span><span class="chip-close" onclick="event.stopPropagation(); toggleItem(\'' + id + '\')">×</span>';
        container.appendChild(chip);
    });
}

function applySuggestionBlink() {
    document.querySelectorAll('.layer-part').forEach(function(img) {
        img.classList.remove('suggest-blink');
    });
    var box = document.getElementById('suggestion-box');
    if (box.style.display === 'none' || !suggestionId) return;
    var sugLeaves = itemLeaves[suggestionId];
    if (!sugLeaves) return;
    var selectedLeaves =[];
    selected.forEach(function(id) {
        if(itemLeaves[id]) {
            itemLeaves[id].forEach(function(leaf) { if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf); });
        }
    });
    sugLeaves.forEach(function(leaf) {
        if (selectedLeaves.indexOf(leaf) === -1) {
            var item = menuData[leaf];
            if (item && item.imgs) {
                if (item.imgs.body) { var i = document.getElementById("img-" + item.imgs.body); if (i && !i.classList.contains('active')) i.classList.add('suggest-blink'); }
                if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if (f && !f.classList.contains('active')) f.classList.add('suggest-blink'); }
            }
        }
    });
}

function getItemPrice(id) {
    var item = menuData[id];
    if (userType === 'new') {
        if (item.hasFace || item.isSpecial) return 1000;
        return item.price * 0.5;
    }
    return item.price;

function render() {
    var area = document.getElementById('menu-area');
    if (!area) return;
    area.innerHTML = '';
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    var activeTab = document.getElementById("tab-" + currentTab);

    var selectedLeaves =[];
    selected.forEach(function(id) {
        if(itemLeaves[id]) {
            itemLeaves[id].forEach(function(leaf) { if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf); });
        }
    });
    selected.forEach(function(id) {
        var item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) { var i = document.getElementById("img-" + item.imgs.body); if(i) i.classList.add('active'); }
            if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); }
        }
    });
    selectedLeaves.forEach(function(leaf) {
        var item = menuData[leaf];
        if (item && item.imgs) {
            if (item.imgs.body) { var i = document.getElementById("img-" + item.imgs.body); if(i) i.classList.add('active'); }
            if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); }
        }
    });

    var lastSub = "";
    Object.keys(menuData).filter(function(id) { return menuData[id].cat === currentTab; }).forEach(function(id) {
        var item = menuData[id];
        if (currentTab === 'part' && item.subCat !== lastSub) {
            lastSub = item.subCat;
            var h = document.createElement('div'); h.className = 'subcat-header'; h.innerText = lastSub; area.appendChild(h);
        }
        var isSel = selected.indexOf(id) !== -1;
        var isDis = false;
        if (!isSel && itemLeaves[id]) {
            isDis = itemLeaves[id].some(function(leaf) { return selectedLeaves.indexOf(leaf) !== -1; });
        }
        var div = document.createElement('div');
        div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : '');
        div.onclick = function() { if(!isDis) toggleItem(id); };
        
        var displayPrice = getItemPrice(id);
        var inner = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '>';
        inner += '<div class="item-info"><span class="item-name">' + item.label + '</span>';
        if(item.sub) inner += '<span class="item-sub">' + item.sub + '</span>';
        inner += '</div><div class="item-price">¥' + displayPrice.toLocaleString();
        if(userType === 'new') inner += '<span class="price-tag-new">初回</span>';
        inner += '</div>';
        div.innerHTML = inner;
        area.appendChild(div);
    });
    updateTotal();
    applySuggestionBlink();
}

function updateTotal() {
    var p = 0, t = 0, f = false;
    selected.forEach(function(id) {
        p += getItemPrice(id); t += menuData[id].time; if(menuData[id].hasFace) f = true;
    });
    if (selected.length > 0) {
        if (userType === 'new') {
            t += 90;
            document.getElementById('counseling-badge-area').innerHTML = '<span class="counseling-note">※無料カウンセリング込</span>';
        } else {
            if (f) t += 20;
            document.getElementById('counseling-badge-area').innerHTML = '';
        }
    } else {
        document.getElementById('counseling-badge-area').innerHTML = '';
    }
    var rounded = Math.ceil(t / 30) * 30;
    var slot = Math.floor(rounded / 60) + "." + ((rounded % 60) === 30 ? '5' : '0');
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-slot').innerText = slot + " 時間枠";
}

function getOriginalTotal(idList) {
    var total = 0;
    idList.forEach(function(id) { total += getItemPrice(id); });
    return total;
}

function toggleConcierge(forceState) {

        applySuggestionBlink();
    }
}

function analyzeSuggestions(isManual) {
    var selectedLeaves =[];
    selected.forEach(function(id) { if(itemLeaves[id]) { itemLeaves[id].forEach(function(leaf) { if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf); }); } });
    var cheaperCandidates =[], samePriceCandidates =[], upsellCandidates =[];
    Object.keys(menuData).filter(function(k) { return menuData[k].cat === 'set'; }).forEach(function(sid) {
        if (selected.indexOf(sid) !== -1) return;
        if (!isManual && dismissedSuggestions.indexOf(sid) !== -1) return;
        var candidateLeaves = itemLeaves[sid];
        if (!candidateLeaves) return;
        var includesLastToggled = false;
        if (lastToggledItem && itemLeaves[lastToggledItem]) {
            var lastLeaves = itemLeaves[lastToggledItem];
            includesLastToggled = true;
            for (var k = 0; k < lastLeaves.length; k++) { if (candidateLeaves.indexOf(lastLeaves[k]) === -1) { includesLastToggled = false; break; } }
        }
        var intersectingItems =[], intersectingLeaves =[];
        var isCovered = true; 
        selected.forEach(function(selId) {
            var selLeaves = itemLeaves[selId];
            if (!selLeaves) return;
            var hasIntersection = false;
            var fullyContained = true;
            selLeaves.forEach(function(leaf) { if (candidateLeaves.indexOf(leaf) !== -1) { hasIntersection = true; } else { fullyContained = false; } });
            if (hasIntersection) { intersectingItems.push(selId); if (!fullyContained) { isCovered = false; } else { selLeaves.forEach(function(leaf) { if (intersectingLeaves.indexOf(leaf) === -1) intersectingLeaves.push(leaf); }); } }
        });
        if (intersectingItems.length >= 1 && isCovered) {
            var oldPrice = getOriginalTotal(intersectingItems);
            var newPrice = getItemPrice(sid);
            var diffPrice = newPrice - oldPrice;
            var addedLeavesCount = candidateLeaves.length - intersectingLeaves.length;
            var simData = { sid: sid, diffPrice: diffPrice, addedLeavesCount: addedLeavesCount, intersectingItems: intersectingItems, oldPrice: oldPrice, includesLastToggled: includesLastToggled };
            if (diffPrice < 0 && intersectingItems.length >= 2) { simData.type = 'cheaper'; cheaperCandidates.push(simData); } 
            else if (diffPrice === 0 && addedLeavesCount > 0 && intersectingItems.length >= 2) { simData.type = 'samePrice'; samePriceCandidates.push(simData); } 
            else if (diffPrice > 0 && addedLeavesCount > 0) { if (includesLastToggled && diffPrice <= 10000 && selected.length >= 2) { simData.type = 'upsell'; upsellCandidates.push(simData); } }
        }
    });
    if (cheaperCandidates.length > 0) {
        cheaperCandidates.sort(function(a, b) { if (a.includesLastToggled !== b.includesLastToggled) return b.includesLastToggled ? 1 : -1; return a.diffPrice - b.diffPrice; });
        return cheaperCandidates[0];
    } 
    if (samePriceCandidates.length > 0) {
        samePriceCandidates.sort(function(a, b) { if (a.includesLastToggled !== b.includesLastToggled) return b.includesLastToggled ? 1 : -1; return b.addedLeavesCount - a.addedLeavesCount; });
        return samePriceCandidates[0];
    } 
    if (upsellCandidates.length > 0) {
        upsellCandidates.sort(function(a, b) { return a.diffPrice - b.diffPrice; });
        return upsellCandidates[0];
    }
    return null;
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    if (!isConciergeON && !isManual) { suggestionId = null; applySuggestionBlink(); return; }
    var best = analyzeSuggestions(isManual);
    if (!best) {
        if (isManual && isConciergeON) showConciergeBubble("現在、最適なプランのご提案はございません。");
        suggestionId = null; applySuggestionBlink(); return;
    }
    if (!isManual && cancelCount >= 2) { suggestionId = null; applySuggestionBlink(); return; }
    suggestionId = best.sid;
    suggestionReplaceItems = best.intersectingItems;
    var currentTotalPrice = 0;
    selected.forEach(function(id) { currentTotalPrice += getItemPrice(id); });
    var newTotalPrice = currentTotalPrice - best.oldPrice + getItemPrice(best.sid);
    var setItem = menuData[best.sid];
    var html = '<div class="sug-title">👑 AIコンシェルジュからのご提案</div>';
    if (best.type === 'cheaper') {
        html += '<div class="sug-benefit-msg">✨ お安くなります！ ✨</div>';
        html += '<div class="sug-menu-name">' + setItem.label + '</div><div class="sug-menu-sub">（' + setItem.sub + '）</div>';
        html += '<div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在</span><span class="sug-col-price old">¥' + currentTotalPrice.toLocaleString() + '</span></div><div class="sug-arrow">▶▶</div><div class="sug-col"><span class="sug-col-label">変更後</span><span class="sug-col-price new">¥' + newTotalPrice.toLocaleString() + '</span></div></div>';
    } else if (best.type === 'samePrice') {
        html += '<div class="sug-benefit-msg">✨ 範囲が広がります！ ✨</div>';
        html += '<div class="sug-menu-name">' + setItem.label + '</div><div class="sug-menu-sub">（' + setItem.sub + '）</div>';
        html += '<div class="sug-compare-panel" style="justify-content:center;"><div class="sug-col"><span class="sug-col-label">金額そのまま</span><span class="sug-col-price new">¥' + currentTotalPrice.toLocaleString() + '</span></div></div>';
    } else if (best.type === 'upsell') {
        html += '<div class="sug-benefit-msg">✨ お得にアップグレード！ ✨</div>';
        var addAmount = newTotalPrice - currentTotalPrice;
        html += '<div class="sug-menu-name">' + setItem.label + '</div>';
        html += '<div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在</span><span class="sug-col-price">¥' + currentTotalPrice.toLocaleString() + '</span></div><div class="sug-col" style="flex:1.2; padding:0 5px;"><span class="sug-col-label" style="color:#c00;">追加</span><span class="sug-col-price" style="color:#c00;">+¥' + addAmount.toLocaleString() + '</span></div><div class="sug-col"><span class="sug-col-label">変更後</span><span class="sug-col-price new">¥' + newTotalPrice.toLocaleString() + '</span></div></div>';
    }
    html += '<div style="display: flex; gap: 10px; margin-top: 15px;"><button onclick="applyOptimalSet()" style="background: var(--black); color: var(--gold); border: 1px solid var(--black); padding: 12px 20px; border-radius: 6px; font-weight: bold; flex: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">変更する</button><button onclick="hideSuggestion()" style="background: transparent; color: #333; border: none; font-size: 0.8rem; flex: 1; font-weight: bold;">今はしない</button></div>';
    document.getElementById('suggestion-box').innerHTML = html;
    document.getElementById('suggestion-box').style.display = 'block';
    applySuggestionBlink();
}

function applyOptimalSet() {
    if (!suggestionId) return;
    if (suggestionReplaceItems) { suggestionReplaceItems.forEach(function(itemId) { var idx = selected.indexOf(itemId); if (idx !== -1) selected.splice(idx, 1); }); }
    selected.push(suggestionId);
    suggestionId = null; suggestionReplaceItems =[];
    document.getElementById('suggestion-box').style.display = 'none';
    render(); 
}

function hideSuggestion() { 
    if (suggestionId) { dismissedSuggestions.push(suggestionId); cancelCount++; }
    suggestionId = null;
    document.getElementById('suggestion-box').style.display = 'none'; 
    applySuggestionBlink(); 
}

}

function copyResult() {
    if (selected.length === 0) return alert("選択してください");
    if (!isConciergeON) {
        var best = analyzeSuggestions(true); 
        if (best && (best.type === 'cheaper' || best.type === 'samePrice')) {
            suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems;
            var currentTotal = 0; selected.forEach(function(id) { currentTotal += getItemPrice(id); });
            var newTotal = currentTotal - best.oldPrice + getItemPrice(best.sid);
            var msg = "<strong>【最後にご確認です】</strong><br><br>";
            if (best.type === 'cheaper') { msg += "「<strong>" + menuData[best.sid].label + "</strong>」に変更すると、さらに <span style='color:var(--gold);'>¥" + (currentTotal - newTotal).toLocaleString() + "</span> お安くなります！"; } 
            else { msg += "同じ金額でさらに部位が多い「<strong>" + menuData[best.sid].label + "</strong>」に変更できます！"; }
            document.getElementById('final-confirm-text').innerHTML = msg;
            document.getElementById('final-confirm-modal').style.display = 'flex';
            return; 
        }
    }
    doActualCopy();
}

function acceptFinalConfirm() { document.getElementById('final-confirm-modal').style.display = 'none'; applyOptimalSet(); setTimeout(doActualCopy, 200); }
function rejectFinalConfirm() { document.getElementById('final-confirm-modal').style.display = 'none'; doActualCopy(); }

function doActualCopy() {
    var slot = document.getElementById('total-time-slot').innerText;
    var priceStr = document.getElementById('total-price').innerText;
    var txt = "【NARX脱毛予約】\n区分：" + (userType === 'new' ? '新規' : '会員') + "\nメニュー：\n";
    selected.forEach(function(id) { txt += "・" + menuData[id].label + "\n"; });
    txt += "──────────\n合計金額：" + priceStr + "\n予約枠目安：" + slot;
    navigator.clipboard.writeText(txt).then(function() { 
        document.getElementById('modal-time-slot-text').innerText = slot;
        document.getElementById('copy-complete-modal').style.display = 'flex';
    }).catch(function() { alert("コピーに失敗しました。"); });
}

function goToReserve() { window.open("https://liff.line.me/1657088803-ODW7m7Nn?calendar_salon_id=100&ts=1772815585", "_blank"); }
function closeCopyModal() { document.getElementById('copy-complete-modal').style.display = 'none'; }
</script>
