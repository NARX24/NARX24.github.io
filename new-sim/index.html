<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARX | 中島式メンズ脱毛予約</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8f9fa; color: #333; padding-bottom: 50px; }
        .hero { background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        .hero h1 { font-weight: 700; letter-spacing: 2px; }
        .hero p { font-size: 0.9rem; opacity: 0.8; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-weight: 700; color: #1a1a1a; border-left: 5px solid #1a1a1a; padding-left: 15px; margin-bottom: 20px; }
        .btn-primary { background-color: #1a1a1a; border: none; padding: 12px; font-weight: 700; border-radius: 8px; }
        .btn-primary:hover { background-color: #333; }
        .slot-btn { margin: 5px; width: 80px; font-weight: bold; }
        .selected-slot { background-color: #1a1a1a !important; color: white !important; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .price-display { font-size: 1.5rem; font-weight: 700; color: #d9534f; }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner-border text-dark"></div><span class="ms-3">処理中...</span></div>

<div class="hero">
    <h1>NARX</h1>
    <p>業界18年の実績・中島式メンズ脱毛</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card p-4">
                <h5 class="card-title">1. メニュー選択</h5>
                <div class="mb-3">
                    <label class="form-label">セットメニュー</label>
                    <select id="menuSelect" class="form-select">
                        <option value="" data-price="0" data-slot="0">選択してください</option>
                        <option value="全身脱毛（顔・VIO込）" data-price="33000" data-slot="2.0">全身脱毛（顔・VIO込） - 33,000円</option>
                        <option value="顔全体脱毛" data-price="11000" data-slot="0.5">顔全体脱毛 - 11,000円</option>
                        <option value="VIOセット" data-price="13200" data-slot="1.0">VIOセット - 13,200円</option>
                        <option value="脚全体セット" data-price="15000" data-slot="1.0">脚全体セット - 15,000円</option>
                    </select>
                </div>
                <div class="text-end">
                    <span>合計金額: </span><span id="totalPrice" class="price-display">0</span><span> 円</span>
                </div>
            </div>

            <div class="card p-4">
                <h5 class="card-title">2. 日時選択</h5>
                <input type="date" id="dateInput" class="form-control mb-3">
                <div id="slotContainer" class="d-flex flex-wrap justify-content-center">
                    <p class="text-muted">日付を選択すると空き時間が表示されます</p>
                </div>
            </div>

            <div class="card p-4">
                <h5 class="card-title">3. お客様情報</h5>
                <div class="mb-3">
                    <label class="form-label">お名前</label>
                    <input type="text" id="userName" class="form-control" placeholder="例：中島 太郎">
                </div>
                <div class="mb-3">
                    <label class="form-label">電話番号</label>
                    <input type="tel" id="userTel" class="form-control" placeholder="例：09012345678">
                </div>
                <div class="mb-3">
                    <label class="form-label">メールアドレス</label>
                    <input type="email" id="userEmail" class="form-control" placeholder="例：nakajima@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">ご要望・事前相談（任意）</label>
                    <textarea id="userMessage" class="form-control" rows="3" placeholder="お悩みや場所の確認など、お気軽にご記入ください"></textarea>
                </div>
                <button id="reserveBtn" class="btn btn-primary w-100 mt-3" disabled>予約を確定する</button>
            </div>

        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwd_vgJV_asH2zWXKwBhDdSU_aAQZkLen4f29HRnN1bsY4UcudqL9VRABDYHeLtRmk07Q/exec";
    let selectedSlot = null;

    // メニュー選択時の価格・時間計算
    document.getElementById('menuSelect').addEventListener('change', function() {
        const selected = this.options[this.selectedIndex];
        document.getElementById('totalPrice').innerText = Number(selected.getAttribute('data-price')).toLocaleString();
        updateSlots();
    });

    // 日付選択時の空き枠取得
    document.getElementById('dateInput').addEventListener('change', updateSlots);

    async function updateSlots() {
        const date = document.getElementById('dateInput').value;
        const menu = document.getElementById('menuSelect').value;
        if (!date || !menu) return;

        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'getBusySlots' })
            });
            const busySlots = await res.json();
            renderSlots(date, busySlots);
        } catch (e) {
            alert("空き枠の取得に失敗しました");
        }
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    function renderSlots(date, busySlots) {
        const container = document.getElementById('slotContainer');
        container.innerHTML = "";
        const startTime = 10; // 10:00
        const endTime = 20;   // 20:00
        
        for (let h = startTime; h < endTime; h++) {
            for (let m of ["00", "30"]) {
                const timeStr = `${h}:${m}`;
                const btn = document.createElement('button');
                btn.className = "btn btn-outline-dark slot-btn";
                btn.innerText = timeStr;
                
                // 簡易的な重複チェック（実際はGAS側で詳しく判定するのが理想）
                btn.onclick = () => {
                    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected-slot'));
                    btn.classList.add('selected-slot');
                    selectedSlot = timeStr;
                    document.getElementById('reserveBtn').disabled = false;
                };
                container.appendChild(btn);
            }
        }
    }

    // 予約実行
    document.getElementById('reserveBtn').addEventListener('click', async () => {
        const name = document.getElementById('userName').value;
        const tel = document.getElementById('userTel').value;
        const email = document.getElementById('userEmail').value;
        const msg = document.getElementById('userMessage').value; // ✅ ご要望欄
        const menu = document.getElementById('menuSelect').value;
        const price = document.getElementById('totalPrice').innerText;
        const date = document.getElementById('dateInput').value;
        const slot = document.getElementById('menuSelect').options[document.getElementById('menuSelect').selectedIndex].getAttribute('data-slot');

        if (!name || !tel || !email) {
            alert("お名前、電話番号、メールアドレスを入力してください");
            return;
        }

        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    type: 'reserve',
                    name: name, tel: tel, email: email, message: msg,
                    menus: menu, price: price, date: date, time: selectedSlot, slot: slot,
                    userType: "新規"
                })
            });
            const result = await res.json();
            if (result.status === "success") {
                alert("予約が完了しました！確定メールをご確認ください。");
                location.reload();
            }
        } catch (e) {
            alert("予約処理中にエラーが発生しました");
        }
        document.getElementById('loadingOverlay').style.display = 'none';
    });
</script>

</body>
</html>
