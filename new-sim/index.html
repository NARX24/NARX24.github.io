<style>
:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;overflow-x:hidden;}

/* ヘッダー */
.header-logo-container { text-align: center; padding: 20px 0 15px; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
.header-logo-img { width: 170px; height: auto; margin-bottom: 8px; }
.gate-logo-container { text-align: center; margin-bottom: 30px; }
.gate-logo-img { width: 220px; height: auto; }

#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:12px;}
.container{max-width:600px;margin:0 auto;padding:0 20px;}
#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold;}

/* ビジュアル */
.dual-visual-container{display:flex;gap:4px;height:240px;position:sticky;top:10px;z-index:50;background:var(--light-gray);border:2px solid var(--gold);margin-bottom:20px;border-radius:8px;overflow:hidden;}
.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel:first-child{border-right:1px solid #ddd;}
.view-panel span{position:absolute;top:8px;font-size:9px;color:#999;letter-spacing:2px;font-weight:bold;z-index:10;}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}

@keyframes blink-gold {
    0% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
    50% { opacity: 0.85; filter: drop-shadow(0 0 10px var(--gold)); }
    100% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
}
.layer-part.suggest-blink { animation: blink-gold 1.2s infinite ease-in-out; z-index: 3; }

/* メニュー・チップス */
.tabs{display:flex;gap:5px;margin-bottom:15px;border-bottom:1px solid var(--light-gray);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.85rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}
#selected-chips-area { margin-bottom: 15px; background: #0a0a0a; padding: 12px; border-radius: 8px; border: 1px solid #222; }
.chips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.chips-title { font-size: 0.75rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }
.btn-reset { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; }
.chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
.chip-close { background: var(--gold); color: #000; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.6rem; font-weight: bold; cursor: pointer; }
.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item.disabled{opacity:0.15;cursor:default;filter:grayscale(1);}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;margin-top:2px;}
.price-tag-new { font-size: 0.65rem; background: #c00; color: #fff; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }

/* AI提案パネル（70%縮小版） */
#suggestion-box{position:fixed;bottom:185px;left:50%;transform:translateX(-50%);width:82%;max-width:360px;background:linear-gradient(135deg,#f7d05e 0%,#d4af37 100%);color:#111;padding:12px 15px;border-radius:12px;display:none;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.8);border:1px solid #fff;}
.sug-title{font-weight:bold;font-size:0.75rem;color:#555;margin-bottom:8px;text-align:center;}
.sug-benefit-msg{text-align:center;font-size:0.7rem;color:var(--gold);background:#111;padding:6px;border-radius:4px;font-weight:bold;margin-bottom:10px;letter-spacing:0.5px;}
.sug-menu-name{font-size:1.0rem;font-weight:bold;color:#111;margin-bottom:2px;text-align:center;}
.sug-upsell-panel{background:rgba(255,255,255,0.85);padding:10px 5px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;}
.sug-upsell-col{flex:1;text-align:center;}
.sug-upsell-label{font-size:0.6rem;color:#333;margin-bottom:4px;display:block;}
.sug-upsell-price{font-size:0.9rem;color:#111;font-weight:bold;}
.sug-upsell-price.red{color:#c00;font-size:1.0rem;}
.sug-compare-panel{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.75);padding:8px;border-radius:8px;margin-bottom:8px;border:1px solid rgba(0,0,0,0.1);}
.sug-col{flex:1;text-align:center;}
.sug-col-label{font-size:0.6rem;color:#555;display:block;font-weight:bold;}
.sug-col-price{font-size:0.9rem;color:#111;font-weight:bold;}
.sug-col-price.old{text-decoration:line-through;color:#888;}
.sug-col-price.new{font-size:1.1rem;color:#c00;}
.sug-arrow{padding:0 5px;color:#c00;font-weight:bold;font-size:1.0rem;}
.sug-note{font-size:0.6rem;color:#333;text-align:left;line-height:1.4;margin-top:10px;border-top:1px dashed rgba(0,0,0,0.2);padding-top:8px;}

/* コンシェルジュアイコン */
#concierge-wrapper{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;align-items:center;flex-direction:column;pointer-events:none;}
#concierge-bubble{display:none;background:#fff;color:#111;padding:12px 16px;border-radius:12px;font-size:0.75rem;font-weight:bold;margin-bottom:12px;box-shadow:0 4px 15px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.3s ease;position:relative;text-align:center;pointer-events:auto;}
.bubble-tail{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fff;}
.concierge-icon{width:56px;height:56px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.8);pointer-events:auto;transition:0.3s;border:2px solid var(--gold);}
/* ON（ゴールド背景・黒い紳士） */
.concierge-icon.on{background:var(--gold);}
.concierge-icon.on path, .concierge-icon.on circle, .concierge-icon.on line { fill: #111; stroke: #111; }
/* OFF（黒背景・ゴールド紳士） */
.concierge-icon.off{background:#111;}
.concierge-icon.off path, .concierge-icon.off circle, .concierge-icon.off line { fill: var(--gold); stroke: var(--gold); }

/* フッター */
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,5,5,0.98);border-top:2px solid var(--gold);padding:15px 20px;box-sizing:border-box;z-index:100;}
.summary-grid{display:grid;grid-template-columns:1fr 1.1fr;margin-bottom:12px;}
.summary-item .label{font-size:0.7rem;color:#999;display:block;}
.summary-item .val{font-size:1.35rem;color:var(--gold);font-weight:bold;}
.summary-item .counseling-note{font-size:0.6rem;color:#fff;background:#c00;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:2px;}
.btn-group{display:flex;gap:10px; width: 100%;}
.btn{flex:1;padding:15px;text-align:center;border-radius:6px;font-weight:bold;font-size:0.9rem;border:none;cursor:pointer;}
.btn-reserve{background:var(--gold);color:#000;}

/* モーダル */
#copy-complete-modal, #final-confirm-modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100000;display:none;justify-content:center;align-items:center;}
.final-modal-content{border:1px solid var(--gold);padding:30px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:8px;}
#calendar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100000; display: none; overflow-y: auto; padding-bottom: 50px; }
.cal-header { position: sticky; top: 0; background: #080808; padding: 15px; border-bottom: 1px solid var(--gold); text-align: center; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
.cal-title { color: var(--gold); font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; }
.btn-close-cal { background: transparent; color: #fff; border: 1px solid #555; padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
.cal-wrapper { overflow-x: auto; background: #fff; }
.cal-table { width: 100%; border-collapse: collapse; text-align: center; background: #fff; }
.cal-table th, .cal-table td { border: 1px solid #e0e0e0; padding: 15px 5px; min-width: 50px; font-size: 0.85rem; color: #333;}
.cal-table th.time-col { color: #111; position: sticky; left: 0; background: #fdfdfd; z-index: 2; border-right: 2px solid var(--gold); }
</style>
</head>

// --- アプリ制御 ---
function forceStart(type) {
    document.getElementById('gate-modal').style.display = 'none';
    userType = type;
    var badge = document.getElementById('mode-display');
    if (badge) {
        badge.innerText = type === 'new' ? "【ご新規様】初回限定価格モード" : "【会員様】通常価格モード";
        badge.style.background = type === 'new' ? "var(--gold)" : "#666";
    }
    var btnContainer = document.getElementById('action-btn-container');
    if (type === 'new') {
        btnContainer.innerHTML = '<button class="btn btn-reserve" onclick="proceedToCalendar()">空き状況を確認して予約へ</button>';
    } else {
        btnContainer.innerHTML = '<button class="btn btn-reserve" style="background:#222; color:#fff;" onclick="copyResult()">内容をコピーして予約へ</button>';
    }
    initApp(); render();
}

function initApp() {
    function getLeafNodes(id) {
        var leaves =[];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) { 
                for (var i = 0; i < setIncludes[nodeId].length; i++) { traverse(setIncludes[nodeId][i]); }
            } else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id); return leaves;
    }
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) { itemLeaves[keys[i]] = getLeafNodes(keys[i]); }
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    for (var j = 0; j < keys.length; j++) {
        var item = menuData[keys[j]];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    }
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png"; img.id = layerId; img.className = 'layer-part';
    img.onerror = function() { this.style.display = 'none'; };
    parent.appendChild(img);
}

function changeTab(tab) { currentTab = tab; render(); }
function resetSelection() { selected =[]; suggestionId = null; document.getElementById('suggestion-box').style.display = 'none'; render(); }
function toggleItem(id) {
    var idx = selected.indexOf(id);
    if (idx !== -1) { selected.splice(idx, 1); } 
    else { selected.push(id); }
    checkSuggestion(false); render();
}

function renderChips() {
    var area = document.getElementById('selected-chips-area'), container = document.getElementById('chips-container');
    if (selected.length === 0) { area.style.display = 'none'; return; }
    area.style.display = 'block'; container.innerHTML = '';
    for (var i = 0; i < selected.length; i++) {
        var id = selected[i], item = menuData[id], chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = '<span>' + item.label + '</span><span class="chip-close" onclick="event.stopPropagation(); toggleItem(\'' + id + '\')">×</span>';
        container.appendChild(chip);
    }
}

function render() {
    var area = document.getElementById('menu-area'); area.innerHTML = '';
    var tabsElements = document.querySelectorAll('.tab');
    for (var t = 0; t < tabsElements.length; t++) { tabsElements[t].classList.remove('active'); }
    var activeTab = document.getElementById("tab-" + currentTab); if(activeTab) activeTab.classList.add('active');
    renderChips();
    var layerParts = document.querySelectorAll('.layer-part');
    for (var p = 0; p < layerParts.length; p++) { layerParts[p].classList.remove('active'); layerParts[p].classList.remove('suggest-blink'); }
    var selectedLeaves =[];
    for (var i = 0; i < selected.length; i++) {
        var id = selected[i];
        if(itemLeaves[id]) { for(var l = 0; l < itemLeaves[id].length; l++) { var leaf = itemLeaves[id][l]; if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf); } }
    }
    for (var j = 0; j < selected.length; j++) {
        var item = menuData[selected[j]];
        if (item.imgs) {
            if (item.imgs.body) { var bodyImg = document.getElementById("img-" + item.imgs.body); if(bodyImg) bodyImg.classList.add('active'); }
            if (item.imgs.face) { var faceImg = document.getElementById("img-" + item.imgs.face); if(faceImg) faceImg.classList.add('active'); }
        }
    }
    var keys = Object.keys(menuData);
    for (var m = 0; m < keys.length; m++) {
        var menuId = keys[m], menuItem = menuData[menuId];
        if (menuItem.cat !== currentTab) continue;
        var isSel = selected.indexOf(menuId) !== -1, isDis = false;
        if (!isSel && itemLeaves[menuId]) { 
            for (var n = 0; n < itemLeaves[menuId].length; n++) { if (selectedLeaves.indexOf(itemLeaves[menuId][n]) !== -1) { isDis = true; break; } }
        }
        var div = document.createElement('div'); div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : '');
        (function(id, disabled) { div.onclick = function() { if(!disabled) toggleItem(id); }; })(menuId, isDis);
        var price = getItemPrice(menuId);
        var inner = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '>';
        inner += '<div class="item-info"><span class="item-name">' + menuItem.label + '</span>';
        if(menuItem.sub) inner += '<span class="item-sub" style="font-size:0.7rem; color:#888;">' + menuItem.sub + '</span>';
        inner += '</div><div class="item-price">¥' + price.toLocaleString();
        if(userType === 'new') inner += '<span class="price-tag-new">初回</span>';
        inner += '</div>';
        div.innerHTML = inner; area.appendChild(div);
    }
    updateTotal();
    if (suggestionId) {
        var sLeaves = itemLeaves[suggestionId];
        for (var s = 0; s < sLeaves.length; s++) {
            var sItem = menuData[sLeaves[s]];
            if (sItem && sItem.imgs) {
                if (sItem.imgs.body) { var siBody = document.getElementById("img-" + sItem.imgs.body); if(siBody && !siBody.classList.contains('active')) siBody.classList.add('suggest-blink'); }
                if (sItem.imgs.face) { var siFace = document.getElementById("img-" + sItem.imgs.face); if(siFace && !siFace.classList.contains('active')) siFace.classList.add('suggest-blink'); }
            }
        }
    }
}

function updateTotal() {
    var p = 0, t = 0, f = false;
    for (var i = 0; i < selected.length; i++) {
        var id = selected[i]; p += getItemPrice(id); t += menuData[id].time; if(menuData[id].hasFace) f = true;
    }
    if (selected.length > 0) {
        if (userType === 'new') { t += 90; if (f) t += 20; document.getElementById('counseling-badge-area').innerHTML = '<span class="counseling-note">※無料カウンセリング込</span>'; } 
        else { if (f) t += 20; document.getElementById('counseling-badge-area').innerHTML = ''; }
    } else { document.getElementById('counseling-badge-area').innerHTML = ''; }
    var rounded = Math.ceil(t / 30) * 30, slot = Math.floor(rounded / 60) + "." + ((rounded % 60) === 30 ? '5' : '0');
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-slot').innerText = slot + " 時間枠";
}

// --- AI通信・提案 ---
function callAiConcierge(prompt, callback) {
    if (!GAS_WEBAPP_URL) return callback("お得なプランをご提案しますね。");
    var xhr = new XMLHttpRequest();
    xhr.open("POST", GAS_WEBAPP_URL, true);
    xhr.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try { var res = JSON.parse(xhr.responseText); callback(res.candidates[0].content.parts[0].text); } catch (e) { callback("最適なプランがありますよ！"); }
        }
    };
    xhr.send(JSON.stringify({ "prompt": prompt }));
}

function analyzeSuggestions(isManual) {
    var cheaperCandidates =[], samePriceCandidates = [], upsellCandidates =[];
    var upsellLimit = (userType === 'new') ? 5000 : 10000;
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) {
        var sid = keys[i]; if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue;
        var candLeaves = itemLeaves[sid], intersectingItems =[], intersectingLeaves =[], isCovered = true;
        for (var j = 0; j < selected.length; j++) {
            var selId = selected[j], selLeaves = itemLeaves[selId], hasInt = false;
            for (var k = 0; k < selLeaves.length; k++) { if (candLeaves.indexOf(selLeaves[k]) !== -1) { hasInt = true; } else { isCovered = false; } }
            if (hasInt) { intersectingItems.push(selId); for (var l = 0; l < selLeaves.length; l++) { if(intersectingLeaves.indexOf(selLeaves[l]) === -1) intersectingLeaves.push(selLeaves[l]); } }
        }
        if (intersectingItems.length >= 1 && isCovered) {
            var oldP = getOriginalTotal(intersectingItems), setP = getItemPrice(sid), diff = setP - oldP, addedLeaves = candLeaves.length - intersectingLeaves.length;
            if (diff < 0 && intersectingItems.length >= 2) { cheaperCandidates.push({sid:sid, type:'cheaper', oldPrice:oldP, diff:diff, intersectingItems:intersectingItems}); } 
            else if (diff === 0 && addedLeaves > 0 && intersectingItems.length >= 2) { samePriceCandidates.push({sid:sid, type:'samePrice', oldPrice:oldP, diff:0, intersectingItems:intersectingItems}); } 
            else if (diff > 0 && addedLeaves > 0 && selected.length >= 2 && diff < upsellLimit) { upsellCandidates.push({sid:sid, type:'upsell', oldPrice:oldP, diff:diff, intersectingItems:intersectingItems}); }
        }
    }
    if (cheaperCandidates.length > 0) return cheaperCandidates[0];
    if (samePriceCandidates.length > 0) return samePriceCandidates[0];
    if (upsellCandidates.length > 0) return upsellCandidates[0];
    return null;
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    if (!isConciergeON && !isManual) { suggestionId = null; return; }
    var best = analyzeSuggestions(isManual);
    if (!best) { suggestionId = null; return; }
    suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems;
    var currentT = getOriginalTotal(selected), setItem = menuData[best.sid], newT = currentT - best.oldPrice + getItemPrice(best.sid);
    var html = '<div class="sug-title">🎉 AIコンシェルジュからのご提案</div>';
    if (best.type === 'upsell') {
        html += '<div class="sug-benefit-msg">✨ お得にアップグレード可能です！ ✨</div>';
        html += '<div class="sug-menu-name">' + setItem.label + '</div>';
        html += '<div class="sug-upsell-panel"><div class="sug-upsell-col"><span class="sug-upsell-label">現在</span><span class="sug-upsell-price">¥' + currentT.toLocaleString() + '</span></div><div class="sug-upsell-col"><span class="sug-upsell-label">追加</span><span class="sug-upsell-price red">+¥' + best.diff.toLocaleString() + '</span></div><div class="sug-upsell-col"><span class="sug-upsell-label">合計</span><span class="sug-upsell-price large-red">¥' + newT.toLocaleString() + '</span></div></div>';
    } else {
        html += '<div class="sug-benefit-msg">✨ さらにお得なプランがあります！ ✨</div><div class="sug-menu-name">' + setItem.label + '</div><div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在</span><span class="sug-col-price old">¥' + currentT.toLocaleString() + '</span></div><div class="sug-arrow">▶▶</div><div class="sug-col"><span class="sug-col-label">変更後</span><span class="sug-col-price new">¥' + newT.toLocaleString() + '</span></div></div>';
    }
    html += '<div style="display:flex; gap:10px; margin-top:15px;"><button onclick="applyOptimalSet()" style="background:#000; color:#fff; padding:12px; border-radius:6px; font-weight:bold; flex:2;">変更する</button><button onclick="suggestionId=null; document.getElementById(\'suggestion-box\').style.display=\'none\'; render();" style="background:transparent; color:#111; border:none; flex:1; font-weight:bold;">今はしない</button></div>';
    document.getElementById('suggestion-box').innerHTML = html; document.getElementById('suggestion-box').style.display = 'block';
    callAiConcierge("メンズ脱毛NARXの店主として、お客様に「" + setItem.label + "」を提案する際の応援メッセージを20文字以内で短く一言。", function(msg) { showConciergeBubble(msg); });
}

function applyOptimalSet() {
    for (var i = 0; i < suggestionReplaceItems.length; i++) { var idx = selected.indexOf(suggestionReplaceItems[i]); if (idx !== -1) selected.splice(idx, 1); }
    selected.push(suggestionId); suggestionId = null; document.getElementById('suggestion-box').style.display = 'none'; render();
}

function toggleConcierge() {
    isConciergeON = !isConciergeON; var icon = document.getElementById('concierge-icon');
    if (isConciergeON) { icon.className = 'concierge-icon on'; checkSuggestion(true); } 
    else { icon.className = 'concierge-icon off'; showConciergeBubble("またいつでもお呼びください！"); document.getElementById('suggestion-box').style.display = 'none'; suggestionId = null; render(); }
}

function showConciergeBubble(msg) {
    var b = document.getElementById('concierge-bubble'); document.getElementById('concierge-msg').innerHTML = msg;
    b.style.display = 'block'; setTimeout(function() { b.style.opacity = '1'; }, 10);
    if (bubbleTimer) clearTimeout(bubbleTimer); bubbleTimer = setTimeout(function() { b.style.opacity = '0'; setTimeout(function(){b.style.display='none';},300); }, 4000);
}

function renderCalendar() {
    var wrapper = document.getElementById('calendar-container'), html = '<table class="cal-table">', days =['日','月','火','水','木','金','土'], today = new Date(), dates =[];
    html += '<tr><th class="time-col">時間</th>';
    for(var i=0; i<7; i++) {
        var d = new Date(today.getTime() + i*24*60*60*1000), m = d.getMonth() + 1, dateNum = d.getDate(), dayStr = days[d.getDay()];
        dates.push({ full: d.getFullYear() + '年' + m + '月' + dateNum + '日(' + dayStr + ')', short: m + '/' + dateNum + '<br>(' + dayStr + ')' });
        html += '<th>' + dates[i].short + '</th>';
    }
    html += '</tr>';
    var times =[]; for(var h=9; h<=21; h++) { times.push(h + ':00'); if(h !== 21) { times.push(h + ':30'); } }
    for(var t=0; t<times.length; t++) {
        html += '<tr><th class="time-col">' + times[t] + '</th>';
        for(var d=0; d<7; d++) {
            var rand = Math.random(), status = rand > 0.4 ? 'o' : (rand > 0.15 ? 'x' : 'hyphen'), mark = status === 'o' ? '◎' : (status === 'x' ? '×' : '－');
            html += '<td onclick="alert(\'準備中です\')">' + mark + '</td>';
        }
        html += '</tr>';
    }
    html += '</table>'; wrapper.innerHTML = html;
}
