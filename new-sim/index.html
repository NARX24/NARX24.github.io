<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NARX リアルタイム予約 Ver.39.4</title>
<script>
window.onerror = function(msg) { alert("致命的なエラー:\n" + msg); };
</script>
<style>
/* デザインは Ver.39.3 を継承 */
:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;}
.header-logo-container { text-align: center; padding: 20px 0 15px; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
.header-logo-img { width: 170px; height: auto; }
.gate-logo-container { text-align: center; margin-bottom: 30px; }
.gate-logo-img { width: 220px; height: auto; }
#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:12px;}
.container{max-width:600px;margin:0 auto;padding:0 20px;}
#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold;}
.dual-visual-container{display:flex;gap:4px;height:240px;position:sticky;top:10px;z-index:50;background:var(--light-gray);border:2px solid var(--gold);margin-bottom:20px;border-radius:8px;overflow:hidden;}
.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}
.tabs{display:flex;gap:5px;margin-bottom:15px;border-bottom:1px solid var(--light-gray);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.85rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}
.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;}
.item.selected{border:1px solid var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.item-price{color:var(--gold);font-weight:bold;}
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,5,5,0.98);border-top:2px solid var(--gold);padding:15px 20px;box-sizing:border-box;z-index:100;}
.summary-grid{display:grid;grid-template-columns:1fr 1.1fr;margin-bottom:12px;}
.summary-item .val{font-size:1.35rem;color:var(--gold);font-weight:bold;}
.btn-reserve{background:var(--gold);color:#000;width:100%;padding:15px;border-radius:6px;font-weight:bold;border:none;cursor:pointer;}
#calendar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100000; display: none; overflow-y: auto; }
.cal-header { background: #080808; padding: 15px; border-bottom: 1px solid var(--gold); text-align: center; display: flex; justify-content: space-between; }
.cal-wrapper { overflow-x: auto; background: #fff; }
.cal-table { width: 100%; border-collapse: collapse; text-align: center; color: #333; }
.cal-table th, .cal-table td { border: 1px solid #e0e0e0; padding: 15px 5px; min-width: 65px; }
.cal-status-o { color: #c09015; font-size: 1.4rem; font-weight: bold; cursor: pointer; }
.cal-status-x { color: #ccc; font-size: 1.2rem; }
</style>
</head>
<body>

<div id="gate-modal"><div class="modal-content"><img src="logo_white.png" style="width:200px;"><h2 style="color:var(--gold);">WELCOME</h2><button class="btn-reserve" onclick="forceStart('new')">初めて来店する</button><button class="btn-reserve" style="background:#222;color:#fff;margin-top:10px;" onclick="forceStart('repeat')">既に会員である</button></div></div>
<div class="container">
    <div class="header-logo-container"><img src="logo_white.png" class="header-logo-img"><div><div id="mode-display"></div></div></div>
    <div class="dual-visual-container"><div class="view-panel" id="body-panel"><span>BODY</span><img src="base_body.png" class="base-img"></div><div class="view-panel" id="face-panel"><span>FACE</span><img src="base_face.png" class="base-img"></div></div>
    <div class="tabs"><div id="tab-set" class="tab active" onclick="changeTab('set')">セット</div><div id="tab-part" class="tab" onclick="changeTab('part')">パーツ</div></div>
    <div id="menu-area"></div>
</div>
<div class="bottom-bar">
    <div class="summary-grid"><div class="summary-item"><span class="val" id="total-price">¥0</span></div><div class="summary-item" style="text-align:right;"><span class="val" id="total-time-slot">0.0 時間枠</span></div></div>
    <div id="action-btn-container"></div>
</div>
<div id="calendar-modal"><div class="cal-header"><span style="color:var(--gold);">予約空き状況</span><button onclick="closeCalendarModal()">戻る</button></div><div id="cal-loading" style="text-align:center;padding:50px;color:var(--gold);">空き状況を読み込み中...</div><div class="cal-wrapper" id="calendar-container"></div></div>

<script>
// 【重要】最新のウェブアプリ URL
var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwd_vgJV_asH2zWXKwBhDdSU_aAQZkLen4f29HRnN1bsY4UcudqL9VRABDYHeLtRmk07Q/exec";

var userType = 'new', currentTab = 'set', selected = [], itemLeaves = {}, busySlots = [];

var menuData = {
    set_fullbody_all:{price:52800,time:240,label:'全身オールセット',cat:'set',imgs:{body:'set_fullbody_all_body',face:'set_fullbody_all_face'}},
    set_fullface:{price:13200,time:65,label:'全顔セット',cat:'set',imgs:{face:'set_fullface'}}
};

function getItemPrice(id) { var it = menuData[id]; return userType === 'new' ? it.price * 0.5 : it.price; }
function forceStart(t) { document.getElementById('gate-modal').style.display='none'; userType=t; var b=document.getElementById('mode-display'); b.innerText = t==='new'?"新規様モード":"会員様モード"; document.getElementById('action-btn-container').innerHTML = '<button class="btn-reserve" onclick="proceedToCalendar()">予約へ進む</button>'; initApp(); render(); }
function initApp() { var keys=Object.keys(menuData); var b=document.getElementById('body-panel'), f=document.getElementById('face-panel'); for(var j=0;j<keys.length;j++){ var it=menuData[keys[j]]; if(it.imgs){ if(it.imgs.body)createImg(b,it.imgs.body); if(it.imgs.face)createImg(f,it.imgs.face); } } }
function createImg(p,n){ var id="img-"+n; if(document.getElementById(id))return; var img=document.createElement('img'); img.src=n+".png"; img.id=id; img.className='layer-part'; p.appendChild(img); }
function changeTab(t){ currentTab=t; render(); }
function toggleItem(id){ var idx=selected.indexOf(id); if(idx!==-1)selected.splice(idx,1); else selected.push(id); render(); }
function render() {
    var area=document.getElementById('menu-area'); area.innerHTML='';
    var keys=Object.keys(menuData);
    for(var i=0;i<keys.length;i++){
        var id=keys[i], mi=menuData[id]; if(mi.cat!==currentTab)continue;
        var isS=selected.indexOf(id)!==-1;
        var div=document.createElement('div'); div.className="item "+(isS?'selected':'');
        (function(targetId){ div.onclick=function(){toggleItem(targetId);}; })(id);
        div.innerHTML='<div class="item-info"><span class="item-name">'+mi.label+'</span></div><div class="item-price">¥'+getItemPrice(id).toLocaleString()+'</div>';
        area.appendChild(div);
        if(isS && mi.imgs){ if(mi.imgs.body)document.getElementById("img-"+mi.imgs.body).classList.add('active'); if(mi.imgs.face)document.getElementById("img-"+mi.imgs.face).classList.add('active'); }
    }
    updateTotal();
}
function updateTotal() { var p=0, t=0; for (var i=0; i<selected.length; i++){ p+=getItemPrice(selected[i]); t+=menuData[selected[i]].time; } var rounded=Math.ceil(t/30)*30; document.getElementById('total-price').innerText="¥"+p.toLocaleString(); document.getElementById('total-time-slot').innerText=(rounded/60).toFixed(1)+" 時間枠"; }

function callGas(p, cb){
    var xhr=new XMLHttpRequest(); xhr.open("POST", GAS_WEBAPP_URL, true);
    xhr.onreadystatechange=function(){
        if(xhr.readyState===4){
            if(xhr.status===200){
                try { var res=JSON.parse(xhr.responseText); cb(res); } 
                catch(e){ alert("JSON解析失敗: " + xhr.responseText); }
            } else { alert("通信エラー: ステータス " + xhr.status); }
        }
    };
    xhr.send(JSON.stringify(p));
}

function proceedToCalendar() {
    if(selected.length===0)return alert("メニューを選択してください。");
    document.getElementById('calendar-modal').style.display='block';
    document.getElementById('calendar-container').innerHTML = '';
    document.getElementById('cal-loading').style.display = 'block';
    
    callGas({type:'getBusySlots'}, function(res) {
        if(res.error) {
            alert("GASエラー報告:\n" + res.error);
        } else if(Array.isArray(res)) {
            busySlots = res;
            document.getElementById('cal-loading').style.display = 'none';
            renderCalendar();
        } else {
            alert("不明な形式のデータが返されました:\n" + JSON.stringify(res));
        }
    });
}
function closeCalendarModal(){ document.getElementById('calendar-modal').style.display='none'; }
function renderCalendar() {
    var wrapper=document.getElementById('calendar-container'), html='<table class="cal-table">', today=new Date();
    var tts = document.getElementById('total-time-slot');
    var reqMs = parseFloat(tts ? tts.innerText : 0) * 60 * 60 * 1000;
    html+='<tr><th>時間</th>';
    for(var i=0; i<7; i++){ var d=new Date(today.getTime() + i*24*60*60*1000); html+='<th>'+(d.getMonth()+1)+'/'+d.getDate()+'</th>'; }
    html+='</tr>';
    var times=['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
    for(var t=0; t<times.length; t++){
        html+='<tr><td>'+times[t]+'</td>';
        for(var d=0; d<7; d++){
            var slotDate = new Date(today.getFullYear(), today.getMonth(), today.getDate()+d, times[t].split(':')[0], 0);
            var s = slotDate.getTime(); var e = s + reqMs; var isB = false;
            for(var b=0; b<busySlots.length; b++){ if(s < busySlots[b].end && e > busySlots[b].start){ isB=true; break; } }
            if(s < new Date().getTime()) isB = true;
            if(isB) html+='<td class="cal-status-x">×</td>';
            else html+='<td class="cal-status-o" onclick="alert(\'予約実行ロジックは正常です\')">◎</td>';
        }
        html+='</tr>';
    }
    wrapper.innerHTML = html+'</table>';
}
</script>
</body>
</html>
