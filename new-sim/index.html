<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARX プレミアム・コンシェルジュ・シミュレーター</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #000;
            --dark-gray: #1a1a1a;
            --light-gray: #333;
            --white: #fff;
            --panel-bg: #fdfdfd;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            margin: 0;
            padding-bottom: 200px;
        }

        /* 来店属性確認モーダル */
        #gate-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; text-align: center;
        }
        .modal-content {
            border: 1px solid var(--gold); padding: 40px 20px;
            width: 80%; max-width: 400px; background: var(--black);
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.4rem; letter-spacing: 3px; }
        
        /* 現在のモード表示（誤操作防止） */
        .status-badge {
            font-size: 0.7rem; color: var(--black); background: var(--gold);
            padding: 2px 10px; border-radius: 10px; margin-top: 5px; display: inline-block;
        }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn {
            flex: 1; padding: 12px; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .type-btn.active { background: var(--gold); color: var(--black); }

        /* 2画面分割プレビュー */
        .dual-visual-container {
            display: flex; gap: 4px; height: 260px; position: sticky; top: 10px; z-index: 50;
            background: var(--light-gray); border: 2px solid var(--gold);
            margin-bottom: 20px; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .view-panel { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-color: var(--panel-bg); }
        .view-panel:first-child { border-right: 1px solid #ddd; }
        .view-panel span { position: absolute; top: 8px; font-size: 10px; color: #333; letter-spacing: 2px; font-weight: bold; opacity: 0.7; z-index: 10; }
        .view-panel img { position: absolute; height: 90%; transition: opacity 0.4s ease; pointer-events: none; }
        .base-img { opacity: 0.4; z-index: 1; }
        .layer-part { opacity: 0; z-index: 2; }
        .layer-part.active { opacity: 1; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); }

        /* カテゴリータブ */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--light-gray); }
        .tab { flex: 1; padding: 12px 5px; text-align: center; color: #777; cursor: pointer; font-size: 0.85rem; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        /* 高級サブタイトル飾り */
        .subcat-header {
            display: flex; align-items: center; justify-content: center;
            margin: 25px 0 15px; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.3em;
        }
        .subcat-header::before, .subcat-header::after {
            content: ""; flex: 1; height: 1px; background: linear-gradient(to var(--direction, right), transparent, var(--gold));
            margin: 0 15px;
        }
        .subcat-header::after { --direction: left; }

        /* メニューリスト */
        .item { background: var(--dark-gray); margin-bottom: 8px; padding: 15px; border-radius: 5px; display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .item.selected { border-color: var(--gold); background: #111; }
        .item.disabled { opacity: 0.15; cursor: default; }
        .item input { transform: scale(1.3); margin-right: 15px; accent-color: var(--gold); }
        .item-info { flex: 1; }
        .item-name { display: block; font-size: 0.95rem; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 0.85rem; }
        .item-sub { display: block; font-size: 0.65rem; color: #888; margin-top: 4px; line-height: 1.3; }

        /* ポップアップ提案 */
        #suggestion-box {
            position: fixed; bottom: 210px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--gold); color: var(--black);
            padding: 15px; border-radius: 8px; display: none; z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); animation: fadeInUp 0.5s;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5, 5, 5, 0.96); border-top: 2px solid var(--gold); padding: 15px 20px; box-sizing: border-box; z-index: 100; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 12px; }
        .summary-item .label { font-size: 0.7rem; color: #777; display: block; }
        .summary-item .val { font-size: 1.3rem; color: var(--gold); font-weight: bold; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 14px; text-align: center; border-radius: 4px; font-weight: bold; text-decoration: none; font-size: 0.85rem; border: none; cursor: pointer; }
        .btn-copy { background: #222; color: #fff; }
        .btn-reserve { background: var(--gold); color: #000; }
    </style>
</head>
<body>

        <button class="btn btn-reserve" style="width: 100%; margin-bottom: 15px;" onclick="setType('new'); hideGate();">初めて来店する</button>
        <button class="btn btn-copy" style="width: 100%;" onclick="setType('repeat'); hideGate();">既に会員である</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>NARX</h1>
        <div id="mode-display" class="status-badge">新規 / 初めての方モード</div>
    </div>

    <div class="type-selector">
        <button class="type-btn active" id="type-new" onclick="setType('new')">初めての方</button>
        <button class="type-btn" id="type-rep" onclick="setType('repeat')">会員の方</button>
    </div>

    <div class="dual-visual-container">

        <div class="view-panel" id="face-panel"><span>FACE</span><img src="base_face.png" class="base-img"></div>

    <div class="tabs">

</div>

<!-- お得セット提案ポップアップ -->

    <button onclick="hideSuggestion()" style="background: transparent; border: none; margin-left: 10px; font-size: 0.7rem; cursor: pointer;">今はしない</button>
</div>

<div class="bottom-bar">
    <div class="summary-grid">
        <div class="summary-item"><span class="label">料金合計 (税込)</span><span class="val" id="total-price">¥0</span></div>
        <div class="summary-item" style="text-align: right;"><span class="label">予約枠目安</span><span class="val" id="total-time-slot">0.0 時間枠</span></div>
    </div>
    <div class="btn-group">

    </div>
</div>

    set_ear_whole: ['part_tragus', 'part_earlobe']

let selectedIds = new Set();
let pendingSet = null;

function init() {
    const bPanel = document.getElementById('body-panel');
    const fPanel = document.getElementById('face-panel');
    Object.keys(menuData).forEach(id => {
        const imgSet = menuData[id].imgs;
        if (imgSet.body) createImgLayer(bPanel, imgSet.body);
        if (imgSet.face) createImgLayer(fPanel, imgSet.face);
    });
    render();
}

function createImgLayer(parent, fileName) {
    if (document.getElementById(`img-${fileName}`)) return;
    const img = document.createElement('img');
    img.src = `${fileName}.png`;
    img.id = `img-${fileName}`;
    img.className = 'layer-part';
    parent.appendChild(img);
}

function render() {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(activeTab)));
    const area = document.getElementById('menu-area');
    area.innerHTML = '';
    
    document.querySelectorAll('.layer-part').forEach(img => img.classList.remove('active'));
    selectedIds.forEach(id => {
        const item = menuData[id];
        if (item && item.imgs) {
            if (item.imgs.body) document.getElementById(`img-${item.imgs.body}`).classList.add('active');
            if (item.imgs.face) document.getElementById(`img-${item.imgs.face}`).classList.add('active');
        }
    });

    let disabledIds = [];
    selectedIds.forEach(id => {
        if (setIncludes[id]) {
            setIncludes[id].forEach(subId => {
                disabledIds.push(subId);
                if (setIncludes[subId]) setIncludes[subId].forEach(subSubId => disabledIds.push(subSubId));
            });
        }
    });

    const itemsToShow = Object.keys(menuData).filter(id => menuData[id].cat === activeTab);
    let currentSubCat = "";

    itemsToShow.forEach(id => {
        const item = menuData[id];
        if (activeTab === 'part' && item.subCat !== currentSubCat) {
            currentSubCat = item.subCat;
            const header = document.createElement('div');
            header.className = 'subcat-header';
            header.innerText = currentSubCat;
            area.appendChild(header);
        }

        const isSelected = selectedIds.has(id);
        const isDisabled = disabledIds.includes(id);

        const div = document.createElement('div');
        div.className = `item ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}`;
        div.onclick = () => !isDisabled && toggleItem(id);

        div.innerHTML = `
            <input type="checkbox" ${isSelected ? 'checked' : ''} ${isDisabled ? 'disabled' : ''}>
            <div class="item-info">
                <span class="item-name">${item.label}</span>
                ${item.sub ? `<span class="item-sub">${item.sub}</span>` : ''}
            </div>
            <div class="item-price">¥${item.price.toLocaleString()}</div>
        `;
        area.appendChild(div);
    });

    updateCalc();
}

function toggleItem(id) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    checkSetOptimization();
    render();
}
