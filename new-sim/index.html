<style>
:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;overflow-x:hidden;}

/* ヘッダー */
.header-logo-container { text-align: center; padding: 20px 0 15px; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
.header-logo-img { width: 170px; height: auto; margin-bottom: 8px; }
.gate-logo-container { text-align: center; margin-bottom: 30px; }
.gate-logo-img { width: 220px; height: auto; }

#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:12px;}
.container{max-width:600px;margin:0 auto;padding:0 20px;}
#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold;}

/* ビジュアルパネル */
.dual-visual-container{display:flex;gap:4px;height:240px;position:sticky;top:10px;z-index:50;background:var(--light-gray);border:2px solid var(--gold);margin-bottom:20px;border-radius:8px;overflow:hidden;}
.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel:first-child{border-right:1px solid #ddd;}
.view-panel span{position:absolute;top:8px;font-size:9px;color:#999;letter-spacing:2px;font-weight:bold;z-index:10;}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}

/* 点滅アニメーション（塗りつぶしも含めて強調） */
@keyframes blink-gold {
    0% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
    50% { opacity: 0.9; filter: drop-shadow(0 0 15px var(--gold)); }
    100% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
}
.layer-part.suggest-blink { animation: blink-gold 1.0s infinite ease-in-out; z-index: 3; display: block !important; }

/* メニュー・タブ */
.tabs{display:flex;gap:5px;margin-bottom:15px;border-bottom:1px solid var(--light-gray);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.85rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}

/* プレミアム小見出し（ハイフンなし） */
.menu-sub-header {
    color: var(--gold);
    font-size: 0.9rem;
    text-align: center;
    padding: 25px 0 15px;
    letter-spacing: 6px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}
.menu-sub-header::before, .menu-sub-header::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 20px;
}

#selected-chips-area { margin-bottom: 15px; background: #0a0a0a; padding: 12px; border-radius: 8px; border: 1px solid #222; }
.chips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.chips-title { font-size: 0.75rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }
.btn-reset { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; }
.chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
.chip-close { background: var(--gold); color: #000; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.6rem; font-weight: bold; cursor: pointer; }

.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item.disabled{opacity:0.15;cursor:default;filter:grayscale(1);}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.special-label { font-size: 0.65rem; color: #999; margin-left: 6px; font-style: italic; }
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;margin-top:2px;}
.price-tag-new { font-size: 0.65rem; background: #c00; color: #fff; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }

/* AI提案パネル（画像のデザインを完全再現） */
#suggestion-box{position:fixed;bottom:185px;left:50%;transform:translateX(-50%);width:92%;max-width:420px;background:linear-gradient(135deg,#f7d05e 0%,#d4af37 100%);color:#111;padding:20px;border-radius:12px;display:none;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.8);border:1px solid #fff;}
.sug-title{font-weight:bold;font-size:0.85rem;color:#555;margin-bottom:12px;text-align:center;}
.sug-benefit-msg{text-align:center;font-size:0.75rem;color:var(--gold);background:#111;padding:10px;border-radius:4px;font-weight:bold;margin-bottom:15px;letter-spacing:0.5px;}
.sug-menu-name{font-size:1.15rem;font-weight:bold;color:#111;margin-bottom:4px;text-align:center;}
.sug-upsell-panel{background:rgba(255,255,255,0.85);padding:15px 5px;border-radius:8px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:flex-start;}
.sug-upsell-col{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;}
.sug-upsell-label{font-size:0.65rem;color:#333;margin-bottom:8px;}
.sug-upsell-price{font-size:1.05rem;color:#111;font-weight:bold;}
.sug-upsell-price.red{color:#c00;font-size:1.15rem;}
.sug-upsell-price.large-red{color:#c00;font-size:1.35rem;}

.sug-compare-panel{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.75);padding:12px 10px;border-radius:8px;margin-bottom:10px;border:1px solid rgba(0,0,0,0.1);}
.sug-col{flex:1;text-align:center;}
.sug-col-label{font-size:0.65rem;color:#555;display:block;margin-bottom:2px;font-weight:bold;}
.sug-col-price{font-size:1rem;color:#111;font-weight:bold;}
.sug-col-price.old{text-decoration:line-through;color:#888;font-size:0.9rem;}
.sug-col-price.new{font-size:1.3rem;color:#c00;}
.sug-arrow{padding:0 5px;color:#c00;font-weight:bold;text-align:center;font-size:1.2rem;}

.sug-btn-group{display:flex; gap:10px; margin-top:15px;}
.btn-sug-apply{background:#000; color:#fff; border:1px solid #000; padding:14px; border-radius:6px; font-weight:bold; flex:2; cursor:pointer;}
.btn-sug-skip{background:transparent; color:#111; border:none; flex:1; font-weight:bold; cursor:pointer;}

/* コンシェルジュアイコン */
#concierge-wrapper{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;align-items:center;flex-direction:column;pointer-events:none;}
#concierge-bubble{display:none;background:#fff;color:#111;padding:12px 16px;border-radius:12px;font-size:0.75rem;font-weight:bold;margin-bottom:12px;box-shadow:0 4px 15px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.3s ease;position:relative;text-align:center;pointer-events:auto;}
.bubble-tail{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fff;}
.concierge-icon{width:56px;height:56px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.8);pointer-events:auto;transition:0.3s;border:2px solid var(--gold);}
.concierge-icon.on{background:var(--gold);}
.concierge-icon.on svg path, .concierge-icon.on svg circle { fill: #111; }
.concierge-icon.off{background:#111;}
.concierge-icon.off svg path, .concierge-icon.off svg circle { fill: var(--gold); }

/* カレンダー */
#calendar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100000; display: none; overflow: hidden; }
.cal-header { background: #080808; padding: 15px; border-bottom: 1px solid var(--gold); text-align: center; }
.cal-outer-wrapper { height: calc(100% - 110px); overflow: auto; background: #333; }
.cal-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; background: #fff; }
.cal-table thead th { position: sticky; top: 0; background: #eee; color: #333; z-index: 10; font-size: 0.65rem; padding: 12px 2px; border: 1px solid #ccc; font-weight: bold; }
.cal-table thead th.sun { color: #dc3545; }
.cal-table thead th.sat { color: #007bff; }
.cal-table td:first-child { position: sticky; left: 0; background: #222; color: var(--gold); z-index: 9; width: 50px; font-weight: bold; font-size: 0.7rem; border-right: 1px solid var(--gold); }
.cal-status-o { background: #fff; color: #c09015; font-size: 1.2rem; font-weight: bold; border: 1px solid #ddd; cursor: pointer; }
.cal-status-x { background: #bbb; color: #888; font-size: 1.0rem; border: 1px solid #aaa; pointer-events: none; }
.cal-status-off { background: #444; color: #666; border: 1px solid #555; pointer-events: none; }

#info-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100001; display: none; overflow-y: auto; padding: 20px 0; }
.form-group { text-align: left; margin-bottom: 15px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--gold); margin-bottom: 5px; }
.form-group input { width: 100%; padding: 14px; border-radius: 6px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; }

.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,5,5,0.98);border-top:2px solid var(--gold);padding:15px 20px;box-sizing:border-box;z-index:100;}
.btn-reserve{background:var(--gold);color:#000;width:100%;padding:16px;border-radius:6px;font-weight:bold;border:none;cursor:pointer;font-size:0.95rem;}
#loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200000; display: none; justify-content: center; align-items: center; color: var(--gold); font-weight: bold; }
</style>
</head>

    other_face_correction:{price:22000,time:90,label:'小顔矯正術',cat:'other',imgs:{face:'other_face_correction'},hasFace:true}
};

var setIncludes = {
    set_fullbody_all:['set_fullbody_noface','set_fullbody_novio','set_upperbody','set_lowerbody','set_fullface','set_vio'],
    set_fullbody_noface:['set_lowerbody','set_vio','set_arms','set_legs','part_nape','part_armpit','part_chest_nipple','part_abdomen_navel','part_back_upper','part_back_lower','part_buttocks'],
    set_fullface:['part_nose_under','part_mouth_under','part_cheek','part_face_line','part_neck'],
    set_vio:['part_v_line','part_i_line','part_o_line']
};

function getItemPrice(id) {
    var item = menuData[id];
    if (userType === 'new') {
        var face5 = ['part_nose_under','part_mouth_under','part_cheek','part_face_line','part_neck'];
        if (face5.indexOf(id) !== -1) return 1000;
        if (id === 'set_fullface') return 5000;
        return item.price * 0.5;
    }
    return item.price;
}

function getOriginalTotal(idList) {
    var total = 0;
    for (var i = 0; i < idList.length; i++) { total += getItemPrice(idList[i]); }
    return total;
}

// ==========================================
// 3. 制御ロジック
// ==========================================
function forceStart(t) {
    document.getElementById('gate-modal').style.display='none'; userType=t;
    document.getElementById('mode-display').innerText = t==='new'?"【ご新規様】初回限定価格モード適用中":"【会員様】通常価格モード適用中";
    document.getElementById('action-btn-container').innerHTML = '<button class="btn-reserve" onclick="proceedToCalendar()">空き状況を確認して予約へ</button>';
    initApp(); render();
}

function initApp() {
    function getLeafNodes(id) {
        var leaves = [];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) {
                for (var i = 0; i < setIncludes[nodeId].length; i++) { traverse(setIncludes[nodeId][i]); }
            } else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id); return leaves;
    }
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) { itemLeaves[keys[i]] = getLeafNodes(keys[i]); }
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    for (var j = 0; j < keys.length; j++) {
        var item = menuData[keys[j]];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    }
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png"; img.id = layerId; img.className = 'layer-part';
    img.onerror = function() { this.style.display = 'none'; };
    parent.appendChild(img);
}

function changeTab(t){ currentTab=t; render(); }
function resetSelection(){ selected = []; suggestionId = null; document.getElementById('suggestion-box').style.display='none'; render(); }
function toggleItem(id){ 
    var idx=selected.indexOf(id); if(idx!==-1)selected.splice(idx,1); else selected.push(id); 
    checkSuggestion(false); render(); 
}

// ==========================================
// 4. メイン描画 (プレミアムUI & ハイフンなし小見出し)
// ==========================================
function render() {
    var area = document.getElementById('menu-area'); area.innerHTML='';
    var tabs = document.querySelectorAll('.tab');
    for (var t = 0; t < tabs.length; t++) { tabs[t].classList.remove('active'); }
    document.getElementById("tab-" + currentTab).classList.add('active');

    // チップ表示
    var chipsArea = document.getElementById('selected-chips-area'), container = document.getElementById('chips-container');
    if (selected.length === 0) { chipsArea.style.display = 'none'; }
    else {
        chipsArea.style.display = 'block'; container.innerHTML = '';
        for (var i = 0; i < selected.length; i++) {
            var chip = document.createElement('div'); chip.className = 'chip';
            chip.innerHTML = '<span>' + menuData[selected[i]].label + '</span><span class="chip-close" onclick="event.stopPropagation(); toggleItem(\'' + selected[i] + '\')">×</span>';
            container.appendChild(chip);
        }
    }

    // ビジュアル点灯 (新機能: 追加分だけ塗りつぶしも含めて点滅)
    var parts = document.querySelectorAll('.layer-part');
    for (var p = 0; p < parts.length; p++) { parts[p].classList.remove('active', 'suggest-blink'); }
    
    var currentLeaves = [];
    for (var s = 0; s < selected.length; s++) {
        var lNodes = itemLeaves[selected[s]];
        for (var ln = 0; ln < lNodes.length; ln++) {
            if (currentLeaves.indexOf(lNodes[ln]) === -1) currentLeaves.push(lNodes[ln]);
        }
    }

    for (var cl = 0; cl < currentLeaves.length; cl++) {
        var item = menuData[currentLeaves[cl]];
        if (item.imgs.body) { var b = document.getElementById("img-" + item.imgs.body); if(b) b.classList.add('active'); }
        if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); }
    }

    if (suggestionId) {
        var sugLeaves = itemLeaves[suggestionId];
        for (var sl = 0; sl < sugLeaves.length; sl++) {
            var leafId = sugLeaves[sl];
            if (currentLeaves.indexOf(leafId) === -1) { 
                var sItem = menuData[leafId];
                if (sItem.imgs.body) { var siBody = document.getElementById("img-" + sItem.imgs.body); if(siBody) siBody.classList.add('suggest-blink'); }
                if (sItem.imgs.face) { var siFace = document.getElementById("img-" + sItem.imgs.face); if(siFace) siFace.classList.add('suggest-blink'); }
            }
        }
    }

    // リスト描画 (ハイフン除去済み)
    var keys = Object.keys(menuData);
    var subCats = (currentTab === 'part') ? [
        {id:'face', label:'顔'},
        {id:'upper', label:'上半身'},
        {id:'lower', label:'下半身'}
    ] : [{id:'none', label:''}];

    for (var sc = 0; sc < subCats.length; sc++) {
        var sub = subCats[sc];
        if (currentTab === 'part') {
            var header = document.createElement('div');
            header.className = 'menu-sub-header';
            header.innerText = sub.label;
            area.appendChild(header);
        }

        for (var m = 0; m < keys.length; m++) {
            var id = keys[m], item = menuData[id];
            if (item.cat !== currentTab) continue;
            if (currentTab === 'part' && item.subCat !== sub.id) continue;
            
            var isSel = selected.indexOf(id) !== -1, isDis = false;
            if (!isSel) {
                var leaves = itemLeaves[id];
                for (var l = 0; l < leaves.length; l++) {
                    if (currentLeaves.indexOf(leaves[l]) !== -1) { isDis = true; break; }
                }
            }
            
            var div = document.createElement('div');
            div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : '');
            (function(mid, disabled){ div.onclick = function(){ if(!disabled) toggleItem(mid); }; })(id, isDis);
            
            var price = getItemPrice(id);
            var specialTag = item.isSpecial ? '<span class="special-label">（特殊部位）</span>' : '';
            
            div.innerHTML = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '>' +
                            '<div class="item-info"><span class="item-name">' + item.label + specialTag + '</span></div>' +
                            '<div class="item-price">¥' + price.toLocaleString() + (userType==='new' ? '<span class="price-tag-new">初回</span>' : '') + '</div>';
            area.appendChild(div);
        }
    }
    updateTotal();
}

function updateTotal() {
    var p = 0, t = 0, f = false;
    for (var i = 0; i < selected.length; i++) {
        p += getItemPrice(selected[i]); t += menuData[selected[i]].time;
        if(menuData[selected[i]].hasFace) f = true;
    }
    if (selected.length > 0) {
        if (userType === 'new') { t += 90; if(f) t += 20; document.getElementById('counseling-badge-area').innerHTML = '<span class="counseling-note">※無料カウンセリング込</span>'; }
        else { if(f) t += 20; document.getElementById('counseling-badge-area').innerHTML = ''; }
    }
    var rounded = Math.ceil(t / 30) * 30;
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-slot').innerText = (rounded/60).toFixed(1) + " 枠";
}

// ==========================================
// 5. AIコンシェルジュ (デザイン復元版)
// ==========================================
function analyzeSuggestions(isManual) {
    var cheaperCandidates =[], samePriceCandidates = [], upsellCandidates =[];
    var upsellLimit = (userType === 'new') ? 5000 : 10000;
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) {
        var sid = keys[i]; if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue;
        var candLeaves = itemLeaves[sid], intersectingItems =[], intersectingLeaves =[], isCovered = true;
        for (var j = 0; j < selected.length; j++) {
            var selId = selected[j], selLeaves = itemLeaves[selId], hasInt = false;
            for (var k = 0; k < selLeaves.length; k++) { if (candLeaves.indexOf(selLeaves[k]) !== -1) { hasInt = true; } else { isCovered = false; } }
            if (hasInt) { intersectingItems.push(selId); for (var l = 0; l < selLeaves.length; l++) { if(intersectingLeaves.indexOf(selLeaves[l]) === -1) intersectingLeaves.push(selLeaves[l]); } }
        }
        if (intersectingItems.length >= 1 && isCovered) {
            var oldP = getOriginalTotal(intersectingItems), setP = getItemPrice(sid), diff = setP - oldP, addedLeaves = candLeaves.length - intersectingLeaves.length;
            if (diff < 0 && intersectingItems.length >= 2) { cheaperCandidates.push({sid:sid, type:'cheaper', oldPrice:oldP, diff:diff, intersectingItems:intersectingItems}); } 
            else if (diff === 0 && addedLeaves > 0 && intersectingItems.length >= 2) { samePriceCandidates.push({sid:sid, type:'samePrice', oldPrice:oldP, diff:0, intersectingItems:intersectingItems}); } 
            else if (diff > 0 && addedLeaves > 0 && selected.length >= 2 && diff < upsellLimit) { upsellCandidates.push({sid:sid, type:'upsell', oldPrice:oldP, diff:diff, intersectingItems:intersectingItems}); }
        }
    }
    if (cheaperCandidates.length > 0) return cheaperCandidates[0];
    if (samePriceCandidates.length > 0) return samePriceCandidates[0];
    if (upsellCandidates.length > 0) return upsellCandidates[0];
    return null;
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    if (!isConciergeON && !isManual) { suggestionId = null; return; }
    var best = analyzeSuggestions(isManual);
    if (!best) { suggestionId = null; render(); return; }
    
    suggestionId = best.sid; 
    suggestionReplaceItems = best.intersectingItems;
    
    var currentTotal = getOriginalTotal(selected);
    var setItem = menuData[best.sid];
    var setPrice = getItemPrice(best.sid);
    var newTotal = currentTotal - best.oldPrice + setPrice;
    
    var html = '<div class="sug-title">🎉 AIコンシェルジュからのご提案</div>';
    
    if (best.type === 'upsell') {
        html += '<div class="sug-benefit-msg">✨ お得にアップグレード可能です！ ✨</div>';
        html += '<div class="sug-menu-name">' + setItem.label + '</div>';
        html += '<div class="sug-upsell-panel">';
        html += '  <div class="sug-upsell-col"><span class="sug-upsell-label">現在</span><span class="sug-upsell-price">¥' + currentTotal.toLocaleString() + '</span></div>';
        html += '  <div class="sug-upsell-col"><span class="sug-upsell-label">追加</span><span class="sug-upsell-price red">+¥' + best.diff.toLocaleString() + '</span></div>';
        html += '  <div class="sug-upsell-col"><span class="sug-upsell-label">合計</span><span class="sug-upsell-price large-red">¥' + newTotal.toLocaleString() + '</span></div>';
        html += '</div>';
    } else {
        html += '<div class="sug-benefit-msg">✨ さらにお得なプランがあります！ ✨</div>';
        html += '<div class="sug-menu-name">' + setItem.label + '</div>';
        html += '<div class="sug-compare-panel">';
        html += '  <div class="sug-col"><span class="sug-col-label">現在</span><span class="sug-col-price old">¥' + currentTotal.toLocaleString() + '</span></div>';
        html += '  <div class="sug-arrow">▶▶</div>';
        html += '  <div class="sug-col"><span class="sug-col-label">変更後</span><span class="sug-col-price new">¥' + newTotal.toLocaleString() + '</span></div>';
        html += '</div>';
    }
    
    html += '<div class="sug-btn-group">';
    html += '  <button onclick="applyOptimalSet()" class="btn-sug-apply">変更する</button>';
    html += '  <button onclick="suggestionId=null; document.getElementById(\'suggestion-box\').style.display=\'none\'; render();" class="btn-sug-skip">今はしない</button>';
    html += '</div>';
    
    document.getElementById('suggestion-box').innerHTML = html;
    document.getElementById('suggestion-box').style.display = 'block';
    render(); 
}

function applyOptimalSet() {
    for (var i = 0; i < suggestionReplaceItems.length; i++) { var idx = selected.indexOf(suggestionReplaceItems[i]); if (idx !== -1) selected.splice(idx, 1); }
    selected.push(suggestionId); suggestionId = null; document.getElementById('suggestion-box').style.display = 'none'; render();
}

function toggleConcierge() {
    isConciergeON = !isConciergeON; var icon = document.getElementById('concierge-icon');
    if (isConciergeON) { icon.className = 'concierge-icon on'; checkSuggestion(true); showConciergeBubble("最適なプランをご提案します！"); } 
    else { icon.className = 'concierge-icon off'; showConciergeBubble("またお呼びください！"); document.getElementById('suggestion-box').style.display = 'none'; suggestionId = null; render(); }
}

function showConciergeBubble(msg) {
    var b = document.getElementById('concierge-bubble'); document.getElementById('concierge-msg').innerText = msg;
    b.style.display = 'block'; setTimeout(function() { b.style.opacity = '1'; }, 10);
    if (bubbleTimer) clearTimeout(bubbleTimer); bubbleTimer = setTimeout(function() { b.style.opacity = '0'; setTimeout(function(){b.style.display='none';},300); }, 4000);
}

// 🚀 週刊予約カレンダー
function changeWeek(n) { weekOffset += n; renderCalendar(); }
function proceedToCalendar() {
    if (selected.length === 0) return alert("メニューを選んでください");
    showLoading(true);
    var xhr=new XMLHttpRequest(); xhr.open("POST", GAS_URL, true);
    xhr.onreadystatechange=function(){ if(xhr.readyState===4){ 
        busySlots = JSON.parse(xhr.responseText); 
        showLoading(false); renderCalendar(); 
        document.getElementById('calendar-modal').style.display='block'; 
    }};
    xhr.send(JSON.stringify({type:'getBusySlots'}));
}

function renderCalendar() {
    var wrapper=document.getElementById('calendar-container'), now=new Date();
    var reqMs = parseFloat(document.getElementById('total-time-slot').innerText) * 60 * 60 * 1000;
    var firstDay = new Date();
    var day = firstDay.getDay();
    var diffToMon = (day === 0 ? -6 : 1) - day; 
    firstDay.setDate(firstDay.getDate() + diffToMon + (weekOffset * 7));
    document.getElementById('cal-title').innerText = (firstDay.getMonth()+1)+"/"+firstDay.getDate() + "の週";
    var dayNames = ['日','月','火','水','木','金','土'];
    var html='<table class="cal-table"><thead><tr><th>時間</th>';
    for(var i=0; i<7; i++){
        var d = new Date(firstDay.getTime() + i*24*60*60*1000);
        var cls = d.getDay()===0?'sun':(d.getDay()===6?'sat':'');
        html+='<th class="'+cls+'">'+(d.getMonth()+1)+'/'+d.getDate()+'<br>('+dayNames[d.getDay()]+')</th>';
    }
    html+='</tr></thead><tbody>';
    var times=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30','22:00'];
    times.forEach(function(t) {
        html+='<tr><td>'+t+'</td>';
        for(var d=0; d<7; d++){
            var slotS = new Date(firstDay.getFullYear(), firstDay.getMonth(), firstDay.getDate()+d, t.split(':')[0], t.split(':')[1]);
            var s = slotS.getTime(); var e = s + reqMs;
            var wDay = slotS.getDay(); var totalM = slotS.getHours()*60 + slotS.getMinutes();
            var limitHr = (wDay===0||wDay===6)?21:22;
            var limitT = new Date(slotS.getFullYear(), slotS.getMonth(), slotS.getDate(), limitHr, 0).getTime();
            var isWork = false;
            if(wDay===0||wDay===6){ if(totalM>=540 && e<=limitT) isWork=true; } else { if(totalM>=720 && e<=limitT) isWork=true; }
            var isBusy = false;
            for(var b=0; b<busySlots.length; b++){
                var bStartWithBuf = busySlots[b].start - (30*60*1000);
                var bEndWithBuf = busySlots[b].end + (30*60*1000);
                if(s < bEndWithBuf && e > bStartWithBuf) { isBusy = true; break; }
            };
            if(s < now.getTime()) isBusy = true;
            if(!isWork) html+='<td class="cal-status-off">-</td>';
            else if(isBusy) html+='<td class="cal-status-x">×</td>';
            else {
                var dStr = slotS.getFullYear()+'/'+(slotS.getMonth()+1)+'/'+slotS.getDate();
                html+='<td class="cal-status-o" onclick="openInfoModal(\''+dStr+'\', \''+t+'\')">◎</td>';
            }
        }
        html+='</tr>';
    });
    wrapper.innerHTML = html+'</tbody></table>';
}

function openInfoModal(d, t) {
    tDate=d; tTime=t;
    var menuLabels = []; for(var i=0; i<selected.length; i++){ menuLabels.push(menuData[selected[i]].label); }
    document.getElementById('selected-summary').innerHTML="【日時】 "+d+" "+t+"〜<br>【内容】 "+menuLabels.join(', ')+"<br>【合計】 "+document.getElementById('total-price').innerText;
    document.getElementById('info-modal').style.display='block';
}

function submitReservation() {
    var n=document.getElementById('cust-name').value, tel=document.getElementById('cust-tel').value, em=document.getElementById('cust-email').value;
    if(!n||!tel||!em) return alert("すべて入力してください");
    showLoading(true);
    var menuLabels = []; for(var i=0; i<selected.length; i++){ menuLabels.push(menuData[selected[i]].label); }
    var payload = {
        type:'reserve', userType:userType, date:tDate, time:tTime,
        slot:document.getElementById('total-time-slot').innerText.replace(" 枠",""),
        price:document.getElementById('total-price').innerText,
        menus:menuLabels.join(', '), name:n, tel:tel, email:em
    };
    var xhr=new XMLHttpRequest(); xhr.open("POST", GAS_URL, true);
    xhr.onreadystatechange=function(){ if(xhr.readyState===4){
        showLoading(false);
        alert("ご予約ありがとうございます！\n確定メールを送信いたしました。");
        location.reload();
    }};
    xhr.send(JSON.stringify(payload));
}

function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
function closeCalendarModal(){ document.getElementById('calendar-modal').style.display='none'; weekOffset=0; }
