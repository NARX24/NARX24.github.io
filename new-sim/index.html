<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NARX プレミアム予約システム 修復版</title>
<style>
:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:120px;overflow-x:hidden;}
.header-logo-container { text-align: center; padding: 20px 0 15px; border-bottom: 1px solid var(--gold); background: var(--black); }
.header-logo-img { width: 170px; height: auto; }
#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:12px;}
.dual-visual-container { display:flex; gap:1px; height:180px; background:var(--light-gray); border:2px solid var(--gold); margin: 10px; border-radius: 8px; overflow:hidden; }
.view-panel { flex:1; position:relative; display:flex; justify-content:center; align-items:center; background-color:var(--panel-bg); }
.view-panel img { position:absolute; height:90%; transition:opacity 0.3s ease; pointer-events:none; }
.base-img { opacity:0.3; z-index:1; }
.layer-part { opacity:0; z-index:2; }
.layer-part.active { opacity:1; filter:drop-shadow(0 0 3px var(--gold)); }
.tabs { display:flex; gap:2px; margin: 10px; border-bottom: 1px solid var(--light-gray); }
.tab { flex:1; padding:10px 0; text-align:center; color:#666; cursor:pointer; font-size:0.8rem; }
.tab.active { color:var(--gold); border-bottom:2px solid var(--gold); font-weight:bold; }
.menu-container { padding: 0 10px; }
.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;}
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,5,5,0.98);border-top:2px solid var(--gold);padding:15px 20px;box-sizing:border-box;z-index:100;}
.btn-reserve{background:var(--gold);color:#000;width:100%;padding:16px;border-radius:6px;font-weight:bold;border:none;cursor:pointer;font-size:1rem;}
#loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200000; display: none; justify-content: center; align-items: center; color: var(--gold); font-weight: bold; }
#calendar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100000; display: none; overflow: hidden; }
.cal-table { width: 100%; border-collapse: collapse; text-align: center; background: #fff; color: #000; }
.cal-table th, .cal-table td { border: 1px solid #ddd; padding: 10px 5px; font-size: 0.8rem; }
.cal-status-o { color: var(--gold); font-weight: bold; cursor: pointer; }
.cal-status-x { color: #ccc; }
</style>
</head>
<body>

<div id="gate-modal">
    <div class="modal-content">
        <h2 style="color:var(--gold);">ご来店状況を確認</h2>
        <button class="btn-reserve" onclick="forceStart('new')">初めて来店する</button>
        <button class="btn-reserve" style="background:#222;color:#fff;margin-top:12px;" onclick="forceStart('repeat')">既に会員である</button>
    </div>
</div>

<div class="container">
    <div class="header-logo-container"><img src="logo_white.png" class="header-logo-img"></div>
    <div class="dual-visual-container">
        <div class="view-panel" id="body-panel"><img src="base_body.png" class="base-img"></div>
        <div class="view-panel" id="face-panel"><img src="base_face.png" class="base-img"></div>
    </div>
    <div class="tabs">
        <div id="tab-set" class="tab active" onclick="changeTab('set')">セット</div>
        <div id="tab-part" class="tab" onclick="changeTab('part')">パーツ</div>
    </div>
    <div id="menu-area" class="menu-container"></div>
</div>

<div class="bottom-bar">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span id="total-price" style="font-size:1.2rem; color:var(--gold); font-weight:bold;">¥0</span>
        <span id="total-time" style="font-size:0.9rem;">0分</span>
    </div>
    <button class="btn-reserve" onclick="handleReserve()">予約へ進む</button>
</div>

<div id="calendar-modal">
    <div style="padding:20px; text-align:center;"><button onclick="document.getElementById('calendar-modal').style.display='none'">閉じる</button></div>
    <div id="calendar-container"></div>
</div>

<div id="loading-overlay">通信中...</div>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbzEOzq81mhZCSy4zJyeQ6ObRMimRdNYLlnG7Jz-nAT9VrJ7vtcw7aQto0H-pmf92xMT/exec";
var userType = 'new', currentTab = 'set', selected = [];

var menuData = {
    set_fullbody:{price:52800,time:240,label:'全身フルセット',cat:'set'},
    part_face:{price:13200,time:60,label:'全顔脱毛',cat:'part'},
    part_arm:{price:15400,time:60,label:'両腕セット',cat:'part'}
};

function forceStart(t) { document.getElementById('gate-modal').style.display='none'; userType=t; render(); }
function changeTab(t) { currentTab=t; render(); }

function toggleItem(id) {
    var idx = selected.indexOf(id);
    if(idx !== -1) selected.splice(idx, 1);
    else selected.push(id);
    render();
}

function render() {
    var area = document.getElementById('menu-area'); area.innerHTML = '';
    var p = 0, t = 0;
    for (var id in menuData) {
        var item = menuData[id];
        if (item.cat !== currentTab) continue;
        var isSel = selected.indexOf(id) !== -1;
        var div = document.createElement('div');
        div.className = "item " + (isSel ? 'selected' : '');
        div.onclick = (function(id){ return function(){ toggleItem(id); } })(id);
        var price = userType === 'new' ? item.price * 0.5 : item.price;
        div.innerHTML = '<span>' + item.label + '</span><span class="item-price">¥' + price.toLocaleString() + '</span>';
        area.appendChild(div);
        if(isSel) { p += price; t += item.time; }
    }
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time').innerText = t + "分";
}

function handleReserve() {
    if(selected.length === 0) return alert("メニューを選んでください");
    document.getElementById('loading-overlay').style.display = 'flex';
    var xhr = new XMLHttpRequest();
    xhr.open("POST", GAS_URL, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            document.getElementById('loading-overlay').style.display = 'none';
            if (xhr.status === 200) {
                var busy = JSON.parse(xhr.responseText);
                showCalendar(busy);
            }
        }
    };
    xhr.send(JSON.stringify({type:'getBusySlots'}));
}

function showCalendar(busy) {
    var cont = document.getElementById('calendar-container');
    cont.innerHTML = '<table class="cal-table"><tr><th>時間</th><th>状況</th></tr><tr><td>10:00</td><td class="cal-status-o" onclick="alert(\'予約確定処理へ\')">○</td></tr></table>';
    document.getElementById('calendar-modal').style.display = 'block';
}
</script>
</body>
</html>
