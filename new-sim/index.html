body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;overflow-x:hidden;}

/* 💡 Sticky Header Group */
.sticky-header-group { position: sticky; top: 0; z-index: 1000; background: var(--black); padding-bottom: 5px; }

/* ヘッダー */
.header-logo-container { text-align: center; padding: 20px 0 15px; border-bottom: 1px solid var(--gold); }
.header-logo-img { width: 170px; height: auto; margin-bottom: 8px; }

.container{max-width:600px;margin:0 auto;padding:0 20px;}
#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold;}

/* ビジュアルパネル */

.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel:first-child{border-right:1px solid #ddd;}
.view-panel span{position:absolute;top:8px;font-size:9px;color:#999;letter-spacing:2px;font-weight:bold;z-index:10;}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}

@keyframes blink-gold {
    0% { opacity: 0.1; filter: drop-shadow(0 0 2px var(--gold)); }
    50% { opacity: 0.95; filter: drop-shadow(0 0 10px var(--gold)); }
    100% { opacity: 0.1; filter: drop-shadow(0 0 2px var(--gold)); }
}
.layer-part.suggest-blink { animation: blink-gold 1.0s infinite ease-in-out; z-index: 3; display: block !important; }

/* 選択部位チップス */
#selected-chips-area { background: #0a0a0a; padding: 10px 12px; border: 2px solid var(--gold); border-top: none; border-radius: 0 0 8px 8px; margin-bottom: 10px; }
.chips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.chips-title { font-size: 0.7rem; color: var(--gold); font-weight: bold; }
.btn-reset { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; padding: 3px 8px; font-size: 0.65rem; cursor: pointer; }
.chips-container { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; }
.chip-close { background: var(--gold); color: #000; border-radius: 50%; width: 14px; height: 14px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.55rem; font-weight: bold; cursor: pointer; }

/* タブUI */
.tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:1px solid var(--light-gray);background:var(--black);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.8rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}

/* メニューリスト */
.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item.disabled{opacity:0.15;cursor:default;filter:grayscale(1);pointer-events: none;}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.special-label { font-size: 0.65rem; color: #999; margin-left: 6px; font-style: italic; }
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;margin-top:2px;}

.sug-benefit-msg{text-align:center;font-size:0.75rem;color:var(--gold);background:#111;padding:8px;border-radius:6px;font-weight:bold;margin-bottom:12px;}

.sug-price-diff{font-size:0.75rem;color:#c00;font-weight:bold;}
.sug-price-total{font-size:1.1rem;color:#c00;font-weight:bold;}

.btn-sug-skip{background:transparent; color:#111; border:none; flex:1; font-weight:bold; cursor:pointer; font-size:0.75rem;}

.concierge-icon.off{background:#111;}

function initApp() {
    function getLeafNodes(id) {
        var leaves = [];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) {
                var inc = setIncludes[nodeId]; for (var i = 0; i < inc.length; i++) { traverse(inc[i]); }
            } else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id); return leaves;
    }
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) { itemLeaves[keys[i]] = getLeafNodes(keys[i]); }
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    for (var j = 0; j < keys.length; j++) {
        var item = menuData[keys[j]];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    }
}

function createImg(parent, name) {

    img.onerror = function() { this.style.display = 'none'; }; parent.appendChild(img);

function analyzeSuggestions(isManual) {
    if (!isConciergeON && !isManual) return null;
    var keys = Object.keys(menuData); var upsellLimit = 10000;
    var currentLeaves = []; for (var s = 0; s < selected.length; s++) {
        var lNodes = itemLeaves[selected[s]]; for (var ln = 0; ln < lNodes.length; ln++) { if (currentLeaves.indexOf(lNodes[ln]) === -1) currentLeaves.push(lNodes[ln]); }
    }
    for (var i = 0; i < keys.length; i++) {
        var sid = keys[i]; if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue;
        var candLeaves = itemLeaves[sid], foundLeafCount = 0;
        for (var l = 0; l < candLeaves.length; l++) { if (currentLeaves.indexOf(candLeaves[l]) !== -1) foundLeafCount++; }
        if (foundLeafCount >= 2) {
            var intersectingItems = []; for(var j=0; j<selected.length; j++) {
                var selId = selected[j], selLeaves = itemLeaves[selId], isInc = true;
                for(var k=0; k<selLeaves.length; k++){ if(candLeaves.indexOf(selLeaves[k]) === -1) isInc=false; }
                if(isInc) intersectingItems.push(selId);
            }
            if (intersectingItems.length < 1) continue;
            var oldP = getOriginalTotal(intersectingItems), setP = getItemPrice(sid), diff = setP - oldP;
            var newTotal = getOriginalTotal(selected) - oldP + setP;
            var wasDismissed = (dismissedSuggestions.indexOf(sid) !== -1);
            if (diff <= upsellLimit && (diff <= 0 || !wasDismissed)) return {sid:sid, type:(diff < 0 ? 'cheaper' : (diff === 0 ? 'same' : 'upsell')), diff:diff, oldPrice:oldP, intersectingItems:intersectingItems, newTotal:newTotal};
        }
    } return null;
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    var best = analyzeSuggestions(isManual); if (!best) { suggestionId = null; render(); return; }
    suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems;
    var setItem = menuData[best.sid];
    var html = '<div class="sug-title">🎉 AIコンシェルジュ</div>';
    if (best.type === 'cheaper' || best.type === 'same') {
        html += '<div class="sug-benefit-msg">同じ金額で、さらに部位を増やせます！</div>';
    } else {
        html += '<div class="sug-benefit-msg">あと少しでこちらのセットに変更できます！</div>';
    }
    html += '<div class="sug-menu-name">' + setItem.label + '</div>';
    html += '<div class="sug-compare-flex">';
    html += '<div class="sug-price-col"><span class="sug-price-label">現在</span><span class="sug-price-val">¥' + getOriginalTotal(selected).toLocaleString() + '</span></div>';
    html += '<div class="sug-price-col"><span class="sug-price-label">追加</span><span class="sug-price-diff">+¥' + Math.max(0, best.diff).toLocaleString() + '</span></div>';
    html += '<div class="sug-price-col"><span class="sug-price-label">お支払総額</span><span class="sug-price-total">¥' + best.newTotal.toLocaleString() + '</span></div>';
    html += '</div>';
    html += '<div class="sug-btn-group"><button onclick="applyOptimalSet()" class="btn-sug-apply">変更する</button><button onclick="skipSuggestion(\''+suggestionId+'\')" class="btn-sug-skip">今はしない</button></div>';

    if (isManual) showConciergeBubble("同額でもっとお得になる選び方があります！");
    render(); 
}

function applyOptimalSet() {

function renderCalendar() {
    var wrapper=document.getElementById('calendar-container'), now=new Date();
    var t = 0; var hasFaceCooling = false;
    for (var i = 0; i < selected.length; i++) { t += menuData[selected[i]].time; if (menuData[selected[i]].cool === 1) hasFaceCooling = true; }
    t += 10; if (hasFaceCooling) t += 12; if (userType === 'new') t += 90;
    var reqMs = Math.ceil(t / 30) * 30 * 60 * 1000;
    var firstDay = new Date(); var day = firstDay.getDay(); var diffToMon = (day === 0 ? -6 : 1) - day; 
    firstDay.setDate(firstDay.getDate() + diffToMon + (weekOffset * 7));
    document.getElementById('cal-title').innerText = (firstDay.getMonth()+1)+"/"+firstDay.getDate() + "の週";
    var html='<table class="cal-table"><thead><tr><th>時間</th>';
    var dayNames = ['日','月','火','水','木','金','土'];
    for(var j=0; j<7; j++){
        var d = new Date(firstDay.getTime() + j*24*60*60*1000); var dateStr = d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
        var cls = d.getDay()===0?'sun':(d.getDay()===6?'sat':''); if(holidays2026.indexOf(dateStr) !== -1) cls = 'holiday';
        html+='<th class="'+cls+'">'+(d.getMonth()+1)+'/'+d.getDate()+'<br>('+dayNames[d.getDay()]+')</th>';
    }
    html+='</tr></thead><tbody>';
    var times=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30','22:00'];
    times.forEach(function(timeStr) {
        html+='<tr><td>'+timeStr+'</td>';
        for(var d=0; d<7; d++){
            var slotS = new Date(firstDay.getFullYear(), firstDay.getMonth(), firstDay.getDate()+d, timeStr.split(':')[0], timeStr.split(':')[1]);
            var s = slotS.getTime(); var e = s + reqMs;
            var wDay = slotS.getDay(); var totalM = slotS.getHours()*60 + slotS.getMinutes();
            var dateStrKey = slotS.getFullYear()+'/'+(slotS.getMonth()+1)+'/'+slotS.getDate();
            var isHolidayOrWeekend = (wDay===0 || wDay===6 || holidays2026.indexOf(dateStrKey) !== -1);
            var isInsideHours = isHolidayOrWeekend ? (totalM>=540 && totalM < 1260) : (totalM>=720 && totalM < 1320);
            var limitHr = isHolidayOrWeekend ? 21 : 22; var limitT = new Date(slotS.getFullYear(), slotS.getMonth(), slotS.getDate(), limitHr, 0).getTime();
            var canFit = (e <= limitT); var isBusy = false;
            for(var b=0; b<busySlots.length; b++){ if(s < (busySlots[b].end + 30*60*1000) && e > (busySlots[b].start - 30*60*1000)) { isBusy = true; break; } };
            if(s < now.getTime()) isBusy = true;
            if(!isInsideHours) html+='<td style="background:#444;">-</td>';
            else if(!canFit || isBusy) html+='<td style="background:#bbb; color:#888;">×</td>';
            else {
                var endObj = new Date(e); var endStr = endObj.getHours() + ":" + (endObj.getMinutes() === 0 ? "00" : (endObj.getMinutes() < 10 ? "0" : "") + endObj.getMinutes());
                html+='<td class="cal-status-o" onclick="openInfoModal(\''+dateStrKey+'\', \''+timeStr+'\', \''+endStr+'\')">◎</td>';
            }
        }
        html+='</tr>';
    }); wrapper.innerHTML = html+'</tbody></table>';
}

    xhr.send(JSON.stringify(payload));
}

function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
function closeCalendarModal(){ document.getElementById('calendar-modal').style.display='none'; }
</script>
