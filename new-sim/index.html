<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NARX 料金シミュレーター</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #000;
            --dark-gray: #1a1a1a;
            --light-gray: #333;
            --white: #fff;
            --panel-bg: #fdfdfd;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            margin: 0;
            padding-bottom: 180px;
            overflow-x: hidden;
        }

        /* モーダルを最優先で表示 */
        #gate-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-content {
            border: 1px solid var(--gold); padding: 40px 20px;
            width: 85%; max-width: 400px; background: var(--black);
            text-align: center; border-radius: 8px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.4rem; letter-spacing: 3px; }
        
        .status-badge {
            font-size: 0.7rem; color: var(--black); background: var(--gold);
            padding: 2px 10px; border-radius: 10px; margin-top: 5px; display: inline-block;
        }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn {
            flex: 1; padding: 12px; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        .type-btn.active { background: var(--gold); color: var(--black); }

        .dual-visual-container {
            display: flex; gap: 4px; height: 250px; position: sticky; top: 10px; z-index: 50;
            background: var(--light-gray); border: 2px solid var(--gold);
            margin-bottom: 20px; border-radius: 8px; overflow: hidden;
        }
        .view-panel { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-color: var(--panel-bg); }
        .view-panel span { position: absolute; top: 8px; font-size: 10px; color: #333; letter-spacing: 2px; font-weight: bold; opacity: 0.5; z-index: 10; }
        .view-panel img { position: absolute; height: 90%; transition: opacity 0.3s ease; pointer-events: none; }
        
        .base-img { opacity: 0.3; z-index: 1; display: block !important; }
        .layer-part { opacity: 0; z-index: 2; }
        .layer-part.active { opacity: 1; filter: drop-shadow(0 0 3px var(--gold)); }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--light-gray); }
        .tab { flex: 1; padding: 12px 5px; text-align: center; color: #777; cursor: pointer; font-size: 0.8rem; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        .subcat-header {
            display: flex; align-items: center; justify-content: center;
            margin: 25px 0 15px; color: var(--gold); font-size: 0.8rem; letter-spacing: 0.3em;
        }
        .subcat-header::before, .subcat-header::after {
            content: ""; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold));
            margin: 0 15px;
        }
        .subcat-header::after { background: linear-gradient(to left, transparent, var(--gold)); }

        .item { background: var(--dark-gray); margin-bottom: 8px; padding: 15px; border-radius: 5px; display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .item.selected { border-color: var(--gold); background: #111; }
        .item.disabled { opacity: 0.15; cursor: default; }
        .item input { transform: scale(1.3); margin-right: 15px; accent-color: var(--gold); }
        .item-info { flex: 1; }
        .item-name { display: block; font-size: 0.9rem; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 0.8rem; }
        .item-sub { display: block; font-size: 0.65rem; color: #888; margin-top: 4px; line-height: 1.3; }

        #suggestion-box {
            position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--gold); color: var(--black);
            padding: 15px; border-radius: 8px; display: none; z-index: 1000;
        }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5, 5, 5, 0.98); border-top: 2px solid var(--gold); padding: 15px 20px; box-sizing: border-box; z-index: 100; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 12px; }
        .summary-item .label { font-size: 0.7rem; color: #777; display: block; }
        .summary-item .val { font-size: 1.2rem; color: var(--gold); font-weight: bold; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 14px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.8rem; border: none; cursor: pointer; display: block; text-decoration: none; }
        .btn-copy { background: #222; color: #fff; }
        .btn-reserve { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<!-- モーダル -->
<div id="gate-modal">
    <div class="modal-content">
        <h3 style="color: var(--gold); margin: 0 0 20px 0;">ご来店状況の確認</h3>
        <p style="font-size: 0.8rem; line-height: 1.8; margin-bottom: 30px; color: #ccc;">最適なプランをご案内するため、<br>現在のご状況を教えてください。</p>
        <button class="btn btn-reserve" style="width: 100%; margin-bottom: 15px;" onclick="selectUserType('new')">初めて来店する</button>
        <button class="btn btn-copy" style="width: 100%;" onclick="selectUserType('repeat')">既に会員である</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>NARX</h1>
        <div id="mode-display" class="status-badge">新規予約モード</div>
    </div>

    <div class="type-selector">
        <button class="type-btn" id="type-new" onclick="updateUserType('new')">初めての方</button>
        <button class="type-btn" id="type-rep" onclick="updateUserType('repeat')">会員の方</button>
    </div>

    <div class="dual-visual-container">
        <div class="view-panel" id="body-panel"><span>BODY</span><img src="base_body.png" class="base-img"></div>
        <div class="view-panel" id="face-panel"><span>FACE</span><img src="base_face.png" class="base-img"></div>
    </div>

    <div class="tabs">
        <div id="tab-set" class="tab active" onclick="changeTab('set')">セットメニュー</div>
        <div id="tab-part" class="tab" onclick="changeTab('part')">パーツメニュー</div>
        <div id="tab-other" class="tab" onclick="changeTab('other')">その他</div>
    </div>

    <div id="menu-area"></div>
</div>

<div id="suggestion-box">
    <div style="font-weight: bold; font-size: 0.85rem; margin-bottom: 5px;">👑 お得なセットのご案内</div>
    <div id="suggestion-text" style="font-size: 0.7rem; margin-bottom: 10px;"></div>
    <button onclick="applyOptimalSet()" style="background: var(--black); color: var(--gold); border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;">切り替える</button>
    <button onclick="hideSuggestion()" style="background: transparent; color: #333; border: none; font-size: 0.7rem; cursor: pointer;">今はしない</button>
</div>

<div class="bottom-bar">
    <div class="summary-grid">
        <div class="summary-item"><span class="label">料金合計 (税込)</span><span class="val" id="total-price">¥0</span></div>
        <div class="summary-item" style="text-align: right;"><span class="label">予約枠目安</span><span class="val" id="total-time-slot">0.0 時間枠</span></div>
    </div>
    <div class="btn-group">
        <button class="btn btn-copy" onclick="copyResult()">内容をコピー</button>
        <a href="https://beauty.hotpepper.jp/kr/slnH000514194/" class="btn btn-reserve" target="_blank">予約ページへ</a>
    </div>
</div>

<script>
// --- 全データ ---
const menuData = {
    set_fullbody_all: { price: 52800, time: 270, label: '全身オール（顔VIO込）', cat: 'set', sub: '顔・VIO含む全身', imgs: { body: 'set_fullbody_all_body', face: 'set_fullbody_all_face' }, hasFace: true },
    set_fullbody_noface: { price: 41800, time: 200, label: '顔なし全身', cat: 'set', sub: 'VIO含む顔以外全身', imgs: { body: 'set_fullbody_noface' }, hasFace: false },
    set_upperbody: { price: 30800, time: 170, label: '上半身セット', cat: 'set', sub: '全顔・腕・胸・腹・背中など', imgs: { body: 'set_upperbody_body', face: 'set_upperbody_face' }, hasFace: true },
    set_lowerbody: { price: 30800, time: 150, label: '下半身セット', cat: 'set', sub: 'VIO・脚全体', imgs: { body: 'set_lowerbody' }, hasFace: false },
    set_fullface_vio: { price: 27500, time: 100, label: '全顔+VIOセット', cat: 'set', imgs: { body: 'set_fullface_vio_body', face: 'set_fullface_vio_face' }, hasFace: true },
    set_fullface_eyebrow: { price: 22000, time: 105, label: '全顔+眉毛セット', cat: 'set', imgs: { face: 'set_fullface_eyebrow' }, hasFace: true },
    set_eyebrow: { price: 11000, time: 40, label: '眉毛セット', cat: 'set', imgs: { face: 'set_eyebrow' }, hasFace: true },
    set_fullface: { price: 13200, time: 65, label: '全顔セット', cat: 'set', imgs: { face: 'set_fullface' }, hasFace: true },
    set_vio: { price: 16500, time: 50, label: 'VIOセット', cat: 'set', imgs: { body: 'set_vio' }, hasFace: false },
    set_vio_buttocks: { price: 20900, time: 60, label: 'VIO+臀部セット', cat: 'set', imgs: { body: 'set_vio_buttocks' }, hasFace: false },
    set_navel_vio: { price: 18700, time: 55, label: 'ヘソ下+VIOセット', cat: 'set', imgs: { body: 'set_navel_vio' }, hasFace: false },
    set_chest_abdomen: { price: 9900, time: 35, label: '胸＋腹部セット', cat: 'set', imgs: { body: 'set_chest_abdomen' }, hasFace: false },
    set_arms_legs: { price: 28600, time: 125, label: '両腕+両足セット', cat: 'set', imgs: { body: 'set_arms_legs' }, hasFace: false },
    set_arms: { price: 17600, time: 65, label: '両腕セット', cat: 'set', imgs: { body: 'set_arms' }, hasFace: false },
    set_legs: { price: 17600, time: 65, label: '両足セット', cat: 'set', imgs: { body: 'set_legs' }, hasFace: false },
    set_ear_whole: { price: 8800, time: 25, label: '耳全体セット', cat: 'set', imgs: { face: 'set_ear_whole' }, hasFace: true },

    part_nose_under: { price: 4400, time: 16, label: '鼻下', cat: 'part', subCat: '顔', imgs: { face: 'part_nose_under' }, hasFace: true },
    part_mouth_under: { price: 4400, time: 16, label: '口下', cat: 'part', subCat: '顔', imgs: { face: 'part_mouth_under' }, hasFace: true },
    part_cheek: { price: 4400, time: 16, label: '頬', cat: 'part', subCat: '顔', imgs: { face: 'part_cheek' }, hasFace: true },
    part_face_line: { price: 4400, time: 16, label: 'フェイスライン', cat: 'part', subCat: '顔', imgs: { face: 'part_face_line' }, hasFace: true },
    part_neck: { price: 4400, time: 16, label: '首', cat: 'part', subCat: '顔', imgs: { face: 'part_neck' }, hasFace: true },
    part_nape: { price: 4400, time: 16, label: 'うなじ', cat: 'part', subCat: '上半身', imgs: { body: 'part_nape' }, hasFace: false },
    part_armpit: { price: 4400, time: 13, label: '脇', cat: 'part', subCat: '上半身', imgs: { body: 'part_armpit' }, hasFace: false },
    part_chest_nipple: { price: 6600, time: 16, label: '胸（乳輪周り込）', cat: 'part', subCat: '上半身', imgs: { body: 'part_chest_nipple' }, hasFace: false },
    part_abdomen_navel: { price: 6600, time: 16, label: '腹部（ヘソ下込）', cat: 'part', subCat: '上半身', imgs: { body: 'part_abdomen_navel' }, hasFace: false },
    part_elbow_lower: { price: 6600, time: 18, label: '肘下', cat: 'part', subCat: '上半身', imgs: { body: 'part_elbow_lower' }, hasFace: false },
    part_buttocks: { price: 6600, time: 16, label: '臀部（おしり）', cat: 'part', subCat: '下半身', imgs: { body: 'part_buttocks' }, hasFace: false },
    part_knee_lower: { price: 8800, time: 35, label: '膝下', cat: 'part', subCat: '下半身', imgs: { body: 'part_knee_lower' }, hasFace: false },
    part_eyebrow_lower: { price: 6600, time: 13, label: '眉下', cat: 'part', subCat: '顔', imgs: { face: 'part_eyebrow_lower' }, hasFace: true },
    part_nose_hair: { price: 4400, time: 20, label: '鼻毛', cat: 'part', subCat: '顔', imgs: { face: 'part_nose_hair' }, hasFace: true },
    part_under_eyes: { price: 4400, time: 10, label: '目の下', cat: 'part', subCat: '顔', imgs: { face: 'part_under_eyes' }, hasFace: true },

    other_lala_peel: { price: 12100, time: 90, label: 'ララピール', cat: 'other', imgs: { face: 'other_lala_peel' }, hasFace: true },
    other_face_correction: { price: 22000, time: 90, label: '小顔矯正術', cat: 'other', imgs: { face: 'other_face_correction' }, hasFace: true }
};

const setIncludes = {
    set_fullface: ['part_nose_under', 'part_mouth_under', 'part_cheek', 'part_face_line', 'part_neck'],
    set_vio: ['part_v_line', 'part_i_line', 'part_o_line'],
    set_chest_abdomen: ['part_chest_nipple', 'part_abdomen_navel']
};

let userType = 'new';
let currentTab = 'set';
let selected = new Set();
let suggestionId = null;

// --- 修正版：モーダルを閉じる関数 ---
function selectUserType(type) {
    userType = type;
    const modal = document.getElementById('gate-modal');
    if (modal) modal.style.display = 'none'; // 何があってもまず消す
    
    // その後に初期化を実行
    updateUserType(type);
    initLayers();
    render();
}

function initLayers() {
    const bPanel = document.getElementById('body-panel');
    const fPanel = document.getElementById('face-panel');
    if (!bPanel || !fPanel) return;

    Object.keys(menuData).forEach(id => {
        const item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    });
}

function createImg(parent, name) {
    const layerId = `img-${name}`;
    if (document.getElementById(layerId)) return;
    const img = document.createElement('img');
    img.src = `${name}.png`;
    img.id = layerId;
    img.className = 'layer-part';
    img.onerror = () => img.style.display = 'none';
    parent.appendChild(img);
}

function updateUserType(type) {
    userType = type;
    const btnNew = document.getElementById('type-new');
    const btnRep = document.getElementById('type-rep');
    if (btnNew) btnNew.classList.toggle('active', type === 'new');
    if (btnRep) btnRep.classList.toggle('active', type === 'repeat');
    
    const badge = document.getElementById('mode-display');
    if (badge) {
        badge.innerText = type === 'new' ? "新規予約モード" : "会員予約モード";
        badge.style.background = type === 'new' ? "var(--gold)" : "#666";
    }
    updateTotal();
}

function changeTab(tab) {
    currentTab = tab;
    render();
}

function toggleItem(id) {
    if (selected.has(id)) selected.delete(id);
    else selected.add(id);
    checkSuggestion();
    render();
}

function render() {
    const area = document.getElementById('menu-area');
    if (!area) return;
    area.innerHTML = '';

    // タブ
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const activeTabEl = document.getElementById(`tab-${currentTab}`);
    if (activeTabEl) activeTabEl.classList.add('active');

    // 画像点灯
    document.querySelectorAll('.layer-part').forEach(img => img.classList.remove('active'));
    selected.forEach(id => {
        const item = menuData[id];
        if (item && item.imgs) {
            if (item.imgs.body) { let i = document.getElementById(`img-${item.imgs.body}`); if(i) i.classList.add('active'); }
            if (item.imgs.face) { let i = document.getElementById(`img-${item.imgs.face}`); if(i) i.classList.add('active'); }
        }
    });

    // メニュー生成
    let lastSub = "";
    Object.keys(menuData).filter(id => menuData[id].cat === currentTab).forEach(id => {
        const item = menuData[id];
        if (currentTab === 'part' && item.subCat !== lastSub) {
            lastSub = item.subCat;
            const h = document.createElement('div');
            h.className = 'subcat-header';
            h.innerText = lastSub;
            area.appendChild(h);
        }
        const div = document.createElement('div');
        const isSel = selected.has(id);
        div.className = `item ${isSel ? 'selected' : ''}`;
        div.onclick = () => toggleItem(id);
        div.innerHTML = `
            <input type="checkbox" ${isSel ? 'checked' : ''}>
            <div class="item-info">
                <span class="item-name">${item.label}</span>
                ${item.sub ? `<span class="item-sub">${item.sub}</span>` : ''}
            </div>
            <div class="item-price">¥${item.price.toLocaleString()}</div>
        `;
        area.appendChild(div);
    });
    updateTotal();
}

function updateTotal() {
    let p = 0, t = 0, f = false;
    selected.forEach(id => {
        const item = menuData[id];
        p += item.price; t += item.time; if(item.hasFace) f = true;
    });
    if (selected.size > 0) {
        if (userType === 'new') t += 90;
        else if (f) t += 20;
    }
    const rounded = Math.ceil(t / 30) * 30;
    const slot = `${Math.floor(rounded / 60)}.${(rounded % 60) === 30 ? '5' : '0'}`;
    const pDisp = document.getElementById('total-price');
    const tDisp = document.getElementById('total-time-slot');
    if(pDisp) pDisp.innerText = `¥${p.toLocaleString()}`;
    if(tDisp) tDisp.innerText = `${slot} 時間枠`;
}

function checkSuggestion() {
    suggestionId = null;
    const box = document.getElementById('suggestion-box');
    if (!box) return;
    box.style.display = 'none';
    for (const setId in setIncludes) {
        const parts = setIncludes[setId];
        if (parts.every(p => selected.has(p)) && !selected.has(setId)) {
            suggestionId = setId;
            document.getElementById('suggestion-text').innerText = `「${menuData[setId].label}」にまとめるとお得です。`;
            box.style.display = 'block';
            break;
        }
    }
}

function applyOptimalSet() {
    if (!suggestionId) return;
    setIncludes[suggestionId].forEach(p => selected.delete(p));
    selected.add(suggestionId);
    document.getElementById('suggestion-box').style.display = 'none';
    render();
}

function hideSuggestion() { document.getElementById('suggestion-box').style.display = 'none'; }

function copyResult() {
    if (selected.size === 0) return alert("選択してください");
    const slot = document.getElementById('total-time-slot').innerText;
    let txt = `【NARX脱毛予約】\n種別：${userType === 'new' ? '新規' : '会員'}\nメニュー：\n`;
    selected.forEach(id => txt += `・${menuData[id].label}\n`);
    txt += `予約枠：${slot}`;
    navigator.clipboard.writeText(txt).then(() => alert("コピーしました"));
}
</script>
</body>
</html>
