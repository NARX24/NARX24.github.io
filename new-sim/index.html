<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARX 施術料金＆時間シミュレーター</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #000;
            --dark-gray: #1a1a1a;
            --light-gray: #333;
            --white: #fff;
            --panel-bg: #fdfdfd;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            margin: 0;
            padding-bottom: 180px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.4rem; letter-spacing: 3px; }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn {
            flex: 1; padding: 12px; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .type-btn.active { background: var(--gold); color: var(--black); }

        /* 2画面分割プレビューパネル */
        .dual-visual-container {
            display: flex; gap: 4px; height: 260px; position: sticky; top: 10px; z-index: 50;
            background: var(--light-gray); border: 2px solid var(--gold);
            margin-bottom: 20px; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .view-panel {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            background-color: var(--panel-bg);
        }
        .view-panel:first-child { border-right: 1px solid #ddd; }
        .view-panel span { 
            position: absolute; top: 8px; font-size: 10px; 
            color: #333; letter-spacing: 2px; font-weight: bold; opacity: 0.7; z-index: 10;
        }

        .view-panel img { position: absolute; height: 90%; transition: opacity 0.4s ease; pointer-events: none; }
        .base-img { opacity: 0.4; z-index: 1; }
        .layer-part { opacity: 0; z-index: 2; }
        .layer-part.active { opacity: 1; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); }

        /* カテゴリータブ（3つに統合） */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--light-gray); }
        .tab { flex: 1; padding: 12px 5px; text-align: center; color: #777; cursor: pointer; font-size: 0.85rem; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        /* メニューリスト */
        .item {
            background: var(--dark-gray); margin-bottom: 8px; padding: 15px;
            border-radius: 5px; display: flex; align-items: center; cursor: pointer;
            border: 1px solid transparent; transition: 0.2s;
        }
        .item.selected { border-color: var(--gold); background: #111; }
        .item.disabled { opacity: 0.15; cursor: default; }
        .item input { transform: scale(1.3); margin-right: 15px; accent-color: var(--gold); }
        .item-info { flex: 1; }
        .item-name { display: block; font-size: 0.95rem; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 0.85rem; }
        .item-sub { display: block; font-size: 0.65rem; color: #888; margin-top: 4px; line-height: 1.3; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 5, 5, 0.96); border-top: 2px solid var(--gold);
            padding: 15px 20px; box-sizing: border-box; z-index: 100;
        }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 12px; }
        .summary-item .label { font-size: 0.7rem; color: #777; display: block; }
        .summary-item .val { font-size: 1.3rem; color: var(--gold); font-weight: bold; }
        .btn-group { display: flex; gap: 8px; }
        .btn {
            flex: 1; padding: 14px; text-align: center; border-radius: 4px;
            font-weight: bold; text-decoration: none; font-size: 0.85rem; border: none; cursor: pointer;
        }
        .btn-copy { background: #222; color: #fff; }
        .btn-reserve { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NARX</h1>
        <small style="letter-spacing: 2px; color: #666;">Nakashima Style Salon</small>
    </div>

    <div class="type-selector">
        <button class="type-btn active" id="type-new" onclick="setType('new')">初めての方</button>
        <button class="type-btn" id="type-rep" onclick="setType('repeat')">会員の方</button>
    </div>

    <div class="dual-visual-container">
        <div class="view-panel" id="body-panel"><span>BODY</span><img src="base_body.png" class="base-img"></div>
        <div class="view-panel" id="face-panel"><span>FACE</span><img src="base_face.png" class="base-img"></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('set')">セットメニュー</div>
        <div class="tab" onclick="showTab('part')">パーツメニュー</div>
        <div class="tab" onclick="showTab('other')">その他</div>
    </div>

    <div id="menu-area"></div>
</div>

<div class="bottom-bar">
    <div class="summary-grid">
        <div class="summary-item"><span class="label">料金合計 (税込)</span><span class="val" id="total-price">¥0</span></div>
        <div class="summary-item" style="text-align: right;"><span class="label">予約枠目安</span><span class="val" id="total-time-slot">0.0 時間枠</span></div>
    </div>
    <div class="btn-group">
        <button class="btn btn-copy" onclick="copyToClipboard()">①内容をコピー</button>
        <a href="https://liff.line.me/1657088803-ODW7m7Nn?calendar_salon_id=100&ts=1752815909" class="btn btn-reserve" target="_blank">②予約ページへ</a>
    </div>
</div>

<script>

    set_legs: { price: 17600, time: 65, label: '両足セット', cat: 'set', sub: '膝上・膝下・足の甲＋指', imgs: { body: 'set_legs' }, hasFace: false },
    set_ear_whole: { price: 8800, time: 25, label: '耳全体セット', cat: 'set', sub: '耳珠 ＋ 耳たぶ', imgs: { face: 'set_ear_whole' }, hasFace: true },

    // 【パーツメニュー】（catをpartに統一）
    part_nose_under: { price: 4400, time: 16, label: '鼻下', cat: 'part', imgs: { face: 'part_nose_under' }, hasFace: true },
    part_mouth_under: { price: 4400, time: 16, label: '口下', cat: 'part', imgs: { face: 'part_mouth_under' }, hasFace: true },
    part_cheek: { price: 4400, time: 16, label: '頬', cat: 'part', imgs: { face: 'part_cheek' }, hasFace: true },
    part_face_line: { price: 4400, time: 16, label: 'フェイスライン', cat: 'part', imgs: { face: 'part_face_line' }, hasFace: true },

    part_armpit: { price: 4400, time: 13, label: '脇', cat: 'part', imgs: { body: 'part_armpit' }, hasFace: false },
    part_chest_nipple: { price: 6600, time: 16, label: '胸（乳輪周り込）', cat: 'part', imgs: { body: 'part_chest_nipple' }, hasFace: false },
    part_abdomen_navel: { price: 6600, time: 16, label: '腹部（ヘソ下込）', cat: 'part', imgs: { body: 'part_abdomen_navel' }, hasFace: false },
    part_back_upper: { price: 6600, time: 16, label: '背中上', cat: 'part', imgs: { body: 'part_back_upper' }, hasFace: false },
    part_back_lower: { price: 6600, time: 16, label: '背中下', cat: 'part', imgs: { body: 'part_back_lower' }, hasFace: false },
    part_buttocks: { price: 6600, time: 16, label: '臀部（おしり）', cat: 'part', imgs: { body: 'part_buttocks' }, hasFace: false },
    part_elbow_upper: { price: 6600, time: 16, label: '肘上', cat: 'part', imgs: { body: 'part_elbow_upper' }, hasFace: false },
    part_elbow_lower: { price: 6600, time: 18, label: '肘下', cat: 'part', imgs: { body: 'part_elbow_lower' }, hasFace: false },
    part_hand_finger: { price: 4400, time: 12, label: '手の甲＋指', cat: 'part', imgs: { body: 'part_hand_finger' }, hasFace: false },
    part_knee_upper: { price: 8800, time: 35, label: '膝上', cat: 'part', imgs: { body: 'part_knee_upper' }, hasFace: false },
    part_knee_lower: { price: 8800, time: 35, label: '膝下', cat: 'part', imgs: { body: 'part_knee_lower' }, hasFace: false },
    part_foot_toe: { price: 4400, time: 12, label: '足の甲＋指', cat: 'part', imgs: { body: 'part_foot_toe' }, hasFace: false },
    part_v_line: { price: 7700, time: 16, label: 'Vライン', cat: 'part', imgs: { body: 'part_v_line' }, hasFace: false },
    part_i_line: { price: 7700, time: 20, label: 'Iライン', cat: 'part', imgs: { body: 'part_i_line' }, hasFace: false },
    part_o_line: { price: 5500, time: 16, label: 'Oライン', cat: 'part', imgs: { body: 'part_o_line' }, hasFace: false },
    part_forehead: { price: 4400, time: 13, label: 'おでこ', cat: 'part', imgs: { face: 'part_forehead' }, hasFace: true },

    part_eyebrow_lower: { price: 6600, time: 13, label: '眉下', cat: 'part', imgs: { face: 'part_eyebrow_lower' }, hasFace: true },
    part_eyebrow_middle: { price: 2200, time: 13, label: '眉中', cat: 'part', imgs: { face: 'part_eyebrow_middle' }, hasFace: true },
    part_small_nose: { price: 4400, time: 13, label: '小鼻', cat: 'part', imgs: { face: 'part_small_nose' }, hasFace: true },
    part_nose_hair: { price: 4400, time: 20, label: '鼻毛', cat: 'part', imgs: { face: 'part_nose_hair' }, hasFace: true },
    part_tragus: { price: 3300, time: 13, label: '耳珠', cat: 'part', imgs: { face: 'part_tragus' }, hasFace: true },
    part_earlobe: { price: 4400, time: 13, label: '耳たぶ', cat: 'part', imgs: { face: 'part_earlobe' }, hasFace: true },
    part_nipple: { price: 4400, time: 10, label: '乳輪周り', cat: 'part', imgs: { body: 'part_nipple' }, hasFace: false },
    part_navel_under: { price: 4400, time: 10, label: 'ヘソ下', cat: 'part', imgs: { body: 'part_navel_under' }, hasFace: false },
    part_under_eyes: { price: 4400, time: 10, label: '目の下', cat: 'part', imgs: { face: 'part_under_eyes' }, hasFace: true },

    // 【その他】
    other_lala_peel: { price: 12100, time: 90, label: 'ララピール', cat: 'other', sub: '韓国発・第4世代ピーリング', imgs: { face: 'other_lala_peel' }, hasFace: true },
    other_face_correction: { price: 22000, time: 90, label: '小顔矯正術', cat: 'other', sub: '中島式・独自手技の小顔矯正', imgs: { face: 'other_face_correction' }, hasFace: true },
    other_derma_scalp: { price: 22000, time: 50, label: 'ダーマ(スカルプ)', cat: 'other', sub: '頭皮ケア・育毛促進', imgs: { face: 'other_derma_scalp' }, hasFace: true },
    other_derma_skin: { price: 22000, time: 50, label: 'ダーマ(肌育)', cat: 'other', sub: '高濃度美容液導入・肌質改善', imgs: { face: 'other_derma_skin' }, hasFace: true }
};

const setIncludes = {
    set_fullface: ['part_nose_under', 'part_mouth_under', 'part_cheek', 'part_face_line', 'part_neck'],
    set_vio: ['part_v_line', 'part_i_line', 'part_o_line'],
    set_eyebrow: ['part_eyebrow_upper', 'part_eyebrow_lower', 'part_eyebrow_middle'],
    set_arms: ['part_elbow_upper', 'part_elbow_lower', 'part_hand_finger'],
    set_legs: ['part_knee_upper', 'part_knee_lower', 'part_foot_toe'],
    set_fullbody_all: ['set_fullface', 'set_vio', 'set_eyebrow', 'part_nape', 'part_armpit', 'part_buttocks', 'set_arms', 'set_legs', 'part_chest_nipple', 'part_abdomen_navel', 'part_earlobe', 'part_nipple', 'part_navel_under'],
    set_fullbody_noface: ['set_vio', 'part_nape', 'part_armpit', 'part_buttocks', 'set_arms', 'set_legs', 'part_chest_nipple', 'part_abdomen_navel'],
    set_upperbody: ['set_fullface', 'part_armpit', 'part_chest_nipple', 'part_abdomen_navel', 'part_nape', 'part_back_upper', 'part_back_lower', 'set_arms'],
    set_lowerbody: ['set_vio', 'part_buttocks', 'set_legs'],
    set_fullface_vio: ['set_fullface', 'set_vio'],
    set_vio_buttocks: ['set_vio', 'part_buttocks'],
    set_navel_vio: ['part_navel_under', 'set_vio'],
    set_chest_abdomen: ['part_chest_nipple', 'part_abdomen_navel'],
    set_arms_legs: ['set_arms', 'set_legs'],
    set_ear_whole: ['part_tragus', 'part_earlobe']
};

let userType = 'new';
let activeTab = 'set';
let selectedIds = new Set();

function init() {
    const bPanel = document.getElementById('body-panel');
    const fPanel = document.getElementById('face-panel');
    Object.keys(menuData).forEach(id => {
        const imgSet = menuData[id].imgs;
        if (imgSet.body) createImgLayer(bPanel, imgSet.body);
        if (imgSet.face) createImgLayer(fPanel, imgSet.face);
    });
    render();
}

function createImgLayer(parent, fileName) {
    if (document.getElementById(`img-${fileName}`)) return;
    const img = document.createElement('img');
    img.src = `${fileName}.png`;
    img.id = `img-${fileName}`;
    img.className = 'layer-part';
    img.onerror = () => img.remove();
    parent.appendChild(img);
}

function render() {
    // タブのアクティブ表示
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('onclick').includes(activeTab)));

    const area = document.getElementById('menu-area');
    area.innerHTML = '';
    
    // 【重要修正】ビジュアルのリセット範囲を限定
    // 全てのレイヤーを一旦非表示にし、現在選択されている全IDに基づいて再点灯させる
    document.querySelectorAll('.layer-part').forEach(img => img.classList.remove('active'));
    selectedIds.forEach(id => {
        const item = menuData[id];
        if (item && item.imgs) {
            if (item.imgs.body) document.getElementById(`img-${item.imgs.body}`).classList.add('active');
            if (item.imgs.face) document.getElementById(`img-${item.imgs.face}`).classList.add('active');
        }
    });

    let disabledIds = [];
    selectedIds.forEach(id => {
        if (setIncludes[id]) {
            setIncludes[id].forEach(subId => {
                disabledIds.push(subId);
                if (setIncludes[subId]) setIncludes[subId].forEach(subSubId => disabledIds.push(subSubId));
            });
        }
    });

    // フィルタリングしてリストを表示
    Object.keys(menuData).filter(id => menuData[id].cat === activeTab).forEach(id => {
        const item = menuData[id];
        const isSelected = selectedIds.has(id);
        const isDisabled = disabledIds.includes(id);

        const div = document.createElement('div');
        div.className = `item ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}`;
        div.onclick = () => !isDisabled && toggleItem(id);

        div.innerHTML = `
            <input type="checkbox" ${isSelected ? 'checked' : ''} ${isDisabled ? 'disabled' : ''}>
            <div class="item-info">
                <span class="item-name">${item.label}</span>
                ${item.sub ? `<span class="item-sub">${item.sub}</span>` : ''}
            </div>
            <div class="item-price">¥${item.price.toLocaleString()}</div>
        `;
        area.appendChild(div);
    });

    updateCalc();
}

function toggleItem(id) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    render();
}

function setType(type) {
    userType = type;
    document.getElementById('type-new').classList.toggle('active', type === 'new');
    document.getElementById('type-rep').classList.toggle('active', type === 'repeat');
    updateCalc();
}

function showTab(cat) {
    activeTab = cat;
    render();
}

function updateCalc() {
    let totalPrice = 0;
    let totalTime = 0;
    let hasFacePart = false;

    selectedIds.forEach(id => {
        const item = menuData[id];
        totalPrice += item.price;
        totalTime += item.time;
        if (item.hasFace) hasFacePart = true;
    });

    if (selectedIds.size > 0) {
        if (userType === 'new') totalTime += 90;
        else if (hasFacePart) totalTime += 20;
    }

    const rounded = Math.ceil(totalTime / 30) * 30;
    const h = Math.floor(rounded / 60);
    const m = rounded % 60;
    const slot = `${h}.${m === 30 ? '5' : '0'}`;

    document.getElementById('total-price').innerText = `¥${totalPrice.toLocaleString()}`;
    document.getElementById('total-time-slot').innerText = `${slot} 時間枠`;
}

function copyToClipboard() {
    if (selectedIds.size === 0) { alert("メニューを選択してください"); return; }
    const slot = document.getElementById('total-time-slot').innerText;
    let text = `【NARX 脱毛予約】\n区分：${userType === 'new' ? '初めての方' : '会員'}\nメニュー：\n`;
    selectedIds.forEach(id => text += `・${menuData[id].label}\n`);
    text += `予約枠目安：${slot}\n`;
    text += `-----------------\n内容をコピーしました。予約ページの備考欄に貼り付けてください。`;
    navigator.clipboard.writeText(text).then(() => {
        alert("選択内容をコピーしました！\n予約ページで【" + slot + "】を選択し、備考欄に貼り付けてください。");
    });
}
init();
</script>
</body>
</html>
