<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARX 施術料金＆時間シミュレーター</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #000000;
            --dark-gray: #1a1a1a;
            --light-gray: #333;
            --white: #ffffff;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            margin: 0;
            padding-bottom: 180px; /* 合計バーの高さ分 */
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.5rem; letter-spacing: 3px; }

        /* ユーザータイプ選択 */
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn {
            flex: 1; padding: 15px; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .type-btn.active { background: var(--gold); color: var(--black); }

        /* ビジュアルエリア（画像が重なる部分） */
        .visual-container {
            position: sticky; top: 10px; z-index: 50;
            background: #111; border: 1px solid var(--light-gray);
            height: 250px; margin-bottom: 20px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; border-radius: 8px;
        }
        .visual-container img {
            position: absolute; height: 90%; transition: opacity 0.4s ease;
        }
        .layer-part { opacity: 0; z-index: 2; }
        .layer-part.active { opacity: 1; }
        #base-img { z-index: 1; opacity: 1; }

        /* カテゴリータブ */
        .tabs { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--light-gray); }
        .tab { padding: 12px 20px; white-space: nowrap; color: #888; cursor: pointer; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        /* メニューリスト */
        .menu-list { display: none; }
        .menu-list.active { display: block; }
        .item {
            background: var(--dark-gray); margin-bottom: 8px; padding: 15px;
            border-radius: 5px; display: flex; align-items: center; cursor: pointer;
            border: 1px solid transparent;
        }
        .item.selected { border-color: var(--gold); background: #222; }
        .item.disabled { opacity: 0.2; cursor: default; }
        .item input { transform: scale(1.4); margin-right: 15px; accent-color: var(--gold); }
        .item-info { flex: 1; }
        .item-name { display: block; font-size: 0.95rem; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .set-detail { display: block; font-size: 0.7rem; color: #888; margin-top: 4px; }

        /* 下部固定バー */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold);
            padding: 15px 20px; box-sizing: border-box; z-index: 100;
        }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 15px; }
        .summary-item .label { font-size: 0.7rem; color: #888; display: block; }
        .summary-item .val { font-size: 1.2rem; color: var(--gold); font-weight: bold; }
        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 15px; text-align: center; border-radius: 4px;
            font-weight: bold; text-decoration: none; font-size: 0.9rem; border: none; cursor: pointer;
        }
        .btn-copy { background: #333; color: white; }
        .btn-reserve { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NARX</h1>
        <small style="letter-spacing: 2px;">Nakashima Style Salon</small>
    </div>

    <!-- 1. 来店判定 -->
    <div class="type-selector">
        <button class="type-btn active" id="type-new" onclick="setType('new')">初めての方</button>
        <button class="type-btn" id="type-rep" onclick="setType('repeat')">会員の方</button>
    </div>

    <!-- 2. 画像プレビュー（リネームした画像たちがここに重なります） -->
    <div class="visual-container" id="visual-box">
        <img src="base.png" id="base-img">
        <!-- JSで部位ごとのレイヤー画像がここに追加されます -->
    </div>

    <!-- 3. タブ選択 -->
    <div class="tabs">
        <div class="tab active" onclick="showTab('set')">セット</div>
        <div class="tab" onclick="showTab('face')">顔</div>
        <div class="tab" onclick="showTab('body')">胴・腕・脚</div>
        <div class="tab" onclick="showTab('vio')">VIO</div>
        <div class="tab" onclick="showTab('other')">その他</div>
    </div>

    <!-- メニューエリア -->
    <div id="menu-area"></div>
</div>

<!-- 合計バー -->
<div class="bottom-bar">
    <div class="summary-grid">
        <div class="summary-item">
            <span class="label">料金合計 (税込)</span>
            <span class="val" id="total-price">¥0</span>
        </div>
        <div class="summary-item" style="text-align: right;">
            <span class="label">LINE予約枠目安</span>
            <span class="val" id="total-time-slot">0.0 時間枠</span>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn btn-copy" onclick="copyToClipboard()">①内容をコピー</button>
        <a href="https://liff.line.me/1657088803-ODW7m7Nn?calendar_salon_id=100&ts=1752815909" class="btn btn-reserve" target="_blank">②予約ページへ</a>
    </div>
</div>

<script>
/**
 * データベース（頂いた情報を完全反映）
 */
const menuData = {
    // セット
    set_eyebrow: { time: 40, price: 11000, label: '眉毛セット', cat: 'set', isFace: true, sub: '眉上・眉下・眉中・デザイン料' },
    set_fullface: { time: 65, price: 13200, label: '全顔セット', cat: 'set', isFace: true, sub: '鼻下・口下・頬・Fライン・首' },
    set_fullface_eyebrow: { time: 105, price: 22000, label: '全顔+眉毛セット', cat: 'set', isFace: true, sub: '全顔＋眉毛すべて' },
    set_fullbody_all: { time: 270, price: 52800, label: '全身オール', cat: 'set', isFace: true, sub: '顔・VIO含む全身' },
    set_fullbody_noface: { time: 200, price: 41800, label: '顔なし全身', cat: 'set', isFace: false },
    set_upperbody: { time: 170, price: 30800, label: '上半身セット', cat: 'set', isFace: true },
    set_lowerbody: { time: 150, price: 30800, label: '下半身セット', cat: 'set', isFace: false },
    set_vio: { time: 50, price: 16500, label: 'VIOセット', cat: 'set', isFace: false },
    set_arms_legs: { time: 125, price: 28600, label: '両腕+両足セット', cat: 'set', isFace: false },

    // 顔
    part_nose_under: { time: 16, price: 4400, label: '鼻下', cat: 'face', isFace: true },
    part_mouth_under: { time: 16, price: 4400, label: '口下', cat: 'face', isFace: true },
    part_cheek: { time: 16, price: 4400, label: '頬', cat: 'face', isFace: true },
    part_face_line: { time: 16, price: 4400, label: 'フェイスライン', cat: 'face', isFace: true },
    part_neck: { time: 16, price: 4400, label: '首', cat: 'face', isFace: true },

    // 胴・腕・脚
    part_nape: { time: 16, price: 4400, label: 'うなじ', cat: 'body', isFace: false },
    part_armpit: { time: 13, price: 4400, label: '脇', cat: 'body', isFace: false },
    part_elbow_lower: { time: 18, price: 6600, label: '肘下', cat: 'body', isFace: false },
    part_knee_lower: { time: 35, price: 8800, label: '膝下', cat: 'body', isFace: false },
    part_buttocks: { time: 16, price: 6600, label: '臀部（おしり）', cat: 'body', isFace: false },

    // VIO
    part_v_line: { time: 16, price: 7700, label: 'Vライン', cat: 'vio', isFace: false },
    part_i_line: { time: 20, price: 7700, label: 'Iライン', cat: 'vio', isFace: false },
    part_o_line: { time: 16, price: 5500, label: 'Oライン', cat: 'vio', isFace: false },

    // その他
    other_lala_peel: { time: 90, price: 12100, label: 'ララピール', cat: 'other', isFace: true },
};

// セットに含まれる部位の定義（重複防止用）
const setIncludes = {
    set_fullface: ['part_nose_under', 'part_mouth_under', 'part_cheek', 'part_face_line', 'part_neck'],
    set_vio: ['part_v_line', 'part_i_line', 'part_o_line'],
    set_fullbody_all: ['set_fullface', 'set_vio', 'part_armpit', 'part_nape'],
    set_fullbody_noface: ['part_armpit', 'part_nape', 'set_vio']
};

let userType = 'new';
let activeTab = 'set';
let selectedIds = new Set();

/** 初期化：画像レイヤーの事前生成 */
function init() {
    const box = document.getElementById('visual-box');
    Object.keys(menuData).forEach(id => {
        const img = document.createElement('img');
        img.src = `${id}.png`;
        img.id = `layer-${id}`;
        img.className = 'layer-part';
        img.onerror = () => img.remove(); // 画像がない場合は要素を消す
        box.appendChild(img);
    });
    render();
}

/** 描画メイン */
function render() {
    // 1. タブの更新
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.getAttribute('onclick').includes(activeTab));
    });

    // 2. メニューリストの生成
    const area = document.getElementById('menu-area');
    area.innerHTML = '';
    
    // セットに含まれているため選択不可にするリスト
    let disabledIds = [];
    selectedIds.forEach(id => {
        if (setIncludes[id]) disabledIds = [...disabledIds, ...setIncludes[id]];
    });

    Object.keys(menuData).filter(id => menuData[id].cat === activeTab).forEach(id => {
        const item = menuData[id];
        const isSelected = selectedIds.has(id);
        const isDisabled = disabledIds.includes(id);

        const div = document.createElement('div');
        div.className = `item ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}`;
        div.onclick = () => !isDisabled && toggleItem(id);

        div.innerHTML = `
            <input type="checkbox" ${isSelected ? 'checked' : ''} ${isDisabled ? 'disabled' : ''}>
            <div class="item-info">
                <span class="item-name">${item.label}</span>
                ${item.sub ? `<span class="set-detail">${item.sub}</span>` : ''}
            </div>
            <div class="item-price">¥${item.price.toLocaleString()}</div>
        `;
        area.appendChild(div);
    });

    updateCalc();
}

function toggleItem(id) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    render();
}

function setType(type) {
    userType = type;
    document.getElementById('type-new').classList.toggle('active', type === 'new');
    document.getElementById('type-rep').classList.toggle('active', type === 'repeat');
    updateCalc();
}

function showTab(cat) {
    activeTab = cat;
    render();
}

/** 計算ロジック（ナークス式） */
function updateCalc() {
    let totalPrice = 0;
    let totalTime = 0;
    let hasFace = false;

    // 画像レイヤーを一旦すべて非表示
    document.querySelectorAll('.layer-part').forEach(img => img.classList.remove('active'));

    selectedIds.forEach(id => {
        const item = menuData[id];
        totalPrice += item.price;
        totalTime += item.time;
        if (item.isFace) hasFace = true;
        
        // 画像レイヤーを表示
        const layer = document.getElementById(`layer-${id}`);
        if (layer) layer.classList.add('active');
    });

    // --- ナークス式時間加算 ---
    if (selectedIds.size > 0) {
        if (userType === 'new') {
            totalTime += 90; // 新規カウンセリング
        } else if (hasFace) {
            totalTime += 20; // 既存・冷却・アフター
        }
    }

    // LINE予約枠の計算（30分単位切り上げ）
    const slotRounded = Math.ceil(totalTime / 30) * 30;
    const hours = Math.floor(slotRounded / 60);
    const minutes = slotRounded % 60;
    const slotText = `${hours}.${minutes === 30 ? '5' : '0'}`;

    document.getElementById('total-price').innerText = `¥${totalPrice.toLocaleString()}`;
    document.getElementById('total-time-slot').innerText = `${slotText} 時間枠`;
}

/** コピー機能 */
function copyToClipboard() {
    const slot = document.getElementById('total-time-slot').innerText;
    let text = `【NARX脱毛予約】\n区分：${userType === 'new' ? '初めて' : '会員'}\nメニュー：\n`;
    selectedIds.forEach(id => { text += `・${menuData[id].label}\n`; });
    text += `予約枠目安：${slot}\n`;
    text += `-----------------\nこの内容を備考欄に貼り付けてください。`;
    
    navigator.clipboard.writeText(text).then(() => {
        alert("選択内容をコピーしました！\n予約枠【" + slot + "】を選んで、備考欄に貼り付けてください。");
    });
}

// 起動
init();
</script>
</body>
</html>
