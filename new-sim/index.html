<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NARX 料金＆時間シミュレーター Ver.4.0</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #000;
            --dark-gray: #151515;
            --light-gray: #333;
            --white: #fff;
            --panel-bg: #fdfdfd;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            margin: 0;
            padding-bottom: 180px;
            overflow-x: hidden;
            user-select: none;
        }

        /* 来店属性確認ゲート */
        #gate-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-content {
            border: 1px solid var(--gold); padding: 40px 20px;
            width: 85%; max-width: 400px; background: var(--black);
            text-align: center; border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid var(--gold); margin-bottom: 15px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.4rem; letter-spacing: 4px; }
        
        /* モード表示バッジ */
        #mode-display {
            font-size: 0.75rem; font-weight: bold; color: var(--black); background: var(--gold);
            padding: 4px 15px; border-radius: 20px; margin-top: 8px; display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* プレビューパネル */
        .dual-visual-container {
            display: flex; gap: 4px; height: 240px; position: sticky; top: 10px; z-index: 50;
            background: var(--light-gray); border: 2px solid var(--gold);
            margin-bottom: 20px; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .view-panel { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-color: var(--panel-bg); }
        .view-panel:first-child { border-right: 1px solid #ddd; }
        .view-panel span { position: absolute; top: 8px; font-size: 9px; color: #999; letter-spacing: 2px; font-weight: bold; z-index: 10; }
        .view-panel img { position: absolute; height: 90%; transition: opacity 0.4s ease; pointer-events: none; }
        .base-img { opacity: 0.3; z-index: 1; }
        .layer-part { opacity: 0; z-index: 2; }
        .layer-part.active { opacity: 1; filter: drop-shadow(0 0 3px var(--gold)); }

        /* タブ */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--light-gray); }
        .tab { flex: 1; padding: 12px 5px; text-align: center; color: #777; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        /* サブタイトル飾り */
        .subcat-header {
            display: flex; align-items: center; justify-content: center;
            margin: 30px 0 15px; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.4em; font-weight: bold;
        }
        .subcat-header::before, .subcat-header::after {
            content: ""; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold));
            margin: 0 20px; opacity: 0.6;
        }
        .subcat-header::after { background: linear-gradient(to left, transparent, var(--gold)); }

        /* メニューアイテム */
        .item { 
            background: var(--dark-gray); margin-bottom: 8px; padding: 16px; border-radius: 6px; 
            display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .item.selected { border-color: var(--gold); background: #080808; box-shadow: inset 0 0 10px rgba(212,175,55,0.1); }
        .item.disabled { opacity: 0.2; cursor: default; filter: grayscale(1); }
        .item input { transform: scale(1.4); margin-right: 18px; accent-color: var(--gold); }
        .item-info { flex: 1; }
        .item-name { display: block; font-size: 0.95rem; letter-spacing: 0.05em; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-top: 2px; }
        .item-sub { display: block; font-size: 0.7rem; color: #888; margin-top: 5px; line-height: 1.4; }

        /* お得提案ポップアップ */
        #suggestion-box {
            position: fixed; bottom: 190px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px; background: var(--gold); color: var(--black);
            padding: 18px; border-radius: 12px; display: none; z-index: 1000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6); animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { bottom: 150px; opacity: 0; } to { bottom: 190px; opacity: 1; } }

        /* 下部固定バー */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 5, 5, 0.98); border-top: 2px solid var(--gold);
            padding: 15px 20px; box-sizing: border-box; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .summary-grid { display: grid; grid-template-columns: 1fr 1.1fr; margin-bottom: 12px; }
        .summary-item .label { font-size: 0.7rem; color: #999; display: block; margin-bottom: 2px; }
        .summary-item .val { font-size: 1.35rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; text-align: center; border-radius: 6px; font-weight: bold; font-size: 0.9rem; border: none; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .btn-copy { background: #222; color: #fff; }
        .btn-reserve { background: var(--gold); color: #000; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
    </style>
</head>

let userType = 'new';
let currentTab = 'set';
let selected = new Set();
let suggestionId = null;

// ゲート処理
function closeGate(type) {
    userType = type;
    document.getElementById('gate-modal').style.display = 'none';
    const badge = document.getElementById('mode-display');
    badge.innerText = type === 'new' ? "【ご新規様】初回限定価格モード" : "【会員様】通常価格モード";
    badge.style.background = type === 'new' ? "var(--gold)" : "#888";
    initLayers();
}

function initLayers() {
    const bPanel = document.getElementById('body-panel');
    const fPanel = document.getElementById('face-panel');
    Object.keys(menuData).forEach(id => {
        const item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) addImg(bPanel, item.imgs.body);
            if (item.imgs.face) addImg(fPanel, item.imgs.face);
        }
    });
    render();
}

function addImg(parent, name) {
    const id = `img-${name}`;
    if (document.getElementById(id)) return;
    const img = document.createElement('img');
    img.src = `${name}.png`;
    img.id = id;
    img.className = 'layer-part';
    img.onerror = () => img.remove();
    parent.appendChild(img);
}

function changeTab(tab) { currentTab = tab; render(); }

function toggleItem(id) {
    if (selected.has(id)) selected.delete(id); else selected.add(id);
    checkOptimalSet();
    render();
}

function render() {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === `tab-${currentTab}`));
    const area = document.getElementById('menu-area');
    area.innerHTML = '';

    // ビジュアル点灯（タブ不問で点灯させる）
    document.querySelectorAll('.layer-part').forEach(img => img.classList.remove('active'));
    
    let disabledIds = [];
    const getDeep = (id) => { if(setIncludes[id]) setIncludes[id].forEach(s => { disabledIds.push(s); getDeep(s); }); };
    
    selected.forEach(id => {
        getDeep(id);
        const item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) { let i = document.getElementById(`img-${item.imgs.body}`); if(i) i.classList.add('active'); }
            if (item.imgs.face) { let i = document.getElementById(`img-${item.imgs.face}`); if(i) i.classList.add('active'); }
        }
    });

    let lastSub = "";
    Object.keys(menuData).filter(id => menuData[id].cat === currentTab).forEach(id => {
        const item = menuData[id];
        if (currentTab === 'part' && item.subCat !== lastSub) {
            lastSub = item.subCat;
            const h = document.createElement('div');
            h.className = 'subcat-header'; h.innerText = lastSub;
            area.appendChild(h);
        }
        const div = document.createElement('div');
        const isSel = selected.has(id);
        const isDis = disabledIds.includes(id);
        div.className = `item ${isSel ? 'selected' : ''} ${isDis ? 'disabled' : ''}`;
        div.onclick = () => !isDis && toggleItem(id);
        div.innerHTML = `
            <input type="checkbox" ${isSel ? 'checked' : ''} ${isDis ? 'disabled' : ''}>
            <div class="item-info">
                <span class="item-name">${item.label}</span>
                ${item.sub ? `<span class="item-sub">${item.sub}</span>` : ''}
            </div>
            <div class="item-price">¥${item.price.toLocaleString()}</div>
        `;
        area.appendChild(div);
    });
    updateTotal();
}

function updateTotal() {
    let p = 0, t = 0, f = false;
    selected.forEach(id => {
        const item = menuData[id]; p += item.price; t += item.time; if(item.hasFace) f = true;
    });
    if (selected.size > 0) {
        if (userType === 'new') t += 90; else if (f) t += 20;
    }
    const rounded = Math.ceil(t / 30) * 30;
    const slot = `${Math.floor(rounded / 60)}.${(rounded % 60) === 30 ? '5' : '0'}`;
    document.getElementById('total-price').innerText = `¥${p.toLocaleString()}`;
    document.getElementById('total-time-slot').innerText = `${slot} 時間枠`;
}

/**
 * お得セット提案AI Ver.4.0
 * 金額ベースの全身オール提案ロジックを追加
 */
function checkOptimalSet() {
    suggestionId = null;
    document.getElementById('suggestion-box').style.display = 'none';

    // 1. 構成パーツによる提案（上半身+下半身など）
    const priority = ['set_fullbody_all', 'set_fullface_eyebrow', 'set_upperbody', 'set_lowerbody', 'set_fullface_vio', 'set_vio_buttocks', 'set_chest_abdomen', 'set_ear_whole', 'set_eyebrow'];
    for (const sid of priority) {
        const parts = setIncludes[sid];
        if (parts && parts.every(p => selected.has(p)) && !selected.has(sid)) {
            suggestionId = sid;
            document.getElementById('suggestion-text').innerText = `「${menuData[sid].label}」へ切り替える方がお得です。`;
            document.getElementById('suggestion-box').style.display = 'block';
            return;
        }
    }

    // 2. 金額ベースの全身オール提案（特殊部位以外で52,800円を超えた場合）
    let normalPartsPrice = 0;
    let normalPartsIds = [];
    selected.forEach(id => {
        if (!menuData[id].isSpecial && id !== 'set_fullbody_all') {
            normalPartsPrice += menuData[id].price;
            normalPartsIds.push(id);
        }
    });

    if (normalPartsPrice >= 52800 && !selected.has('set_fullbody_all') && normalPartsIds.length > 1) {
        suggestionId = 'set_fullbody_all';
        document.getElementById('suggestion-text').innerText = `通常部位の合計が「全身オール」の価格を超えています。セットに切り替える方が断然お得です。`;
        document.getElementById('suggestion-box').style.display = 'block';
    }
}

function applyOptimalSet() {
    if (!suggestionId) return;
    if (suggestionId === 'set_fullbody_all') {
        // 全身オールにする場合、特殊部位以外をすべて消す
        selected.forEach(id => { if(!menuData[id].isSpecial) selected.delete(id); });
    } else {
        // 特定セットにする場合、その構成要素だけ消す
        setIncludes[suggestionId].forEach(p => selected.delete(p));
    }
    selected.add(suggestionId);
    hideSuggestion();
    render();
}

function hideSuggestion() { document.getElementById('suggestion-box').style.display = 'none'; }

function copyResult() {
    if (selected.size === 0) return alert("メニューを選択してください");
    const slot = document.getElementById('total-time-slot').innerText;
    let txt = `【NARX脱毛予約】\nモード：${userType === 'new' ? '新規' : '会員'}\n内容：\n`;
    selected.forEach(id => txt += `・${menuData[id].label}\n`);
    txt += `予約枠目安：${slot}`;
    navigator.clipboard.writeText(txt).then(() => alert("コピーしました。"));
}
