<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NARX 料金＆時間シミュレーター Ver.32.0</title>
<style>
:root{--gold:#d4af37;--black:#000;--dark-gray:#151515;--light-gray:#333;--white:#fff;--panel-bg:#fdfdfd;}
body{background-color:var(--black);color:var(--white);font-family:serif;margin:0;padding-bottom:240px;overflow-x:hidden;}

/* トップ画面ロゴサイズ調整 */
.gate-logo-container { text-align: center; margin-bottom: 30px; }
.gate-logo-img { width: 220px; height: auto; }

/* シミュレーター上部ロゴ調整 */
.header-logo-container { text-align: center; padding: 15px 0; border-bottom: 1px solid var(--gold); margin-bottom: 15px; }
.header-logo-img { height: 45px; width: auto; }

#gate-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);z-index:99999;display:flex;justify-content:center;align-items:center;}
.modal-content{border:1px solid var(--gold);padding:40px 20px;width:85%;max-width:420px;background:var(--black);text-align:center;border-radius:12px;box-shadow: 0 0 30px rgba(212,175,55,0.2);}
.container{max-width:600px;margin:0 auto;padding:0 20px;}

#mode-display{font-size:0.75rem;color:var(--black);background:var(--gold);padding:4px 15px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold;}

.dual-visual-container{display:flex;gap:4px;height:240px;position:sticky;top:10px;z-index:50;background:var(--light-gray);border:2px solid var(--gold);margin-bottom:20px;border-radius:8px;overflow:hidden;}
.view-panel{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background-color:var(--panel-bg);}
.view-panel:first-child{border-right:1px solid #ddd;}
.view-panel span{position:absolute;top:8px;font-size:9px;color:#999;letter-spacing:2px;font-weight:bold;z-index:10;}
.view-panel img{position:absolute;height:90%;transition:opacity 0.3s ease;pointer-events:none;}
.base-img{opacity:0.3;z-index:1;}
.layer-part{opacity:0;z-index:2;}
.layer-part.active{opacity:1;filter:drop-shadow(0 0 3px var(--gold));}

@keyframes blink-gold {
    0% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
    50% { opacity: 0.85; filter: drop-shadow(0 0 10px var(--gold)); }
    100% { opacity: 0; filter: drop-shadow(0 0 2px var(--gold)); }
}
.layer-part.suggest-blink { animation: blink-gold 1.2s infinite ease-in-out; z-index: 3; }

.tabs{display:flex;gap:5px;margin-bottom:15px;border-bottom:1px solid var(--light-gray);}
.tab{flex:1;padding:12px 5px;text-align:center;color:#777;cursor:pointer;font-size:0.85rem;}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);font-weight:bold;}

#selected-chips-area { margin-bottom: 15px; background: #0a0a0a; padding: 12px; border-radius: 8px; border: 1px solid #222; }
.chips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.chips-title { font-size: 0.75rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }
.btn-reset { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 4px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; }
.chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
.chip-close { background: var(--gold); color: #000; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; justify-content: center; align-items: center; font-size: 0.6rem; font-weight: bold; cursor: pointer; }

.subcat-header{display:flex;align-items:center;justify-content:center;margin:30px 0 15px;color:var(--gold);font-size:0.85rem;letter-spacing:0.4em;font-weight:bold;}
.subcat-header::before,.subcat-header::after{content:"";flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold));margin:0 20px;opacity:0.6;}
.subcat-header::after{background:linear-gradient(to left,transparent,var(--gold));}

.item{background:var(--dark-gray);margin-bottom:8px;padding:16px;border-radius:6px;display:flex;align-items:center;cursor:pointer;border:1px solid transparent;transition:0.2s;}
.item.selected{border-color:var(--gold);background:#080808;}
.item.disabled{opacity:0.15;cursor:default;filter:grayscale(1);}
.item input{transform:scale(1.4);margin-right:18px;accent-color:var(--gold);}
.item-info{flex:1;}
.item-name{display:block;font-size:0.95rem;}
.item-price{color:var(--gold);font-weight:bold;font-size:0.9rem;margin-top:2px;}
.price-tag-new { font-size: 0.65rem; background: #c00; color: #fff; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }

#suggestion-box{position:fixed;bottom:190px;left:50%;transform:translateX(-50%);width:92%;max-width:420px;background:linear-gradient(135deg,#f7d05e 0%,#d4af37 100%);color:#111;padding:20px;border-radius:12px;display:none;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.8);border:1px solid #fff;}
.sug-title{font-weight:bold;font-size:0.85rem;color:#555;margin-bottom:12px;text-align:center;}
.sug-benefit-msg {text-align:center;font-size:0.75rem;color:var(--gold);background:#111;padding:6px 10px;border-radius:4px;font-weight:bold;margin-bottom:12px;}
.sug-menu-name{font-size:1.25rem;font-weight:bold;color:#111;margin-bottom:2px;text-align:center;}
.sug-compare-panel{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.75);padding:12px 10px;border-radius:8px;margin-bottom:10px;border:1px solid rgba(0,0,0,0.1);}
.sug-col{flex:1;text-align:center;}
.sug-col-label{font-size:0.65rem;color:#555;display:block;margin-bottom:2px;font-weight:bold;}
.sug-col-price{font-size:1rem;color:#111;font-weight:bold;}
.sug-col-price.old{text-decoration:line-through;color:#888;font-size:0.9rem;}
.sug-col-price.new{font-size:1.3rem;color:#c00;}
.sug-arrow{padding:0 5px;color:#c00;font-weight:bold;text-align:center;font-size:1.2rem;}
.sug-discount-badge{display:inline-block;background:#c00;color:#fff;font-size:0.75rem;padding:4px 10px;border-radius:12px;margin-bottom:12px;font-weight:bold;}

#concierge-wrapper{display:flex;position:fixed;bottom:85px;left:50%;transform:translateX(-50%);z-index:1000;align-items:center;flex-direction:column;pointer-events:none;}
#concierge-bubble{display:none;background:#fff;color:#111;padding:12px 16px;border-radius:12px;font-size:0.75rem;font-weight:bold;margin-bottom:12px;box-shadow:0 4px 15px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.3s ease;position:relative;text-align:center;pointer-events:auto;}
.bubble-tail{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fff;}
.concierge-icon{width:55px;height:55px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.8);pointer-events:auto;}
.concierge-icon.on{background:var(--gold);border:2px solid var(--gold);}
.concierge-icon.off{background:#111;border:3px solid var(--gold);}

#copy-complete-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100000;display:none;justify-content:center;align-items:center;}
.final-modal-content{border:1px solid var(--gold);padding:30px 20px;width:85%;max-width:400px;background:var(--black);text-align:center;border-radius:8px;}
.bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,5,5,0.98);border-top:2px solid var(--gold);padding:15px 20px;box-sizing:border-box;z-index:100;}
.summary-grid{display:grid;grid-template-columns:1fr 1.1fr;margin-bottom:12px;}
.summary-item .label{font-size:0.7rem;color:#999;display:block;}
.summary-item .val{font-size:1.35rem;color:var(--gold);font-weight:bold;}
.summary-item .counseling-note{font-size:0.6rem;color:#fff;background:#c00;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:2px;}
.btn-group{display:flex;gap:10px;}
.btn{flex:1;padding:15px;text-align:center;border-radius:6px;font-weight:bold;font-size:0.9rem;border:none;cursor:pointer;}
.btn-copy{background:#222;color:#fff;}
.btn-reserve{background:var(--gold);color:#000;}

.step-box {background: #111; border: 1px solid #333; border-radius: 8px; padding: 18px; margin: 20px 0; text-align: left;}
.step-label {font-size: 0.7rem; color: var(--gold); display: block; margin-bottom: 3px; font-weight: bold;}
.step-val {font-size: 0.95rem; font-weight: bold; color: #fff;}
</style>
</head>

<div id="suggestion-box"></div>

<div id="copy-complete-modal">

            <div><span class="step-label">③ お客様情報の入力</span><span class="step-val">「備考欄」にコピーした内容をペースト</span></div>
        </div>

</div>

<div class="bottom-bar">

    part_nose_hair:{price:4400,time:20,label:'鼻毛',cat:'part',subCat:'特殊部位',imgs:{face:'part_nose_hair'}},
    part_nose_wing:{price:4400,time:10,label:'小鼻',cat:'part',subCat:'特殊部位',imgs:{face:'part_nose_wing'},hasFace:true},
    part_under_eyes:{price:4400,time:10,label:'目の下',cat:'part',subCat:'特殊部位',imgs:{face:'part_under_eyes'},hasFace:true},
    
    other_lala_peel:{price:12100,time:90,label:'ララピール',cat:'other',imgs:{face:'other_lala_peel'},hasFace:true},
    other_face_correction:{price:22000,time:90,label:'小顔矯正術',cat:'other',imgs:{face:'other_face_correction'},hasFace:true},

    other_s_planning:{price:11000,time:60,label:'エスプランニング',cat:'other',imgs:{body:'other_s_planning'}}
};

// 【重要】セットに何を含めるか（排他制御用）の定義。特殊部位は必要な箇所のみに限定。
var setIncludes = {
    set_fullbody_all:['set_fullbody_noface','set_fullbody_novio','set_upperbody','set_lowerbody','set_fullface','set_vio'],
    set_fullbody_noface:['set_lowerbody','set_vio','set_arms','set_legs','part_nape','part_armpit','part_chest_nipple','part_navel_under','part_back_upper','part_back_lower','part_buttocks'],
    set_fullbody_novio:['set_upperbody','set_arms','set_legs','set_fullface','part_nape','part_chest_nipple','part_navel_under','part_back_upper','part_back_lower'],
    set_upperbody:['set_fullface','set_arms','part_armpit','part_chest_nipple','part_navel_under','part_nape','part_back_upper','part_back_lower','part_nipple_around'],
    set_lowerbody:['set_vio','set_legs','part_buttocks'],
    set_fullface_vio:['set_fullface','set_vio'],
    set_fullface_eyebrow:['set_fullface','set_eyebrow'],
    set_eyebrow:['part_eyebrow_upper','part_eyebrow_lower','part_eyebrow_middle'],
    set_fullface:['part_nose_under','part_mouth_under','part_cheek','part_face_line','part_neck'],
    set_vio:['part_v_line','part_i_line','part_o_line'],
    set_vio_buttocks:['set_vio','part_buttocks'],
    set_abdomen_vio:['part_navel_under','set_vio'],
    set_chest_abdomen:['part_chest_nipple','part_navel_under','part_nipple_around'],
    set_arms_legs:['set_arms','set_legs'],
    set_arms:['part_elbow_upper','part_elbow_lower','part_hand_finger'],
    set_legs:['part_knee_upper','part_knee_lower','part_foot_toe'],
    set_ear_whole:['part_tragus','part_earlobe']
};

function getItemPrice(id) {
    var item = menuData[id];
    if (userType === 'new') {
        var face5 = ['part_nose_under','part_mouth_under','part_cheek','part_face_line','part_neck'];
        if (face5.indexOf(id) !== -1) return 1000;
        if (id === 'set_fullface') return 5000;
        return item.price * 0.5;
    }
    return item.price;
}

function forceStart(type) {
    document.getElementById('gate-modal').style.display = 'none';
    userType = type;
    var badge = document.getElementById('mode-display');
    if (badge) {
        badge.innerText = type === 'new' ? "【ご新規様】初回限定価格モード" : "【会員様】通常価格モード";
    }
    initApp(); render();
}

function initApp() {
    function getLeafNodes(id) {
        var leaves =[];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) { setIncludes[nodeId].forEach(function(subId) { traverse(subId); }); } 
            else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id); return leaves;
    }
    Object.keys(menuData).forEach(function(id) { itemLeaves[id] = getLeafNodes(id); });
    
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    Object.keys(menuData).forEach(function(id) {
        var item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    });
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png"; img.id = layerId; img.className = 'layer-part';
    img.onerror = function() { this.style.display = 'none'; };
    parent.appendChild(img);
}

function changeTab(tab) { currentTab = tab; render(); }
function resetSelection() { selected =[]; suggestionId = null; document.getElementById('suggestion-box').style.display = 'none'; render(); }
function toggleItem(id) {
    var idx = selected.indexOf(id);
    if (idx !== -1) { selected.splice(idx, 1); lastToggledItem = null; } 
    else { selected.push(id); lastToggledItem = id; }
    checkSuggestion(false); render();
}

function renderChips() {
    var area = document.getElementById('selected-chips-area'), container = document.getElementById('chips-container');
    if (selected.length === 0) { area.style.display = 'none'; return; }
    area.style.display = 'block'; container.innerHTML = '';
    selected.forEach(function(id) {
        var item = menuData[id], chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = '<span>' + item.label + '</span><span class="chip-close" onclick="event.stopPropagation(); toggleItem(\'' + id + '\')">×</span>';
        container.appendChild(chip);
    });
}

function render() {
    var area = document.getElementById('menu-area'); area.innerHTML = '';
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    var activeTab = document.getElementById("tab-" + currentTab); if(activeTab) activeTab.classList.add('active');
    renderChips();
    document.querySelectorAll('.layer-part').forEach(function(img) { img.classList.remove('active'); img.classList.remove('suggest-blink'); });
    
    var selectedLeaves =[];
    selected.forEach(function(id) { if(itemLeaves[id]) { itemLeaves[id].forEach(function(leaf) { if(selectedLeaves.indexOf(leaf) === -1) selectedLeaves.push(leaf); }); } });
    selected.forEach(function(id) {
        var item = menuData[id];
        if (item.imgs) {
            if (item.imgs.body) { var i = document.getElementById("img-" + item.imgs.body); if(i) i.classList.add('active'); }
            if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); }
        }
    });
    selectedLeaves.forEach(function(leaf) {
        var item = menuData[leaf];
        if (item && item.imgs) {
            if (item.imgs.body) { var i = document.getElementById("img-" + item.imgs.body); if(i) i.classList.add('active'); }
            if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f) f.classList.add('active'); }
        }
    });

    var lastSub = "";
    Object.keys(menuData).filter(function(id) { return menuData[id].cat === currentTab; }).forEach(function(id) {
        var item = menuData[id];
        if (currentTab === 'part' && item.subCat !== lastSub) {
            lastSub = item.subCat; var h = document.createElement('div'); h.className = 'subcat-header'; h.innerText = lastSub; area.appendChild(h);
        }
        var isSel = selected.indexOf(id) !== -1, isDis = false;
        if (!isSel && itemLeaves[id]) { isDis = itemLeaves[id].some(function(leaf) { return selectedLeaves.indexOf(leaf) !== -1; }); }
        var div = document.createElement('div'); div.className = "item " + (isSel ? 'selected' : '') + " " + (isDis ? 'disabled' : '');
        div.onclick = function() { if(!isDis) toggleItem(id); };
        var p = getItemPrice(id);
        var inner = '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' ' + (isDis ? 'disabled' : '') + '>';
        inner += '<div class="item-info"><span class="item-name">' + item.label + '</span>';
        inner += '</div><div class="item-price">¥' + p.toLocaleString();
        if(userType === 'new') inner += '<span class="price-tag-new">初回</span>';
        inner += '</div>';
        div.innerHTML = inner; area.appendChild(div);
    });
    updateTotal();
    if (suggestionId) {
        itemLeaves[suggestionId].forEach(function(leaf) {
            var item = menuData[leaf];
            if (item && item.imgs) {
                if (item.imgs.body) { var i = document.getElementById("img-" + item.imgs.body); if(i && !i.classList.contains('active')) i.classList.add('suggest-blink'); }
                if (item.imgs.face) { var f = document.getElementById("img-" + item.imgs.face); if(f && !f.classList.contains('active')) f.classList.add('suggest-blink'); }
            }
        });
    }
}

function updateTotal() {
    var p = 0, t = 0, f = false;
    selected.forEach(function(id) { p += getItemPrice(id); t += menuData[id].time; if(menuData[id].hasFace) f = true; });
    if (selected.length > 0) {
        if (userType === 'new') { t += 90; document.getElementById('counseling-badge-area').innerHTML = '<span class="counseling-note">※無料カウンセリング込</span>'; } 
        else { if (f) t += 20; document.getElementById('counseling-badge-area').innerHTML = ''; }
    } else { document.getElementById('counseling-badge-area').innerHTML = ''; }
    var rounded = Math.ceil(t / 30) * 30, slot = Math.floor(rounded / 60) + "." + ((rounded % 60) === 30 ? '5' : '0');
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();
    document.getElementById('total-time-slot').innerText = slot + " 時間枠";
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    if (!isConciergeON && !isManual) { suggestionId = null; return; }
    var best = analyzeSuggestions(isManual);
    if (!best) { suggestionId = null; return; }
    suggestionId = best.sid; 
    suggestionReplaceItems = best.intersectingItems;
    var currentT = 0; selected.forEach(function(id) { currentT += getItemPrice(id); });
    var newT = currentT - best.oldPrice + getItemPrice(best.sid);
    var saving = currentT - newT;
    var html = '<div class="sug-title">👑 AIコンシェルジュからのご提案</div>';
    html += '<div class="sug-benefit-msg">✨ お安くなります！ ✨</div>';
    html += '<div class="sug-menu-name">' + menuData[best.sid].label + '</div>';
    html += '<div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在の選択合計</span><span class="sug-col-price old">¥' + currentT.toLocaleString() + '</span></div>';
    html += '<div class="sug-arrow">▶▶</div><div class="sug-col"><span class="sug-col-label">プラン変更後</span><span class="sug-col-price new">¥' + newT.toLocaleString() + '</span></div></div>';
    if(saving > 0) { html += '<div style="text-align:center;"><span class="sug-discount-badge">✨ ¥' + saving.toLocaleString() + ' お得になります！</span></div>'; }
    html += '<div style="display:flex; gap:10px; margin-top:15px;"><button onclick="applyOptimalSet()" style="background:#000; color:#d4af37; border:1px solid #000; padding:12px; border-radius:6px; font-weight:bold; flex:2;">変更する</button>';
    html += '<button onclick="suggestionId=null; document.getElementById(\'suggestion-box\').style.display=\'none\'; render();" style="background:transparent; color:#333; border:none; flex:1; font-weight:bold;">今はしない</button></div>';
    document.getElementById('suggestion-box').innerHTML = html; document.getElementById('suggestion-box').style.display = 'block';
}

function analyzeSuggestions(isManual) {
    var candidates =[];
    Object.keys(menuData).filter(function(k) { return menuData[k].cat === 'set'; }).forEach(function(sid) {
        if (selected.indexOf(sid) !== -1) return;
        var candLeaves = itemLeaves[sid], intersectingItems =[], intersectingLeaves =[], isCovered = true;
        selected.forEach(function(selId) {
            var selLeaves = itemLeaves[selId], hasInt = false;
            selLeaves.forEach(function(leaf) { if (candLeaves.indexOf(leaf) !== -1) { hasInt = true; } else { isCovered = false; } });
            if (hasInt) { intersectingItems.push(selId); selLeaves.forEach(function(l) { if(intersectingLeaves.indexOf(l)===-1) intersectingLeaves.push(l); }); }
        });
        if (intersectingItems.length >= 1 && isCovered) {
            var oldP = 0; intersectingItems.forEach(function(id) { oldP += getItemPrice(id); });
            var diff = getItemPrice(sid) - oldP;
            if (diff < 0 && intersectingItems.length >= 2) candidates.push({sid:sid, type:'cheaper', oldPrice:oldP, diff:diff, intersectingItems:intersectingItems});
        }
    });
    return candidates.length > 0 ? candidates[0] : null;
}

function applyOptimalSet() {
    suggestionReplaceItems.forEach(function(itemId) { var idx = selected.indexOf(itemId); if (idx !== -1) selected.splice(idx, 1); });
    selected.push(suggestionId); suggestionId = null; document.getElementById('suggestion-box').style.display = 'none'; render();
}

function toggleConcierge() {
    isConciergeON = !isConciergeON; var icon = document.getElementById('concierge-icon');
    icon.className = isConciergeON ? 'concierge-icon on' : 'concierge-icon off';
    if (isConciergeON) { checkSuggestion(true); showConciergeBubble("AIコンシェルジュが<br>最適なプランをご提案します。"); } 
    else { document.getElementById('suggestion-box').style.display = 'none'; suggestionId = null; render(); }
}

function showConciergeBubble(msg) {
    var b = document.getElementById('concierge-bubble'); document.getElementById('concierge-msg').innerHTML = msg;
    b.style.display = 'block'; setTimeout(function() { b.style.opacity = '1'; }, 10);
    if (bubbleTimer) clearTimeout(bubbleTimer); bubbleTimer = setTimeout(function() { b.style.opacity = '0'; setTimeout(function(){b.style.display='none';},300); }, 4000);
}

function copyResult() {
    if (selected.length === 0) return alert("選択してください");
    doActualCopy();
}

function doActualCopy() {
    var slot = document.getElementById('total-time-slot').innerText, priceStr = document.getElementById('total-price').innerText;
    var txt = "【NARX予約】\n区分：" + (userType === 'new' ? '新規' : '会員') + "\nメニュー：\n";
    selected.forEach(function(id) { txt += "・" + menuData[id].label + "\n"; });
    txt += "──────────\n合計金額：" + priceStr + "\n予約枠目安：" + slot;
    navigator.clipboard.writeText(txt).then(function() { 
        document.getElementById('modal-time-slot-text').innerText = slot;
        document.getElementById('copy-complete-modal').style.display = 'flex';
    });
}

function goToReserve() { window.open("https://liff.line.me/1657088803-ODW7m7Nn?calendar_salon_id=100&ts=1772815585", "_blank"); }
function closeCopyModal() { document.getElementById('copy-complete-modal').style.display = 'none'; }
