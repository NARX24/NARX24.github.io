<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NARX 料金＆時間シミュレーター Ver.6.0</title>
    <style>
        :root {
            --gold: #d4af37;
            --black: #000;
            --dark-gray: #151515;
            --light-gray: #333;
            --white: #fff;
            --panel-bg: #fdfdfd;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            margin: 0;
            padding-bottom: 200px;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* 属性確認ゲート */
        #gate-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-content {
            border: 1px solid var(--gold); padding: 40px 20px;
            width: 85%; max-width: 400px; background: var(--black);
            text-align: center; border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid var(--gold); margin-bottom: 15px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.4rem; letter-spacing: 4px; }
        
        #mode-display {
            font-size: 0.75rem; font-weight: bold; color: var(--black); background: var(--gold);
            padding: 4px 15px; border-radius: 20px; margin-top: 8px; display: inline-block;
        }

        /* 2画面分割プレビュー */
        .dual-visual-container {
            display: flex; gap: 4px; height: 240px; position: sticky; top: 10px; z-index: 50;
            background: var(--light-gray); border: 2px solid var(--gold);
            margin-bottom: 20px; border-radius: 8px; overflow: hidden;
        }
        .view-panel { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-color: var(--panel-bg); }
        .view-panel:first-child { border-right: 1px solid #ddd; }
        .view-panel span { position: absolute; top: 8px; font-size: 9px; color: #999; letter-spacing: 2px; font-weight: bold; z-index: 10; }
        .view-panel img { position: absolute; height: 90%; transition: opacity 0.4s ease; pointer-events: none; }
        .base-img { opacity: 0.3; z-index: 1; }
        .layer-part { opacity: 0; z-index: 2; }
        .layer-part.active { opacity: 1; filter: drop-shadow(0 0 3px var(--gold)); }

        /* タブ */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--light-gray); }
        .tab { flex: 1; padding: 12px 5px; text-align: center; color: #777; cursor: pointer; font-size: 0.85rem; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        /* 小見出し */
        .subcat-header {
            display: flex; align-items: center; justify-content: center;
            margin: 30px 0 15px; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.4em; font-weight: bold;
        }
        .subcat-header::before, .subcat-header::after {
            content: ""; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold));
            margin: 0 20px; opacity: 0.6;
        }
        .subcat-header::after { background: linear-gradient(to left, transparent, var(--gold)); }

        /* アイテム */
        .item { 
            background: var(--dark-gray); margin-bottom: 8px; padding: 16px; border-radius: 6px; 
            display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .item.selected { border-color: var(--gold); background: #080808; }
        .item.disabled { opacity: 0.1; cursor: default; filter: grayscale(1); pointer-events: none; }
        .item input { transform: scale(1.4); margin-right: 18px; accent-color: var(--gold); }
        .item-info { flex: 1; }
        .item-name { display: block; font-size: 0.95rem; letter-spacing: 0.05em; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-top: 2px; }
        .item-sub { display: block; font-size: 0.7rem; color: #888; margin-top: 5px; line-height: 1.4; }

        /* 提案ボックス */
        #suggestion-box {
            position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px; background: var(--gold); color: var(--black);
            padding: 18px; border-radius: 12px; display: none; z-index: 1000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(5, 5, 5, 0.98); border-top: 2px solid var(--gold);
            padding: 15px 20px; box-sizing: border-box; z-index: 100;
        }
        .summary-grid { display: grid; grid-template-columns: 1fr 1.1fr; margin-bottom: 12px; }
        .summary-item .label { font-size: 0.7rem; color: #999; display: block; }
        .summary-item .val { font-size: 1.35rem; color: var(--gold); font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; text-align: center; border-radius: 6px; font-weight: bold; font-size: 0.9rem; border: none; cursor: pointer; text-decoration: none; }
        .btn-copy { background: #222; color: #fff; }
        .btn-reserve { background: var(--gold); color: #000; }
    </style>
</head>

<div id="gate-modal">

        <button class="btn btn-reserve" style="width: 100%; margin-bottom: 15px;" onclick="selectUserType('new')">初めて来店する（初回価格）</button>
        <button class="btn btn-copy" style="width: 100%;" onclick="selectUserType('repeat')">既に会員である（通常価格）</button>
    </div>
</div>

    </div>

    <div class="tabs">

        <div id="tab-part" class="tab" onclick="changeTab('part')">パーツメニュー</div>
        <div id="tab-other" class="tab" onclick="changeTab('other')">その他</div>
    </div>

    <div id="menu-area"></div>
</div>

<div id="suggestion-box">

        <button onclick="hideSuggestion()" style="background: transparent; color: #444; border: none; font-size: 0.75rem; cursor: pointer; flex: 1;">今はしない</button>
    </div>
</div>

<div class="bottom-bar">

    </div>
</div>
