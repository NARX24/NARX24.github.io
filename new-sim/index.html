function forceStart(t) {

    initApp(); render();

function initApp() {
    function getLeafNodes(id) {
        var leaves = [];
        function traverse(nodeId) {
            if (setIncludes[nodeId]) {
                for (var i = 0; i < setIncludes[nodeId].length; i++) { traverse(setIncludes[nodeId][i]); }
            } else { if (leaves.indexOf(nodeId) === -1) leaves.push(nodeId); }
        }
        traverse(id); return leaves;
    }
    var keys = Object.keys(menuData);
    for (var i = 0; i < keys.length; i++) { itemLeaves[keys[i]] = getLeafNodes(keys[i]); }
    var bPanel = document.getElementById('body-panel'), fPanel = document.getElementById('face-panel');
    for (var j = 0; j < keys.length; j++) {
        var item = menuData[keys[j]];
        if (item.imgs) {
            if (item.imgs.body) createImg(bPanel, item.imgs.body);
            if (item.imgs.face) createImg(fPanel, item.imgs.face);
        }
    }
}

function createImg(parent, name) {
    var layerId = "img-" + name;
    if (document.getElementById(layerId)) return;
    var img = document.createElement('img');
    img.src = name + ".png"; img.id = layerId; img.className = 'layer-part';
    img.onerror = function() { this.style.display = 'none'; };
    parent.appendChild(img);
}

    }
    var rounded = Math.ceil(t / 30) * 30;
    var slotVal = (rounded / 60).toFixed(1);
    document.getElementById('total-price').innerText = "¥" + p.toLocaleString();

}

function analyzeSuggestions(isManual) {
    if (!isConciergeON && !isManual) return null;
    var keys = Object.keys(menuData);
    var currentLeaves = [];
    for (var s = 0; s < selected.length; s++) {
        var lNodes = itemLeaves[selected[s]];
        for (var ln = 0; ln < lNodes.length; ln++) { if (currentLeaves.indexOf(lNodes[ln]) === -1) currentLeaves.push(lNodes[ln]); }
    }
    for (var i = 0; i < keys.length; i++) {
        var sid = keys[i]; if (menuData[sid].cat !== 'set' || selected.indexOf(sid) !== -1) continue;
        var candLeaves = itemLeaves[sid], foundLeafCount = 0;
        for (var l = 0; l < candLeaves.length; l++) { if (currentLeaves.indexOf(candLeaves[l]) !== -1) foundLeafCount++; }
        if (foundLeafCount >= 2) {
            var intersectingItems = [];
            for(var j=0; j<selected.length; j++) {
                var selId = selected[j], selLeaves = itemLeaves[selId], isInc = true;
                for(var k=0; k<selLeaves.length; k++){ if(candLeaves.indexOf(selLeaves[k]) === -1) isInc=false; }
                if(isInc) intersectingItems.push(selId);
            }
            if (intersectingItems.length < 2) continue;
            var oldP = getOriginalTotal(intersectingItems), setP = getItemPrice(sid), diff = setP - oldP;
            // 💡 誠実提案：差額が少ないものを優先。高額すぎる提案は避ける
            if (diff <= 5000) return {sid:sid, type: (diff < 0 ? 'cheaper' : (diff === 0 ? 'equal' : 'upsell')), diff:diff, oldPrice:oldP, intersectingItems:intersectingItems};
        }
    }
    return null;
}

function checkSuggestion(isManual) {
    document.getElementById('suggestion-box').style.display = 'none';
    var best = analyzeSuggestions(isManual);
    if (!best) { suggestionId = null; render(); return; }
    suggestionId = best.sid; suggestionReplaceItems = best.intersectingItems;
    var currentTotal = getOriginalTotal(selected), setItem = menuData[best.sid], newTotal = currentTotal - best.oldPrice + getItemPrice(best.sid);
    var html = '<div class="sug-title">🎉 AIコンシェルジュ</div>';
    
    if (best.type === 'equal') {
        html += '<div class="sug-benefit-msg">同じ金額で、さらに部位を増やせます！</div>';
        showConciergeBubble("同額でもっとお得になる選び方があります！");
    } else if (best.type === 'cheaper') {
        html += '<div class="sug-benefit-msg">セットの方がお安くなります！</div>';
        showConciergeBubble("お安くなる組み合わせを見つけましたよ！");
    } else {
        html += '<div class="sug-benefit-msg">少しの追加で部位を大幅に増やせます！</div>';
        showConciergeBubble("最適なプランをご提案します！");
    }
    
    html += '<div class="sug-menu-name">' + setItem.label + '</div>';
    html += '<div class="sug-compare-panel"><div class="sug-col"><span class="sug-col-label">現在の合計</span><span class="sug-col-price">¥' + currentTotal.toLocaleString() + '</span></div>' +
            '<div class="sug-col"><span class="sug-col-label">追加料金</span><span class="sug-add-price">' + (best.diff > 0 ? '+¥'+best.diff.toLocaleString() : '±¥0') + '</span></div>' +
            '<div class="sug-col"><span class="sug-col-label">変更後の合計</span><span class="sug-col-price" style="color:#c00;">¥' + newTotal.toLocaleString() + '</span></div></div>';
    
    html += '<div class="sug-btn-group"><button onclick="applyOptimalSet()" class="btn-sug-apply">変更する</button><button onclick="skipSuggestion(\''+suggestionId+'\')" class="btn-sug-skip">今はしない</button></div>';
    document.getElementById('suggestion-box').innerHTML = html; document.getElementById('suggestion-box').style.display = 'block';
    render(); 
}

function skipSuggestion(id) { dismissedSuggestions.push(id); document.getElementById('suggestion-box').style.display='none'; suggestionId=null; render(); }
function applyOptimalSet() {
    if(!suggestionReplaceItems) return;
    for (var i = 0; i < suggestionReplaceItems.length; i++) { var idx = selected.indexOf(suggestionReplaceItems[i]); if (idx !== -1) selected.splice(idx, 1); }
    selected.push(suggestionId); suggestionId = null; suggestionReplaceItems = []; document.getElementById('suggestion-box').style.display = 'none'; render();
}

function handleReserveAction() {
    if (selected.length === 0) return alert("メニューを選んでください");

    if (best && (best.type === 'cheaper' || best.type === 'equal')) {
        var oldNames = []; for(var i=0; i<best.intersectingItems.length; i++) oldNames.push(menuData[best.intersectingItems[i]].label);
        var msg = "現在選択中の【" + oldNames.join(', ') + "】を、よりお得な【" + menuData[best.sid].label + "】に変更しませんか？<br><br>料金はそのままで、対象部位をさらに増やすことができます。";
        if(best.type === 'cheaper') msg = "現在選択中の【" + oldNames.join(', ') + "】を、セットプラン【" + menuData[best.sid].label + "】に変更しませんか？<br><br>今の選び方よりも ¥" + (Math.abs(best.diff)).toLocaleString() + " お安く予約できます。";
        
        document.getElementById('final-sug-desc').innerHTML = msg;
        document.getElementById('final-old-price').innerText = "¥" + getOriginalTotal(selected).toLocaleString();
        document.getElementById('final-new-price').innerText = "¥" + (getOriginalTotal(selected) + best.diff).toLocaleString();

function proceedToCalendar() {
    showLoading(true);
    var xhr = new XMLHttpRequest();
    xhr.open("POST", GAS_URL, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            showLoading(false);
            if (xhr.status === 200) {
                try {
                    busySlots = JSON.parse(xhr.responseText);
                    renderCalendar();
                    document.getElementById('calendar-modal').style.display = 'block';
                } catch(e) {
                    console.error("JSON Parse Error:", e);
                    alert("サーバー通信中に不具合が発生しました。再度お試しください。");
                }
            } else {
                alert("予約状況の取得に失敗しました。電波の良い場所でお試しください。");
            }
        }
    };
    xhr.send(JSON.stringify({type:'getBusySlots'}));
}

// 💡 修正点：フッターの文字列から数値を正確に抜き取る正規表現を強化
function renderCalendar() {
    var wrapper=document.getElementById('calendar-container'), now=new Date();
    var timeStrRaw = document.getElementById('total-time-display').innerText;
    // 「枠 3.0 時間枠」から「3.0」を確実に抽出
    var match = timeStrRaw.match(/[\d.]+/);
    var slotVal = match ? parseFloat(match[0]) : 0;
    var reqMs = slotVal * 60 * 60 * 1000;

    var firstDay = new Date(); var day = firstDay.getDay(); var diffToMon = (day === 0 ? -6 : 1) - day; 
    firstDay.setDate(firstDay.getDate() + diffToMon + (weekOffset * 7));
    document.getElementById('cal-title').innerText = (firstDay.getMonth()+1)+"/"+firstDay.getDate() + "の週";
    var html='<table class="cal-table"><thead><tr><th>時間</th>';
    var dayNames = ['日','月','火','水','木','金','土'];
    for(var j=0; j<7; j++){
        var d = new Date(firstDay.getTime() + j*24*60*60*1000);
        var dateStr = d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
        var cls = d.getDay()===0?'sun':(d.getDay()===6?'sat':'');
        if(holidays2026.indexOf(dateStr) !== -1) cls = 'holiday';
        html+='<th class="'+cls+'">'+(d.getMonth()+1)+'/'+d.getDate()+'<br>('+dayNames[d.getDay()]+')</th>';
    }
    html+='</tr></thead><tbody>';
    var times=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30','22:00'];
    times.forEach(function(timeStr) {
        html+='<tr><td>'+timeStr+'</td>';
        for(var d=0; d<7; d++){
            var slotS = new Date(firstDay.getFullYear(), firstDay.getMonth(), firstDay.getDate()+d, timeStr.split(':')[0], timeStr.split(':')[1]);
            var s = slotS.getTime(); var e = s + reqMs;
            var wDay = slotS.getDay(); var totalM = slotS.getHours()*60 + slotS.getMinutes();
            var dateStrKey = slotS.getFullYear()+'/'+(slotS.getMonth()+1)+'/'+slotS.getDate();
            var isHolidayOrWeekend = (wDay===0 || wDay===6 || holidays2026.indexOf(dateStrKey) !== -1);
            var isInsideHours = isHolidayOrWeekend ? (totalM>=540 && totalM < 1260) : (totalM>=720 && totalM < 1320);
            var limitHr = isHolidayOrWeekend ? 21 : 22;
            var limitT = new Date(slotS.getFullYear(), slotS.getMonth(), slotS.getDate(), limitHr, 0).getTime();
            var canFit = (e <= limitT); var isBusy = false;
            for(var b=0; b<busySlots.length; b++){ if(s < (busySlots[b].end + 30*60*1000) && e > (busySlots[b].start - 30*60*1000)) { isBusy = true; break; } };
            if(s < now.getTime()) isBusy = true;
            if(!isInsideHours) html+='<td class="cal-status-off">-</td>';
            else if(!canFit || isBusy) html+='<td class="cal-status-x">×</td>';
            else {
                var endObj = new Date(e); var endStr = endObj.getHours() + ":" + (endObj.getMinutes() === 0 ? "00" : (endObj.getMinutes() < 10 ? "0" : "") + endObj.getMinutes());
                html+='<td class="cal-status-o" onclick="openInfoModal(\''+dateStrKey+'\', \''+timeStr+'\', \''+endStr+'\')">◎</td>';
            }
        }
        html+='</tr>';
    });
    wrapper.innerHTML = html+'</tbody></table>';
}

function openInfoModal(d, t, et) {
    tDate=d; tTime=t; tEndTime=et;
    var menuLabels = []; for(var i=0; i<selected.length; i++){ menuLabels.push(menuData[selected[i]].label); }
    document.getElementById('selected-summary').innerHTML="【日時】 "+d+" "+t+" 〜 "+et+"<br>【内容】 "+menuLabels.join(', ')+"<br>【合計】 "+document.getElementById('total-price').innerText;
    document.getElementById('info-modal').style.display='block';
}

function submitReservation() {
    var n=document.getElementById('cust-name').value, tel=document.getElementById('cust-tel').value, em=document.getElementById('cust-email').value, memo=document.getElementById('cust-memo').value;
    if(!n||!tel||!em) return alert("必須項目をすべて入力してください");
    showLoading(true);
    var menuLabels = []; for(var i=0; i<selected.length; i++){ menuLabels.push(menuData[selected[i]].label); }
    var payload = {
        type:'reserve', userType:userType, date:tDate, time:tTime, endTime:tEndTime,
        slot:document.getElementById('total-time-display').innerText.replace("枠 ",""),
        price:document.getElementById('total-price').innerText,
        menus:menuLabels.join(', '), name:n, tel:tel, email:em, memo:memo
    };
    var xhr=new XMLHttpRequest(); xhr.open("POST", GAS_URL, true);
    xhr.onreadystatechange=function(){ if(xhr.readyState===4){
        showLoading(false); alert("ご予約ありがとうございます！\n確定メールを送信いたしました。"); location.reload();
    }};
    xhr.send(JSON.stringify(payload));
}

function changeWeek(n) { weekOffset += n; renderCalendar(); }
function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
function closeCalendarModal(){ document.getElementById('calendar-modal').style.display='none'; weekOffset=0; }
</script>
